<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Header -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    "I'm down" — 自然な会話フロー 3パターン
  </text>

  <!-- Pattern 1: Food invitation -->
  <rect x="40" y="100" width="350" height="520" rx="14" fill="white" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="40" y="100" width="350" height="50" rx="14" fill="#1DA1F2"/>
  <rect x="40" y="136" width="350" height="14" fill="#1DA1F2"/>
  <text x="215" y="132" text-anchor="middle" fill="white" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">🍕 食事の誘い</text>

  <!-- Bubble A1 -->
  <rect x="60" y="168" width="230" height="55" rx="12" fill="#E8F5FE"/>
  <text x="175" y="190" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Alex:</text>
  <text x="175" y="210" text-anchor="middle" fill="#14171A" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"Are you down for tacos?"</text>
  <!-- Bubble A2 -->
  <rect x="100" y="242" width="250" height="55" rx="12" fill="#FFF3E0"/>
  <text x="225" y="264" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Sam:</text>
  <text x="225" y="284" text-anchor="middle" fill="#14171A" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"Yeah, I'm so down!"</text>
  <!-- Arrow -->
  <line x1="215" y1="316" x2="215" y2="346" stroke="#657786" stroke-width="2"/>
  <polygon points="209,342 215,356 221,342" fill="#657786"/>
  <!-- Translation box -->
  <rect x="60" y="358" width="300" height="60" rx="8" fill="#E8F5FE"/>
  <text x="210" y="381" text-anchor="middle" fill="#1DA1F2" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">日本語訳:</text>
  <text x="210" y="400" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「タコス行かない？」「もちろん行く！」</text>
  <!-- Point -->
  <rect x="60" y="432" width="300" height="50" rx="8" fill="#F0FFF4"/>
  <text x="210" y="455" text-anchor="middle" fill="#17BF63" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">POINT:</text>
  <text x="210" y="472" text-anchor="middle" fill="#14171A" font-size="12"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「for + 活動名」で誘いに乗る</text>

  <!-- Pattern 2: Activity plan -->
  <rect x="425" y="100" width="350" height="520" rx="14" fill="white" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="425" y="100" width="350" height="50" rx="14" fill="#657786"/>
  <rect x="425" y="136" width="350" height="14" fill="#657786"/>
  <text x="600" y="132" text-anchor="middle" fill="white" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">🎬 映画・遊びの計画</text>

  <!-- Bubble B1 -->
  <rect x="445" y="168" width="240" height="55" rx="12" fill="#E8F5FE"/>
  <text x="565" y="190" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Mia:</text>
  <text x="565" y="210" text-anchor="middle" fill="#14171A" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"Movie tonight — you down?"</text>
  <!-- Bubble B2 -->
  <rect x="470" y="242" width="265" height="55" rx="12" fill="#FFF3E0"/>
  <text x="600" y="264" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Jake:</text>
  <text x="600" y="284" text-anchor="middle" fill="#14171A" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"I'm down, what time?"</text>
  <!-- Arrow -->
  <line x1="600" y1="316" x2="600" y2="346" stroke="#657786" stroke-width="2"/>
  <polygon points="594,342 600,356 606,342" fill="#657786"/>
  <!-- Translation box -->
  <rect x="445" y="358" width="305" height="60" rx="8" fill="#E8F5FE"/>
  <text x="597" y="381" text-anchor="middle" fill="#1DA1F2" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">日本語訳:</text>
  <text x="597" y="400" text-anchor="middle" fill="#14171A" font-size="12"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「今夜映画、来る？」「いいよ、何時？」</text>
  <!-- Point -->
  <rect x="445" y="432" width="305" height="50" rx="8" fill="#F0FFF4"/>
  <text x="597" y="455" text-anchor="middle" fill="#17BF63" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">POINT:</text>
  <text x="597" y="472" text-anchor="middle" fill="#14171A" font-size="12"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「you down?」= カジュアルな確認</text>

  <!-- Pattern 3: Group invitation -->
  <rect x="810" y="100" width="350" height="520" rx="14" fill="white" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="810" y="100" width="350" height="50" rx="14" fill="#14171A"/>
  <rect x="810" y="136" width="350" height="14" fill="#14171A"/>
  <text x="985" y="132" text-anchor="middle" fill="white" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">🎉 グループ誘い</text>

  <!-- Bubble C1 -->
  <rect x="830" y="168" width="260" height="70" rx="12" fill="#E8F5FE"/>
  <text x="960" y="190" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Chris:</text>
  <text x="960" y="210" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"We're hitting the beach</text>
  <text x="960" y="228" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Saturday. Down to come?"</text>
  <!-- Bubble C2 -->
  <rect x="845" y="255" width="265" height="55" rx="12" fill="#FFF3E0"/>
  <text x="977" y="277" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Lea:</text>
  <text x="977" y="297" text-anchor="middle" fill="#14171A" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"100% down, I'm in!"</text>
  <!-- Arrow -->
  <line x1="985" y1="328" x2="985" y2="358" stroke="#657786" stroke-width="2"/>
  <polygon points="979,354 985,368 991,354" fill="#657786"/>
  <!-- Translation box -->
  <rect x="830" y="370" width="308" height="60" rx="8" fill="#E8F5FE"/>
  <text x="984" y="393" text-anchor="middle" fill="#1DA1F2" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">日本語訳:</text>
  <text x="984" y="412" text-anchor="middle" fill="#14171A" font-size="12"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「土曜ビーチ行くけど来る？」「絶対行く！」</text>
  <!-- Point -->
  <rect x="830" y="444" width="308" height="50" rx="8" fill="#F0FFF4"/>
  <text x="984" y="467" text-anchor="middle" fill="#17BF63" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">POINT:</text>
  <text x="984" y="484" text-anchor="middle" fill="#14171A" font-size="12"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"100% down"で強調表現にも使える</text>

  <!-- Bottom bar -->
  <rect x="40" y="630" width="1120" height="34" rx="8" fill="#1DA1F2" opacity="0.15"/>
  <text x="600" y="652" text-anchor="middle" fill="#1DA1F2" font-size="16" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    共通パターン: 「誘い or 提案 → I'm down = 乗った」。否定は "I'm not really down" で断れる。
  </text>

  <!-- Credit -->
  <text x="1170" y="668" text-anchor="end" fill="#AAB8C2" font-size="18"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
