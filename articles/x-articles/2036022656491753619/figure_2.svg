<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#38c9a0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="56" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">66日で習慣化する 15分ルーティン設計図</text>
  <text x="600" y="88" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786" text-anchor="middle">既存習慣に「くっつける」Habit Stackingで開始コストをゼロにする</text>

  <!-- Progress bar: 66 days -->
  <rect x="100" y="110" width="1000" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#657786" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="100" y="110" width="1000" height="24" rx="12" fill="url(#timelineGrad)"/>
  <!-- Day markers on bar -->
  <line x1="100" y1="108" x2="100" y2="136" stroke="#1DA1F2" stroke-width="2"/>
  <text x="100" y="150" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2" text-anchor="middle">Day 1</text>
  <line x1="328" y1="108" x2="328" y2="136" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="328" y="150" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">Day 15</text>
  <line x1="556" y1="108" x2="556" y2="136" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="556" y="150" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">Day 30</text>
  <line x1="784" y1="108" x2="784" y2="136" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="784" y="150" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">Day 45</text>
  <line x1="1100" y1="108" x2="1100" y2="136" stroke="#f5a623" stroke-width="2"/>
  <text x="1100" y="150" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#f5a623" text-anchor="middle" filter="url(#glow)">Day 66</text>
  <text x="1100" y="164" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#f5a623" text-anchor="middle">習慣化完了</text>

  <!-- 3 phase labels on bar -->
  <text x="214" y="126" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0eeff" text-anchor="middle">意識して続ける</text>
  <text x="556" y="126" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0fff0" text-anchor="middle">だいぶ楽になる</text>
  <text x="900" y="126" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#fff0d0" text-anchor="middle">やらないと違和感</text>

  <!-- Main routine cards: Morning stack -->
  <text x="140" y="200" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">朝のスタック</text>
  <line x1="100" y1="210" x2="560" y2="210" stroke="#1DA1F2" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Existing habit: morning coffee -->
  <rect x="100" y="218" width="200" height="72" rx="8" fill="#657786" fill-opacity="0.1" stroke="#657786" stroke-opacity="0.3" stroke-width="1"/>
  <text x="200" y="245" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">既存習慣</text>
  <text x="200" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" text-anchor="middle">☕</text>
  <text x="200" y="282" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">朝コーヒーを淹れる</text>

  <!-- Arrow -->
  <text x="318" y="260" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" fill="#1DA1F2" text-anchor="middle">+</text>

  <!-- New habit: english podcast -->
  <rect x="340" y="218" width="200" height="72" rx="8" fill="#1DA1F2" fill-opacity="0.15" stroke="#1DA1F2" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="440" y="245" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2" text-anchor="middle">追加習慣（5分）</text>
  <text x="440" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" text-anchor="middle">🎙</text>
  <text x="440" y="282" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8ec8f0" text-anchor="middle">英語Podcast を流す</text>

  <!-- Evening stack -->
  <text x="700" y="200" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#38c9a0">夜のスタック</text>
  <line x1="660" y1="210" x2="1100" y2="210" stroke="#38c9a0" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Existing: bedtime routine -->
  <rect x="660" y="218" width="200" height="72" rx="8" fill="#657786" fill-opacity="0.1" stroke="#657786" stroke-opacity="0.3" stroke-width="1"/>
  <text x="760" y="245" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">既存習慣</text>
  <text x="760" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" text-anchor="middle">🛁</text>
  <text x="760" y="282" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">就寝前のスマホタイム</text>

  <!-- Arrow -->
  <text x="878" y="260" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" fill="#38c9a0" text-anchor="middle">+</text>

  <!-- New: quiz -->
  <rect x="900" y="218" width="200" height="72" rx="8" fill="#38c9a0" fill-opacity="0.12" stroke="#38c9a0" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1000" y="245" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#38c9a0" text-anchor="middle">追加習慣（10分）</text>
  <text x="1000" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" text-anchor="middle">🎯</text>
  <text x="1000" y="282" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#a0e8c8" text-anchor="middle">リスニングクイズ15問</text>

  <!-- 15min breakdown -->
  <rect x="100" y="320" width="1000" height="100" rx="10" fill="#1DA1F2" fill-opacity="0.06" stroke="#1DA1F2" stroke-opacity="0.2" stroke-width="1"/>
  <text x="600" y="346" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">15分の内訳例（フレキシブルに組み替えOK）</text>
  <!-- Segments -->
  <rect x="140" y="358" width="200" height="44" rx="6" fill="#1DA1F2" fill-opacity="0.2"/>
  <text x="240" y="377" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1DA1F2" text-anchor="middle">リスニング 5分</text>
  <text x="240" y="394" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#8ec8f0" text-anchor="middle">Podcast / YouTube</text>

  <rect x="370" y="358" width="200" height="44" rx="6" fill="#38c9a0" fill-opacity="0.18"/>
  <text x="470" y="377" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#38c9a0" text-anchor="middle">クイズ 5分</text>
  <text x="470" y="394" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#a0e8c8" text-anchor="middle">能動的インプット</text>

  <rect x="600" y="358" width="200" height="44" rx="6" fill="#f5a623" fill-opacity="0.15"/>
  <text x="700" y="377" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#f5a623" text-anchor="middle">AI会話 5分</text>
  <text x="700" y="394" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#ffe0a0" text-anchor="middle">アウトプット</text>

  <rect x="830" y="358" width="240" height="44" rx="6" fill="#c175f5" fill-opacity="0.1" stroke="#c175f5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="950" y="377" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#c175f5" text-anchor="middle">全部 → 15分ちょうど</text>
  <text x="950" y="394" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#dfa0f8" text-anchor="middle">バランス型</text>

  <!-- 3 phase milestones -->
  <text x="600" y="454" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">マイルストーン</text>

  <!-- Phase 1 -->
  <rect x="100" y="464" width="290" height="100" rx="10" fill="#1DA1F2" fill-opacity="0.1" stroke="#1DA1F2" stroke-opacity="0.3" stroke-width="1"/>
  <text x="245" y="486" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="#1DA1F2" text-anchor="middle" filter="url(#glow)">Day 1〜21</text>
  <text x="245" y="508" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#8ec8f0" text-anchor="middle">意識しないとやらない</text>
  <text x="245" y="526" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">→ リマインダーアプリを活用</text>
  <text x="245" y="554" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">→ カレンダーに記録して見える化</text>

  <!-- Phase 2 -->
  <rect x="455" y="464" width="290" height="100" rx="10" fill="#38c9a0" fill-opacity="0.1" stroke="#38c9a0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="486" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="#38c9a0" text-anchor="middle" filter="url(#glow)">Day 22〜44</text>
  <text x="600" y="508" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#a0e8c8" text-anchor="middle">だいぶ楽になってくる</text>
  <text x="600" y="526" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">→ 内容を少しずつ変化させる</text>
  <text x="600" y="554" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">→ 20分に伸ばす選択肢も</text>

  <!-- Phase 3 -->
  <rect x="810" y="464" width="290" height="100" rx="10" fill="#f5a623" fill-opacity="0.12" stroke="#f5a623" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="955" y="486" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="#f5a623" text-anchor="middle" filter="url(#glow)">Day 45〜66</text>
  <text x="955" y="508" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#ffe0a0" text-anchor="middle">やらないと違和感が出る</text>
  <text x="955" y="526" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">→ 習慣化の証拠</text>
  <text x="955" y="554" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#f5a623" text-anchor="middle">→ 66日後は「無限に続く」</text>

  <!-- Bottom reference -->
  <text x="600" y="604" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">参考: Lally et al. (2010) "How are habits formed" European Journal of Social Psychology</text>
  <text x="600" y="620" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">Habit Stacking: BJ Fogg "Tiny Habits" / James Clear "Atomic Habits"</text>

  <!-- Credit -->
  <text x="1175" y="660" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
