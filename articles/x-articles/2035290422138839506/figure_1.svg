<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#FFFFFF" font-size="30" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">語彙数と英文カバー率の関係</text>
  <text x="600" y="90" text-anchor="middle" fill="#657786" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">単語数を増やすほど追加カバー率は下がっていく</text>

  <!-- Chart area -->
  <!-- Y axis label -->
  <text x="55" y="355" text-anchor="middle" fill="#AAB8C2" font-size="16" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" transform="rotate(-90, 55, 355)">英文カバー率（%）</text>

  <!-- Y axis ticks -->
  <text x="110" y="500" text-anchor="end" fill="#657786" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">60%</text>
  <text x="110" y="428" text-anchor="end" fill="#657786" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">70%</text>
  <text x="110" y="356" text-anchor="end" fill="#657786" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">80%</text>
  <text x="110" y="284" text-anchor="end" fill="#657786" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">90%</text>
  <text x="110" y="212" text-anchor="end" fill="#657786" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">95%</text>
  <text x="110" y="140" text-anchor="end" fill="#657786" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">98%</text>

  <!-- Grid lines -->
  <line x1="120" y1="496" x2="1100" y2="496" stroke="#2C3640" stroke-width="1"/>
  <line x1="120" y1="424" x2="1100" y2="424" stroke="#2C3640" stroke-width="1"/>
  <line x1="120" y1="352" x2="1100" y2="352" stroke="#2C3640" stroke-width="1"/>
  <line x1="120" y1="280" x2="1100" y2="280" stroke="#2C3640" stroke-width="1"/>
  <line x1="120" y1="208" x2="1100" y2="208" stroke="#2C3640" stroke-width="1"/>
  <line x1="120" y1="136" x2="1100" y2="136" stroke="#2C3640" stroke-width="1"/>

  <!-- Bars: positions based on cover rates
       Base: 60% = y496 (bottom), 98% = y136 (top). Range 38% = 360px → 1% = 9.47px
       1000語: 73% → 496 - (73-60)*9.47 = 496-123 = 373
       2000語: 80% → 496 - (80-60)*9.47 = 496-189 = 307
       5000語: 88% → 496 - (88-60)*9.47 = 496-265 = 231
       10000語: 95% → 496 - (95-60)*9.47 = 496-331 = 165
  -->

  <!-- Bar 1: 1,000語 73% -->
  <rect x="180" y="373" width="160" height="123" fill="#1DA1F2" opacity="0.7" rx="4"/>
  <text x="260" y="365" text-anchor="middle" fill="#1DA1F2" font-size="22" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">73%</text>
  <text x="260" y="540" text-anchor="middle" fill="#AAB8C2" font-size="16" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">1,000語</text>

  <!-- Bar 2: 2,000語 80% — highlighted -->
  <rect x="420" y="307" width="160" height="189" fill="#1DA1F2" rx="4"/>
  <rect x="420" y="307" width="160" height="189" fill="none" stroke="#FFFFFF" stroke-width="3" rx="4"/>
  <text x="500" y="299" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">80%</text>
  <text x="500" y="540" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">2,000語</text>
  <!-- Highlight label -->
  <rect x="395" y="555" width="210" height="30" fill="#1DA1F2" rx="4"/>
  <text x="500" y="575" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">まずここを目指す</text>

  <!-- Bar 3: 5,000語 88% -->
  <rect x="660" y="231" width="160" height="265" fill="#1DA1F2" opacity="0.5" rx="4"/>
  <text x="740" y="223" text-anchor="middle" fill="#AAB8C2" font-size="22" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">88%</text>
  <text x="740" y="540" text-anchor="middle" fill="#AAB8C2" font-size="16" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">5,000語</text>

  <!-- Bar 4: 10,000語 95% -->
  <rect x="900" y="165" width="160" height="331" fill="#1DA1F2" opacity="0.3" rx="4"/>
  <text x="980" y="157" text-anchor="middle" fill="#657786" font-size="22" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">95%</text>
  <text x="980" y="540" text-anchor="middle" fill="#657786" font-size="16" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">10,000語</text>

  <!-- Incremental gain arrows -->
  <text x="380" y="340" text-anchor="middle" fill="#657786" font-size="13" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">+7%</text>
  <text x="620" y="268" text-anchor="middle" fill="#657786" font-size="13" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">+8%</text>
  <text x="860" y="198" text-anchor="middle" fill="#657786" font-size="13" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">+7%</text>

  <!-- Note -->
  <text x="600" y="625" text-anchor="middle" fill="#657786" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">参考: Nation (2001) "Learning Vocabulary in Another Language" に基づく推計値</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
