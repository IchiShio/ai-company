<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="1200" height="6" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#14171A">「知ってる語彙」を「話せる語彙」に変える5ステップ</text>
  <text x="600" y="92" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">語彙数ゼロでも会話力は上がる。やることは「声に出す」だけ。</text>

  <!-- Step 1 -->
  <rect x="60" y="118" width="220" height="430" fill="white" stroke="#e1e8ed" stroke-width="2" rx="14"/>
  <rect x="60" y="118" width="220" height="6" fill="#AAB8C2" rx="7"/>
  <circle cx="170" cy="164" r="26" fill="#AAB8C2"/>
  <text x="170" y="172" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="white">1</text>
  <text x="170" y="212" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#14171A">リスト化</text>
  <line x1="90" y1="225" x2="250" y2="225" stroke="#e1e8ed" stroke-width="1"/>
  <text x="170" y="254" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">知ってるけど</text>
  <text x="170" y="274" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">使えない単語を</text>
  <text x="170" y="294" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">50語書き出す</text>
  <rect x="90" y="470" width="160" height="36" fill="#f0f4f8" rx="8"/>
  <text x="170" y="493" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">所要: 10分</text>

  <!-- Arrow -->
  <text x="298" y="345" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32" fill="#1DA1F2">→</text>

  <!-- Step 2 -->
  <rect x="330" y="118" width="220" height="430" fill="white" stroke="#e1e8ed" stroke-width="2" rx="14"/>
  <rect x="330" y="118" width="220" height="6" fill="#AAB8C2" rx="7"/>
  <circle cx="440" cy="164" r="26" fill="#AAB8C2"/>
  <text x="440" y="172" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="white">2</text>
  <text x="440" y="212" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#14171A">例文作り</text>
  <line x1="360" y1="225" x2="520" y2="225" stroke="#e1e8ed" stroke-width="1"/>
  <text x="440" y="254" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">各単語を使った</text>
  <text x="440" y="274" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">短い例文を</text>
  <text x="440" y="294" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">自分で作る</text>
  <rect x="360" y="470" width="160" height="36" fill="#f0f4f8" rx="8"/>
  <text x="440" y="493" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">所要: 15分</text>

  <!-- Arrow -->
  <text x="568" y="345" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32" fill="#1DA1F2">→</text>

  <!-- Step 3 -->
  <rect x="600" y="118" width="220" height="430" fill="white" stroke="#1DA1F2" stroke-width="2.5" rx="14"/>
  <rect x="600" y="118" width="220" height="6" fill="#1DA1F2" rx="7"/>
  <circle cx="710" cy="164" r="26" fill="#1DA1F2"/>
  <text x="710" y="172" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="white">3</text>
  <text x="710" y="212" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">音読×10回</text>
  <line x1="630" y1="225" x2="790" y2="225" stroke="#e1e8ed" stroke-width="1"/>
  <text x="710" y="254" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A" font-weight="600">声に出して</text>
  <text x="710" y="274" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A" font-weight="600">例文を10回読む</text>
  <text x="710" y="310" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">目→耳→口の</text>
  <text x="710" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">トリプル入力</text>
  <rect x="630" y="456" width="160" height="52" fill="#1DA1F2" fill-opacity="0.1" rx="8" stroke="#1DA1F2" stroke-width="1"/>
  <text x="710" y="479" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2" font-weight="700">★最重要ステップ</text>
  <text x="710" y="498" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">所要: 20分</text>

  <!-- Arrow -->
  <text x="838" y="345" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32" fill="#1DA1F2">→</text>

  <!-- Step 4 -->
  <rect x="870" y="118" width="220" height="430" fill="white" stroke="#e1e8ed" stroke-width="2" rx="14"/>
  <rect x="870" y="118" width="220" height="6" fill="#AAB8C2" rx="7"/>
  <circle cx="980" cy="164" r="26" fill="#AAB8C2"/>
  <text x="980" y="172" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="white">4</text>
  <text x="980" y="212" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#14171A">即興発話</text>
  <line x1="900" y1="225" x2="1060" y2="225" stroke="#e1e8ed" stroke-width="1"/>
  <text x="980" y="254" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">例文を見ずに</text>
  <text x="980" y="274" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">同じ単語で別の</text>
  <text x="980" y="294" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">文を作る</text>
  <rect x="900" y="470" width="160" height="36" fill="#f0f4f8" rx="8"/>
  <text x="980" y="493" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">所要: 15分</text>

  <!-- Bottom -->
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#14171A" font-weight="700">毎日60分 × 2週間 = 語彙が「話せる武器」に変わる</text>
  <text x="600" y="618" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">新しい単語を増やすより「既知の語彙を使い倒す」方が会話力は上がる</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2">@ichi_eigo</text>
</svg>
