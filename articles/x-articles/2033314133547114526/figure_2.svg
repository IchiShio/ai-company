<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold">難単語1語 vs 基本動詞フレーズ — 表現力の比較</text>
  <text x="600" y="74" text-anchor="middle" fill="#657786" font-size="16">基本動詞の方が自然で幅広い場面に使える</text>

  <!-- Header row -->
  <rect x="40" y="98" width="340" height="46" rx="6" fill="#1DA1F2" opacity="0.2"/>
  <text x="210" y="127" text-anchor="middle" fill="#1DA1F2" font-size="16" font-weight="bold">難単語（高度な語彙）</text>
  <rect x="440" y="98" width="320" height="46" rx="6" fill="#17BF63" opacity="0.2"/>
  <text x="600" y="127" text-anchor="middle" fill="#17BF63" font-size="16" font-weight="bold">基本動詞フレーズ</text>
  <rect x="820" y="98" width="340" height="46" rx="6" fill="#657786" opacity="0.2"/>
  <text x="990" y="127" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">意味</text>

  <!-- Row 1 -->
  <rect x="40" y="158" width="340" height="52" rx="4" fill="#1A2333"/>
  <text x="210" y="184" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold">comprehend</text>
  <text x="210" y="202" text-anchor="middle" fill="#657786" font-size="13">（理解する）</text>
  <rect x="440" y="158" width="320" height="52" rx="4" fill="#1A2A1F"/>
  <text x="600" y="189" text-anchor="middle" fill="#17BF63" font-size="17" font-weight="bold">get it / make sense of</text>
  <rect x="820" y="158" width="340" height="52" rx="4" fill="#1A1F2A"/>
  <text x="990" y="189" text-anchor="middle" fill="#FFFFFF" font-size="15">理解する・把握する</text>

  <!-- Row 2 -->
  <rect x="40" y="222" width="340" height="52" rx="4" fill="#1A2333"/>
  <text x="210" y="248" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold">obtain</text>
  <text x="210" y="266" text-anchor="middle" fill="#657786" font-size="13">（手に入れる）</text>
  <rect x="440" y="222" width="320" height="52" rx="4" fill="#1A2A1F"/>
  <text x="600" y="253" text-anchor="middle" fill="#17BF63" font-size="17" font-weight="bold">get</text>
  <rect x="820" y="222" width="340" height="52" rx="4" fill="#1A1F2A"/>
  <text x="990" y="253" text-anchor="middle" fill="#FFFFFF" font-size="15">手に入れる・取得する</text>

  <!-- Row 3 -->
  <rect x="40" y="286" width="340" height="52" rx="4" fill="#1A2333"/>
  <text x="210" y="312" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold">manufacture</text>
  <text x="210" y="330" text-anchor="middle" fill="#657786" font-size="13">（製造する）</text>
  <rect x="440" y="286" width="320" height="52" rx="4" fill="#1A2A1F"/>
  <text x="600" y="317" text-anchor="middle" fill="#17BF63" font-size="17" font-weight="bold">make</text>
  <rect x="820" y="286" width="340" height="52" rx="4" fill="#1A1F2A"/>
  <text x="990" y="317" text-anchor="middle" fill="#FFFFFF" font-size="15">作る・製造する</text>

  <!-- Row 4 -->
  <rect x="40" y="350" width="340" height="52" rx="4" fill="#1A2333"/>
  <text x="210" y="376" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold">tolerate</text>
  <text x="210" y="394" text-anchor="middle" fill="#657786" font-size="13">（我慢する）</text>
  <rect x="440" y="350" width="320" height="52" rx="4" fill="#1A2A1F"/>
  <text x="600" y="381" text-anchor="middle" fill="#17BF63" font-size="17" font-weight="bold">put up with / take it</text>
  <rect x="820" y="350" width="340" height="52" rx="4" fill="#1A1F2A"/>
  <text x="990" y="381" text-anchor="middle" fill="#FFFFFF" font-size="15">我慢する・耐える</text>

  <!-- Row 5 -->
  <rect x="40" y="414" width="340" height="52" rx="4" fill="#1A2333"/>
  <text x="210" y="440" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold">accompany</text>
  <text x="210" y="458" text-anchor="middle" fill="#657786" font-size="13">（同行する）</text>
  <rect x="440" y="414" width="320" height="52" rx="4" fill="#1A2A1F"/>
  <text x="600" y="445" text-anchor="middle" fill="#17BF63" font-size="17" font-weight="bold">go with / take along</text>
  <rect x="820" y="414" width="340" height="52" rx="4" fill="#1A1F2A"/>
  <text x="990" y="445" text-anchor="middle" fill="#FFFFFF" font-size="15">一緒に行く・連れて行く</text>

  <!-- Row 6 -->
  <rect x="40" y="478" width="340" height="52" rx="4" fill="#1A2333"/>
  <text x="210" y="504" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold">cease</text>
  <text x="210" y="522" text-anchor="middle" fill="#657786" font-size="13">（やめる）</text>
  <rect x="440" y="478" width="320" height="52" rx="4" fill="#1A2A1F"/>
  <text x="600" y="509" text-anchor="middle" fill="#17BF63" font-size="17" font-weight="bold">make it stop / get off</text>
  <rect x="820" y="478" width="340" height="52" rx="4" fill="#1A1F2A"/>
  <text x="990" y="509" text-anchor="middle" fill="#FFFFFF" font-size="15">止める・やめる</text>

  <!-- Bottom note -->
  <rect x="40" y="550" width="1120" height="56" rx="8" fill="#1DA1F2" opacity="0.08" stroke="#1DA1F2" stroke-width="1"/>
  <text x="600" y="574" text-anchor="middle" fill="#1DA1F2" font-size="14">ポイント：難単語は「書き言葉・フォーマル場面」向け。日常会話では基本動詞フレーズの方が自然で通じやすい。</text>
  <text x="600" y="596" text-anchor="middle" fill="#657786" font-size="13">まずは get / make / take を使い倒して「基本動詞マスター」になろう → native-real.com/grammar/</text>

  <!-- Credit -->
  <text x="1175" y="658" text-anchor="end" fill="#657786" font-size="13">@ichi_eigo</text>
</svg>
