<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e8f4fd"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bgG3)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#14171A">
    読解 vs 会話 — 処理速度の圧倒的な差
  </text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">
    「読めるけど話せない」は能力の問題ではなく、使っている脳回路の問題
  </text>

  <!-- ===== Reading side ===== -->
  <rect x="60" y="100" width="490" height="470" rx="18" fill="white" filter="url(#sh3)"/>
  <rect x="60" y="100" width="490" height="8" rx="4" fill="#657786"/>

  <text x="305" y="145" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#657786">📖  読解モード</text>

  <!-- Clock - slow -->
  <circle cx="305" cy="255" r="90" fill="#f8f8f8" stroke="#657786" stroke-width="3"/>
  <circle cx="305" cy="255" r="4" fill="#657786"/>
  <!-- Hour hand pointing to ~2 o'clock -->
  <line x1="305" y1="255" x2="347" y2="198" stroke="#657786" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand pointing up -->
  <line x1="305" y1="255" x2="305" y2="175" stroke="#14171A" stroke-width="3" stroke-linecap="round"/>
  <!-- Second marks -->
  <circle cx="305" cy="170" r="3" fill="#657786"/>
  <circle cx="305" cy="340" r="3" fill="#657786"/>
  <circle cx="220" cy="255" r="3" fill="#657786"/>
  <circle cx="390" cy="255" r="3" fill="#657786"/>

  <text x="305" y="300" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">自分のペースで</text>

  <!-- Time bar reading -->
  <text x="130" y="360" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">処理時間</text>
  <rect x="220" y="348" width="220" height="20" rx="10" fill="#e8e8e8"/>
  <rect x="220" y="348" width="220" height="20" rx="10" fill="#657786"/>
  <text x="450" y="363" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#657786"> 無制限</text>

  <text x="130" y="395" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">プレッシャー</text>
  <rect x="220" y="383" width="220" height="20" rx="10" fill="#e8e8e8"/>
  <rect x="220" y="383" width="40" height="20" rx="10" fill="#aab8c2"/>

  <text x="130" y="430" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">再読・確認</text>
  <rect x="220" y="418" width="220" height="20" rx="10" fill="#e8e8e8"/>
  <rect x="220" y="418" width="200" height="20" rx="10" fill="#657786"/>
  <text x="130" y="430" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">再読・確認</text>

  <rect x="130" y="468" width="310" height="56" rx="12" fill="#f8f8f8" stroke="#657786" stroke-width="1.5"/>
  <text x="285" y="492" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#657786">自分ペース回路</text>
  <text x="285" y="514" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">ゆっくり深く処理できる</text>

  <!-- ===== Conversation side ===== -->
  <rect x="650" y="100" width="490" height="470" rx="18" fill="white" filter="url(#sh3)"/>
  <rect x="650" y="100" width="490" height="8" rx="4" fill="#1DA1F2"/>

  <text x="895" y="145" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#1DA1F2">💬  会話モード</text>

  <!-- Clock - fast / urgent -->
  <circle cx="895" cy="255" r="90" fill="#fff8e8" stroke="#1DA1F2" stroke-width="3"/>
  <circle cx="895" cy="255" r="4" fill="#e74c3c"/>
  <!-- Fast hands -->
  <line x1="895" y1="255" x2="895" y2="175" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
  <line x1="895" y1="255" x2="950" y2="220" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <!-- Urgency arcs -->
  <path d="M 895 170 A 85 85 0 0 1 960 218" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- Second marks -->
  <circle cx="895" cy="170" r="3" fill="#1DA1F2"/>
  <circle cx="895" cy="340" r="3" fill="#1DA1F2"/>
  <circle cx="810" cy="255" r="3" fill="#1DA1F2"/>
  <circle cx="980" cy="255" r="3" fill="#1DA1F2"/>

  <text x="895" y="300" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e74c3c" font-weight="700">0.5秒以内に反応</text>

  <!-- Time bar conversation -->
  <text x="720" y="360" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">処理時間</text>
  <rect x="810" y="348" width="220" height="20" rx="10" fill="#fde8e8"/>
  <rect x="810" y="348" width="22" height="20" rx="10" fill="#e74c3c"/>
  <text x="1040" y="363" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#e74c3c"> 0.5秒!</text>

  <text x="720" y="395" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">プレッシャー</text>
  <rect x="810" y="383" width="220" height="20" rx="10" fill="#fde8e8"/>
  <rect x="810" y="383" width="215" height="20" rx="10" fill="#e74c3c"/>

  <text x="720" y="430" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">再発話・確認</text>
  <rect x="810" y="418" width="220" height="20" rx="10" fill="#fde8e8"/>
  <rect x="810" y="418" width="18" height="20" rx="10" fill="#e74c3c"/>

  <rect x="720" y="468" width="310" height="56" rx="12" fill="#e8f4fd" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="875" y="492" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">瞬時処理回路</text>
  <text x="875" y="514" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">0.5秒以内に意味を出力する</text>

  <!-- VS badge -->
  <circle cx="600" cy="340" r="36" fill="#14171A" filter="url(#sh3)"/>
  <text x="600" y="348" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="white">VS</text>

  <!-- Bottom key message -->
  <rect x="200" y="590" width="800" height="52" rx="12" fill="#14171A" filter="url(#sh3)"/>
  <text x="600" y="614" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white">
    読解と会話は「別の回路」— だから別々に鍛える必要がある
  </text>
  <text x="600" y="634" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#aab8c2">
    読書で語彙を増やし、発話練習で瞬時処理回路を鍛える
  </text>

  <!-- Credit -->
  <text x="1175" y="662" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
