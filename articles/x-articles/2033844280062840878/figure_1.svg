<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="25" font-weight="bold" fill="#FFFFFF">TOEICスコア帯別 必要スキルの積み上げ図</text>
  <text x="600" y="78" text-anchor="middle" font-size="16" fill="#657786">600点の壁はスキルの「層」が変わる境界線</text>

  <!-- Y axis label -->
  <text x="58" y="400" text-anchor="middle" font-size="13" fill="#657786" transform="rotate(-90, 58, 400)">スコア帯</text>

  <!-- X axis label -->
  <text x="600" y="635" text-anchor="middle" font-size="13" fill="#657786">必要なスキルの比率 →</text>

  <!-- Score bands (horizontal bars stacked from bottom) -->
  <!-- 〜300点 -->
  <rect x="120" y="520" width="900" height="55" rx="0"/>
  <!-- 単語基礎 -->
  <rect x="120" y="520" width="360" height="55" rx="4" fill="#1DA1F2" fill-opacity="0.8"/>
  <!-- 文法基礎 -->
  <rect x="483" y="520" width="260" height="55" rx="4" fill="#60A5FA" fill-opacity="0.8"/>
  <!-- その他 -->
  <rect x="746" y="520" width="274" height="55" rx="4" fill="#1D4ED8" fill-opacity="0.5"/>
  <text x="100" y="553" text-anchor="end" font-size="14" font-weight="bold" fill="#657786">〜300</text>
  <text x="300" y="553" text-anchor="middle" font-size="13" fill="#FFFFFF">基礎語彙（40%）</text>
  <text x="613" y="553" text-anchor="middle" font-size="13" fill="#FFFFFF">基礎文法（29%）</text>
  <text x="883" y="553" text-anchor="middle" font-size="13" fill="#93C5FD">慣れ（30%）</text>

  <!-- 300〜500点 -->
  <rect x="120" y="455" width="900" height="55" rx="0"/>
  <rect x="120" y="455" width="270" height="55" rx="4" fill="#1DA1F2" fill-opacity="0.8"/>
  <rect x="393" y="455" width="270" height="55" rx="4" fill="#60A5FA" fill-opacity="0.8"/>
  <rect x="666" y="455" width="180" height="55" rx="4" fill="#F59E0B" fill-opacity="0.7"/>
  <rect x="849" y="455" width="171" height="55" rx="4" fill="#8B5CF6" fill-opacity="0.5"/>
  <text x="100" y="488" text-anchor="end" font-size="14" font-weight="bold" fill="#657786">300〜500</text>
  <text x="258" y="488" text-anchor="middle" font-size="13" fill="#FFFFFF">語彙増強（30%）</text>
  <text x="528" y="488" text-anchor="middle" font-size="13" fill="#FFFFFF">文法精度（30%）</text>
  <text x="756" y="488" text-anchor="middle" font-size="13" fill="#FBBF24">読解（20%）</text>
  <text x="934" y="488" text-anchor="middle" font-size="13" fill="#C4B5FD">聴解（19%）</text>

  <!-- 500〜600点 -->
  <rect x="120" y="390" width="900" height="55" rx="0"/>
  <rect x="120" y="390" width="180" height="55" rx="4" fill="#1DA1F2" fill-opacity="0.8"/>
  <rect x="303" y="390" width="180" height="55" rx="4" fill="#60A5FA" fill-opacity="0.8"/>
  <rect x="486" y="390" width="225" height="55" rx="4" fill="#F59E0B" fill-opacity="0.8"/>
  <rect x="714" y="390" width="225" height="55" rx="4" fill="#8B5CF6" fill-opacity="0.8"/>
  <rect x="942" y="390" width="78" height="55" rx="4" fill="#EF4444" fill-opacity="0.4"/>
  <text x="100" y="423" text-anchor="end" font-size="14" font-weight="bold" fill="#657786">500〜600</text>
  <text x="210" y="423" text-anchor="middle" font-size="12" fill="#FFFFFF">語彙（20%）</text>
  <text x="393" y="423" text-anchor="middle" font-size="12" fill="#FFFFFF">文法（20%）</text>
  <text x="598" y="423" text-anchor="middle" font-size="13" fill="#FBBF24">長文読解（25%）</text>
  <text x="826" y="423" text-anchor="middle" font-size="13" fill="#C4B5FD">聴解精度（25%）</text>
  <text x="981" y="423" text-anchor="middle" font-size="11" fill="#FCA5A5">速度</text>

  <!-- 600点の壁 marker -->
  <line x1="80" y1="387" x2="1080" y2="387" stroke="#EF4444" stroke-width="3" stroke-dasharray="8,4"/>
  <rect x="420" y="368" width="360" height="24" rx="5" fill="#EF4444"/>
  <text x="600" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">⚡ ここが「600点の壁」 — 必要スキルが変わる</text>

  <!-- 600〜730点 -->
  <rect x="120" y="315" width="900" height="55" rx="0"/>
  <rect x="120" y="315" width="90" height="55" rx="4" fill="#1DA1F2" fill-opacity="0.6"/>
  <rect x="213" y="315" width="90" height="55" rx="4" fill="#60A5FA" fill-opacity="0.6"/>
  <rect x="306" y="315" width="180" height="55" rx="4" fill="#F59E0B" fill-opacity="0.8"/>
  <rect x="489" y="315" width="180" height="55" rx="4" fill="#8B5CF6" fill-opacity="0.8"/>
  <rect x="672" y="315" width="270" height="55" rx="4" fill="#EF4444" fill-opacity="0.8"/>
  <rect x="945" y="315" width="75" height="55" rx="4" fill="#10B981" fill-opacity="0.7"/>
  <text x="100" y="348" text-anchor="end" font-size="14" font-weight="bold" fill="#1DA1F2">600〜730</text>
  <text x="165" y="348" text-anchor="middle" font-size="10" fill="#FFFFFF">語彙</text>
  <text x="258" y="348" text-anchor="middle" font-size="10" fill="#FFFFFF">文法</text>
  <text x="396" y="348" text-anchor="middle" font-size="13" fill="#FBBF24">読解速度（20%）</text>
  <text x="579" y="348" text-anchor="middle" font-size="13" fill="#C4B5FD">聴解速度（20%）</text>
  <text x="807" y="348" text-anchor="middle" font-size="13" fill="#FCA5A5">処理速度 全体（30%）</text>
  <text x="982" y="348" text-anchor="middle" font-size="11" fill="#6EE7B7">音読</text>

  <!-- 730〜900点 -->
  <rect x="120" y="250" width="900" height="55" rx="0"/>
  <rect x="120" y="250" width="90" height="55" rx="4" fill="#1DA1F2" fill-opacity="0.4"/>
  <rect x="213" y="250" width="90" height="55" rx="4" fill="#60A5FA" fill-opacity="0.4"/>
  <rect x="306" y="250" width="135" height="55" rx="4" fill="#F59E0B" fill-opacity="0.6"/>
  <rect x="444" y="250" width="135" height="55" rx="4" fill="#8B5CF6" fill-opacity="0.6"/>
  <rect x="582" y="250" width="360" height="55" rx="4" fill="#EF4444" fill-opacity="0.9"/>
  <rect x="945" y="250" width="75" height="55" rx="4" fill="#10B981" fill-opacity="0.9"/>
  <text x="100" y="283" text-anchor="end" font-size="14" font-weight="bold" fill="#1DA1F2">730〜900</text>
  <text x="165" y="283" text-anchor="middle" font-size="10" fill="#93C5FD">語彙</text>
  <text x="258" y="283" text-anchor="middle" font-size="10" fill="#BFDBFE">文法</text>
  <text x="373" y="283" text-anchor="middle" font-size="12" fill="#FBBF24">速読（15%）</text>
  <text x="511" y="283" text-anchor="middle" font-size="12" fill="#C4B5FD">速聴（15%）</text>
  <text x="762" y="283" text-anchor="middle" font-size="13" fill="#FCA5A5">処理速度の極限向上（40%）</text>
  <text x="982" y="283" text-anchor="middle" font-size="11" fill="#6EE7B7">速音読</text>

  <!-- Legend -->
  <rect x="120" y="198" width="15" height="15" rx="2" fill="#1DA1F2"/>
  <text x="142" y="211" font-size="12" fill="#93C5FD">語彙</text>
  <rect x="200" y="198" width="15" height="15" rx="2" fill="#60A5FA"/>
  <text x="222" y="211" font-size="12" fill="#BFDBFE">文法</text>
  <rect x="280" y="198" width="15" height="15" rx="2" fill="#F59E0B"/>
  <text x="302" y="211" font-size="12" fill="#FCD34D">読解</text>
  <rect x="360" y="198" width="15" height="15" rx="2" fill="#8B5CF6"/>
  <text x="382" y="211" font-size="12" fill="#C4B5FD">聴解</text>
  <rect x="440" y="198" width="15" height="15" rx="2" fill="#EF4444"/>
  <text x="462" y="211" font-size="12" fill="#FCA5A5">処理速度</text>
  <rect x="560" y="198" width="15" height="15" rx="2" fill="#10B981"/>
  <text x="582" y="211" font-size="12" fill="#6EE7B7">音読</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
