<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bdc3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95a5a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8fd8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="700" fill="#14171A">
    聞き流し vs 能動的聴取 — 脳内処理の違い
  </text>

  <!-- ===== LEFT PANEL: BGM Processing ===== -->
  <rect x="60" y="90" width="490" height="510" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="60" y="90" width="490" height="56" rx="20" fill="url(#bgmGrad)"/>
  <rect x="60" y="122" width="490" height="24" fill="#95a5a6"/>

  <text x="305" y="128" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="white">
    聞き流し（BGM処理）
  </text>

  <!-- Brain outline left -->
  <ellipse cx="305" cy="260" rx="110" ry="95" fill="#f0f0f0" stroke="#bdc3c7" stroke-width="2"/>
  <text x="305" y="248" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36">🧠</text>
  <text x="305" y="280" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">処理エリア：最小限</text>

  <!-- Activity bars - flat -->
  <text x="135" y="390" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">聴覚野</text>
  <rect x="200" y="378" width="220" height="16" rx="8" fill="#e8e8e8"/>
  <rect x="200" y="378" width="60" height="16" rx="8" fill="#bdc3c7"/>

  <text x="135" y="420" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">意味処理</text>
  <rect x="200" y="408" width="220" height="16" rx="8" fill="#e8e8e8"/>
  <rect x="200" y="408" width="20" height="16" rx="8" fill="#bdc3c7"/>

  <text x="135" y="450" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">記憶定着</text>
  <rect x="200" y="438" width="220" height="16" rx="8" fill="#e8e8e8"/>
  <rect x="200" y="438" width="10" height="16" rx="8" fill="#bdc3c7"/>

  <text x="135" y="480" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">注意リソース</text>
  <rect x="200" y="468" width="220" height="16" rx="8" fill="#e8e8e8"/>
  <rect x="200" y="468" width="30" height="16" rx="8" fill="#bdc3c7"/>

  <!-- Result label -->
  <rect x="165" y="508" width="280" height="44" rx="10" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="305" y="527" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#95a5a6">
    脳はスルー → 成長なし
  </text>
  <text x="305" y="545" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">
    意味不明な音 = 環境音と同じ扱い
  </text>

  <!-- ===== RIGHT PANEL: Active Listening ===== -->
  <rect x="650" y="90" width="490" height="510" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="650" y="90" width="490" height="56" rx="20" fill="url(#activeGrad)"/>
  <rect x="650" y="122" width="490" height="24" fill="#0d8fd8"/>

  <text x="895" y="128" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="white">
    能動的聴取（原因特定サイクル）
  </text>

  <!-- Brain outline right - active glow -->
  <ellipse cx="895" cy="260" rx="110" ry="95" fill="#e8f4fd" stroke="#1DA1F2" stroke-width="2.5"/>
  <!-- Activity dots -->
  <circle cx="845" cy="230" r="8" fill="#1DA1F2" opacity="0.7"/>
  <circle cx="870" cy="215" r="6" fill="#1DA1F2" opacity="0.5"/>
  <circle cx="920" cy="225" r="9" fill="#1DA1F2" opacity="0.8"/>
  <circle cx="940" cy="250" r="7" fill="#1DA1F2" opacity="0.6"/>
  <circle cx="860" cy="270" r="10" fill="#1DA1F2" opacity="0.9"/>
  <circle cx="910" cy="275" r="8" fill="#1DA1F2" opacity="0.7"/>
  <text x="895" y="248" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36">🧠</text>
  <text x="895" y="282" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2" font-weight="600">処理エリア：フル活性化</text>

  <!-- Activity bars - full -->
  <text x="725" y="390" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">聴覚野</text>
  <rect x="790" y="378" width="220" height="16" rx="8" fill="#e8f4fd"/>
  <rect x="790" y="378" width="200" height="16" rx="8" fill="#1DA1F2"/>

  <text x="725" y="420" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">意味処理</text>
  <rect x="790" y="408" width="220" height="16" rx="8" fill="#e8f4fd"/>
  <rect x="790" y="408" width="210" height="16" rx="8" fill="#1DA1F2"/>

  <text x="725" y="450" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">記憶定着</text>
  <rect x="790" y="438" width="220" height="16" rx="8" fill="#e8f4fd"/>
  <rect x="790" y="438" width="185" height="16" rx="8" fill="#1DA1F2"/>

  <text x="725" y="480" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">注意リソース</text>
  <rect x="790" y="468" width="220" height="16" rx="8" fill="#e8f4fd"/>
  <rect x="790" y="468" width="220" height="16" rx="8" fill="#1DA1F2"/>

  <!-- Result label -->
  <rect x="755" y="508" width="280" height="44" rx="10" fill="#e8f4fd" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="895" y="527" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1DA1F2">
    脳がフル回転 → 着実に成長
  </text>
  <text x="895" y="545" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">
    聞こえた音に意味を結びつける回路が鍛わる
  </text>

  <!-- VS badge -->
  <circle cx="600" cy="340" r="36" fill="#14171A" filter="url(#shadow)"/>
  <text x="600" y="348" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="white">VS</text>

  <!-- Arrow cycle right side -->
  <text x="895" y="620" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2" font-weight="600">
    ▶ 聞き取れない → 原因特定 → 再挑戦 → 耳が育つ
  </text>

  <!-- Credit -->
  <text x="1175" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
