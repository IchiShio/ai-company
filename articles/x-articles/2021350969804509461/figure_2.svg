<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#14171A">
    聞き取れなかった原因特定チェックリスト
  </text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">
    「なぜ聞き取れなかったか」を特定するだけで、次の再挑戦が何倍も効果的になる
  </text>

  <!-- ===== Card 1: 音変化 ===== -->
  <rect x="60" y="108" width="520" height="220" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="60" y="108" width="520" height="6" rx="3" fill="#1DA1F2"/>
  <text x="85" y="148" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#1DA1F2">🔗  音変化（connected speech）</text>
  <line x1="85" y1="158" x2="555" y2="158" stroke="#e8f4fd" stroke-width="1.5"/>

  <text x="85" y="182" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 単語が繋がって聞こえた（連結: "want to" → "wanna"）</text>
  <text x="85" y="207" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 音が消えた・弱くなった（脱落: "last time" → "las' time"）</text>
  <text x="85" y="232" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 母音が曖昧に聞こえた（短縮化: "I am" → "I'm"）</text>
  <text x="85" y="257" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 子音が変化・同化した（同化: "did you" → "didja"）</text>
  <text x="85" y="297" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2" font-weight="600">→ 対策: シャドーイングで音変化パターンを体に覚えさせる</text>

  <!-- ===== Card 2: 語彙 ===== -->
  <rect x="620" y="108" width="520" height="220" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="620" y="108" width="520" height="6" rx="3" fill="#657786"/>
  <text x="645" y="148" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#657786">📚  語彙・表現の未知</text>
  <line x1="645" y1="158" x2="1115" y2="158" stroke="#f0f0f0" stroke-width="1.5"/>

  <text x="645" y="182" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 単語は知っているが発音が一致しなかった</text>
  <text x="645" y="207" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ そもそもその単語・表現を知らなかった</text>
  <text x="645" y="232" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ イディオム・慣用句として意味が取れなかった</text>
  <text x="645" y="257" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 専門用語・固有名詞で詰まった</text>
  <text x="645" y="297" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" font-weight="600">→ 対策: 音と意味をセットで記憶。発音記号も確認する</text>

  <!-- ===== Card 3: 速度 ===== -->
  <rect x="60" y="355" width="520" height="220" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="60" y="355" width="520" height="6" rx="3" fill="#14171A"/>
  <text x="85" y="394" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#14171A">⚡  処理速度の不足</text>
  <line x1="85" y1="404" x2="555" y2="404" stroke="#f0f0f0" stroke-width="1.5"/>

  <text x="85" y="428" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 聞こえたが意味処理が追いつかなかった</text>
  <text x="85" y="453" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 前の文を考えている間に次が来てしまった</text>
  <text x="85" y="478" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 0.75倍速なら理解できる内容だった</text>
  <text x="85" y="503" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 話題の切り替えで一瞬ついていけなくなった</text>
  <text x="85" y="543" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A" font-weight="600">→ 対策: 0.75倍→1.0倍→1.25倍と段階的にスピードを上げる</text>

  <!-- ===== Card 4: アクセント ===== -->
  <rect x="620" y="355" width="520" height="220" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="620" y="355" width="520" height="6" rx="3" fill="#e8b04a"/>
  <text x="645" y="394" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#c49a2a">🌍  アクセント・方言の差異</text>
  <line x1="645" y1="404" x2="1115" y2="404" stroke="#fdf4e0" stroke-width="1.5"/>

  <text x="645" y="428" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 聞き慣れていない英語圏のアクセントだった</text>
  <text x="645" y="453" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 母音の音価が学習中のものと違った（英 vs 米など）</text>
  <text x="645" y="478" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ ストレス（強勢）の位置が想定と異なった</text>
  <text x="645" y="503" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A">□ 話し手特有のリズム・イントネーションが独特だった</text>
  <text x="645" y="543" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#c49a2a" font-weight="600">→ 対策: 多様な話者の音源に意図的に触れて耳を広げる</text>

  <!-- Bottom note -->
  <text x="600" y="630" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2" font-weight="700">
    ✔ チェックが入った項目が「今日の練習テーマ」。それだけ集中して再挑戦しよう
  </text>

  <!-- Credit -->
  <text x="1175" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
