<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#394553;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5668;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0e4d7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1278bc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d5c36;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#17BF63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="4" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF">処理の深さと記憶定着率</text>
  <text x="600" y="85" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#657786">関与負荷仮説（Hulstijn &amp; Laufer, 2001）に基づく比較</text>

  <!-- Chart area -->
  <!-- Y axis label -->
  <text x="42" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786" transform="rotate(-90, 42, 350)">記憶定着率（相対値）</text>

  <!-- Y axis ticks -->
  <line x1="110" y1="140" x2="110" y2="520" stroke="#2a3a4a" stroke-width="1.5" />
  <line x1="105" y1="140" x2="1100" y2="140" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="105" y1="235" x2="1100" y2="235" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="105" y1="330" x2="1100" y2="330" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="105" y1="425" x2="1100" y2="425" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="105" y1="520" x2="1100" y2="520" stroke="#657786" stroke-width="1.5" />

  <text x="95" y="144" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">100%</text>
  <text x="95" y="239" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">75%</text>
  <text x="95" y="334" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">50%</text>
  <text x="95" y="429" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">25%</text>
  <text x="95" y="524" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">0%</text>

  <!-- Bar 1: 見るだけ (20%) -->
  <rect x="180" y="444" width="220" height="76" rx="6" fill="url(#bar1)" />
  <text x="290" y="436" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#8899AA">20%</text>
  <text x="290" y="545" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#AAB8C2">見るだけ</text>
  <text x="290" y="567" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（単語帳を眺める）</text>
  <!-- low involvement badge -->
  <rect x="216" y="450" width="168" height="24" rx="6" fill="#2a3340" />
  <text x="300" y="466" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">関与負荷: 低</text>

  <!-- Bar 2: 穴埋め (55%) -->
  <rect x="490" y="310" width="220" height="210" rx="6" fill="url(#bar2)" />
  <text x="600" y="302" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#1DA1F2">55%</text>
  <text x="600" y="545" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#AAB8C2">穴埋め問題</text>
  <text x="600" y="567" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（選択・空欄補充）</text>
  <rect x="526" y="316" width="148" height="24" rx="6" fill="#0a2a4a" />
  <text x="600" y="332" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">関与負荷: 中</text>

  <!-- Bar 3: 作文 (90%) -->
  <rect x="800" y="163" width="220" height="357" rx="6" fill="url(#bar3)" />
  <text x="910" y="153" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#17BF63">90%</text>
  <text x="910" y="545" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#AAB8C2">自分で作文</text>
  <text x="910" y="567" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（使って作文する）</text>
  <rect x="836" y="169" width="148" height="24" rx="6" fill="#0a2d1a" />
  <text x="910" y="185" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#17BF63">関与負荷: 高</text>

  <!-- Source note -->
  <text x="600" y="632" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#3a4a5a">※図は Hulstijn &amp; Laufer (2001) の関与負荷仮説に基づく概念的比較。実験値は研究条件により異なる。</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
