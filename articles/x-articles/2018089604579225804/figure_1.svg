<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg_p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tier1_g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#657786;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#3a4550;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="tier2_g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#c47414;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="tier3_g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0d7fc4;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg_p3)" />

  <!-- Title -->
  <text x="600" y="56" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="27" font-weight="700" fill="#ffffff" text-anchor="middle">英語力の3層ピラミッド</text>
  <text x="600" y="86" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#657786" text-anchor="middle">「知識」と「スキル」は脳の別々の領域で処理される</text>
  <line x1="80" y1="104" x2="1120" y2="104" stroke="#657786" stroke-opacity="0.3" stroke-width="1"/>

  <!-- PYRAMID (left side) -->
  <!-- Tier 1 - BOTTOM: 勉強（知識） -->
  <polygon points="200,530 800,530 680,380 320,380" fill="url(#tier1_g)" stroke="#657786" stroke-width="1.5"/>
  <text x="500" y="465" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">勉強（知識の習得）</text>
  <text x="500" y="493" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">参考書を読む・文法を覚える・単語を暗記する</text>
  <text x="500" y="515" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#AAB8C2" text-anchor="middle">宣言的記憶 / 知っている状態</text>

  <!-- Tier 2 - MIDDLE: 運用（使う練習） -->
  <polygon points="320,375 680,375 600,245 400,245" fill="url(#tier2_g)" stroke="#F7931A" stroke-width="1.5"/>
  <text x="500" y="318" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">運用（使う練習）</text>
  <text x="500" y="342" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">音読・シャドーイング・会話練習</text>
  <text x="500" y="362" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#ffe0b2" text-anchor="middle">手続き的知識への変換プロセス</text>

  <!-- Tier 3 - TOP: スキル（自動化） -->
  <polygon points="400,240 600,240 500,130" fill="url(#tier3_g)" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="500" y="200" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">スキル</text>
  <text x="500" y="222" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cce8ff" text-anchor="middle">自動的に使える</text>

  <!-- RIGHT side: explanation panels -->
  <!-- Panel 1 -->
  <rect x="850" y="118" width="310" height="120" rx="10" fill="#657786" fill-opacity="0.12" stroke="#657786" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="870" y="145" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#AAB8C2">Lv.1 勉強（知識）</text>
  <text x="870" y="170" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">ルールを「知っている」状態</text>
  <text x="870" y="192" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">試験には役立つが会話では</text>
  <text x="870" y="214" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">使えないことが多い</text>
  <line x1="848" y1="258" x2="852" y2="454" stroke="#657786" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Panel 2 -->
  <rect x="850" y="268" width="310" height="120" rx="10" fill="#F7931A" fill-opacity="0.1" stroke="#F7931A" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="870" y="295" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#F7931A">Lv.2 運用（練習）</text>
  <text x="870" y="320" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">知識を「使ってみる」段階</text>
  <text x="870" y="342" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">間違えながら体に染み込ませる</text>
  <text x="870" y="364" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#F7931A">← ここが最重要ステップ</text>

  <!-- Panel 3 -->
  <rect x="850" y="418" width="310" height="120" rx="10" fill="#1DA1F2" fill-opacity="0.1" stroke="#1DA1F2" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="870" y="445" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">Lv.3 スキル（自動化）</text>
  <text x="870" y="470" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">考えなくても英語が出る状態</text>
  <text x="870" y="492" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#cccccc">手続き記憶として自動化済み</text>
  <text x="870" y="514" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2">= 自転車に乗れる状態</text>

  <!-- Arrow between panels -->
  <text x="1005" y="253" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" fill="#F7931A" text-anchor="middle">↓</text>
  <text x="1005" y="410" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" fill="#1DA1F2" text-anchor="middle">↓</text>

  <!-- Bottom callout -->
  <rect x="80" y="552" width="760" height="60" rx="10" fill="#1DA1F2" fill-opacity="0.10" stroke="#1DA1F2" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="120" y="577" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700">Key Point:</text>
  <text x="230" y="577" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#cccccc">Lv.1→Lv.2→Lv.3 のルートを省略することはできない。</text>
  <text x="120" y="600" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#cccccc">参考書だけではLv.1止まり。Lv.2の「使う時間」を増やすことが唯一の近道。</text>

  <!-- Credit -->
  <text x="1168" y="658" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2" text-anchor="end">@ichi_eigo</text>
</svg>
