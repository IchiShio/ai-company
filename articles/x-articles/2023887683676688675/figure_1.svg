<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8fd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#AAB8C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a9aa6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="1200" height="6" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32" font-weight="700" fill="#14171A">文法書精読 vs パターン音読：定着率の差</text>
  <text x="600" y="96" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#657786">同じ1時間の学習で、どちらが記憶に残るか？</text>

  <!-- Chart area -->
  <!-- Y-axis label -->
  <text x="68" y="400" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786" transform="rotate(-90, 68, 380)">定着率（1週間後）</text>

  <!-- Y-axis lines and labels -->
  <line x1="120" y1="150" x2="1080" y2="150" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="230" x2="1080" y2="230" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="310" x2="1080" y2="310" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="390" x2="1080" y2="390" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="470" x2="1080" y2="470" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="550" x2="1080" y2="550" stroke="#AAB8C2" stroke-width="1.5"/>

  <text x="108" y="154" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">100%</text>
  <text x="108" y="234" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">80%</text>
  <text x="108" y="314" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">60%</text>
  <text x="108" y="394" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">40%</text>
  <text x="108" y="474" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">20%</text>
  <text x="108" y="554" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">0%</text>

  <!-- Bar 1: 文法書精読 (25%) -->
  <rect x="200" y="450" width="200" height="100" fill="url(#barGray)" rx="6" ry="6"/>
  <text x="300" y="440" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#657786">25%</text>
  <text x="300" y="580" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#14171A" font-weight="600">文法書精読</text>
  <text x="300" y="602" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">1回じっくり読む</text>

  <!-- Bar 2: 分散学習 (55%) -->
  <rect x="500" y="330" width="200" height="220" fill="#AAB8C2" rx="6" ry="6"/>
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#657786">55%</text>
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#14171A" font-weight="600">例文暗記</text>
  <text x="600" y="602" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">例文を書いて覚える</text>

  <!-- Bar 3: パターン音読 (82%) -->
  <rect x="800" y="206" width="200" height="344" fill="url(#barBlue)" rx="6" ry="6"/>
  <text x="900" y="195" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32" font-weight="700" fill="#1DA1F2">82%</text>
  <text x="900" y="580" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#14171A" font-weight="600">パターン音読 ✓</text>
  <text x="900" y="602" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2" font-weight="600">同じ構文を20回音読</text>

  <!-- Annotation -->
  <rect x="740" y="152" width="310" height="36" fill="#1DA1F2" rx="18"/>
  <text x="895" y="175" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="white" font-weight="700">精読の3.3倍の定着率！</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2">@ichi_eigo</text>
</svg>
