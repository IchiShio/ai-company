<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="30" font-weight="bold" fill="#14171A">最適学習スケジュール — 週間カレンダー</text>
  <text x="600" y="80" text-anchor="middle" font-size="17" fill="#657786">週3回×30分。「ちょっとキツい」を週3回維持する</text>

  <!-- Day headers -->
  <rect x="50" y="100" width="156" height="46" rx="8" fill="#E1E8ED"/>
  <rect x="216" y="100" width="156" height="46" rx="8" fill="#1DA1F2"/>
  <rect x="382" y="100" width="156" height="46" rx="8" fill="#E1E8ED"/>
  <rect x="548" y="100" width="156" height="46" rx="8" fill="#1DA1F2"/>
  <rect x="714" y="100" width="156" height="46" rx="8" fill="#E1E8ED"/>
  <rect x="880" y="100" width="156" height="46" rx="8" fill="#1DA1F2"/>
  <rect x="1046" y="100" width="104" height="46" rx="8" fill="#E1E8ED"/>

  <text x="128" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#657786">月曜</text>
  <text x="294" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">火曜</text>
  <text x="460" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#657786">水曜</text>
  <text x="626" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">木曜</text>
  <text x="792" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#657786">金曜</text>
  <text x="958" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">土曜</text>
  <text x="1098" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#657786">日曜</text>

  <!-- Rest days -->
  <rect x="50" y="156" width="156" height="220" rx="12" fill="#FFFFFF" opacity="0.6" filter="url(#shadow)"/>
  <text x="128" y="256" text-anchor="middle" font-size="30" fill="#E1E8ED">😴</text>
  <text x="128" y="292" text-anchor="middle" font-size="16" fill="#AAB8C2">休息日</text>
  <text x="128" y="316" text-anchor="middle" font-size="13" fill="#AAB8C2">記憶の固定化</text>
  <text x="128" y="336" text-anchor="middle" font-size="13" fill="#AAB8C2">（consolidation）</text>

  <rect x="382" y="156" width="156" height="220" rx="12" fill="#FFFFFF" opacity="0.6" filter="url(#shadow)"/>
  <text x="460" y="256" text-anchor="middle" font-size="30" fill="#E1E8ED">😴</text>
  <text x="460" y="292" text-anchor="middle" font-size="16" fill="#AAB8C2">休息日</text>
  <text x="460" y="316" text-anchor="middle" font-size="13" fill="#AAB8C2">記憶の固定化</text>
  <text x="460" y="336" text-anchor="middle" font-size="13" fill="#AAB8C2">（consolidation）</text>

  <rect x="714" y="156" width="156" height="220" rx="12" fill="#FFFFFF" opacity="0.6" filter="url(#shadow)"/>
  <text x="792" y="256" text-anchor="middle" font-size="30" fill="#E1E8ED">😴</text>
  <text x="792" y="292" text-anchor="middle" font-size="16" fill="#AAB8C2">休息日</text>
  <text x="792" y="316" text-anchor="middle" font-size="13" fill="#AAB8C2">記憶の固定化</text>
  <text x="792" y="336" text-anchor="middle" font-size="13" fill="#AAB8C2">（consolidation）</text>

  <rect x="1046" y="156" width="104" height="220" rx="12" fill="#FFFFFF" opacity="0.6" filter="url(#shadow)"/>
  <text x="1098" y="256" text-anchor="middle" font-size="30" fill="#E1E8ED">😴</text>
  <text x="1098" y="292" text-anchor="middle" font-size="16" fill="#AAB8C2">休息</text>

  <!-- Active days (火・木・土) -->
  <!-- 火曜 -->
  <rect x="216" y="156" width="156" height="220" rx="12" fill="#1DA1F2" filter="url(#shadow)"/>
  <text x="294" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">30分 集中</text>
  <rect x="228" y="200" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="294" y="223" text-anchor="middle" font-size="13" fill="#FFFFFF">📥 インプット 10分</text>
  <rect x="228" y="244" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="294" y="267" text-anchor="middle" font-size="13" fill="#FFFFFF">🔍 検証 10分</text>
  <rect x="228" y="288" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="294" y="311" text-anchor="middle" font-size="13" fill="#FFFFFF">📤 アウトプット 10分</text>
  <text x="294" y="352" text-anchor="middle" font-size="12" fill="#D6EBFB">ちょっとキツい強度で</text>

  <!-- 木曜 -->
  <rect x="548" y="156" width="156" height="220" rx="12" fill="#1DA1F2" filter="url(#shadow)"/>
  <text x="626" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">30分 集中</text>
  <rect x="560" y="200" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="626" y="223" text-anchor="middle" font-size="13" fill="#FFFFFF">📥 インプット 10分</text>
  <rect x="560" y="244" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="626" y="267" text-anchor="middle" font-size="13" fill="#FFFFFF">🔍 検証 10分</text>
  <rect x="560" y="288" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="626" y="311" text-anchor="middle" font-size="13" fill="#FFFFFF">📤 アウトプット 10分</text>
  <text x="626" y="352" text-anchor="middle" font-size="12" fill="#D6EBFB">火曜より難度アップ</text>

  <!-- 土曜 -->
  <rect x="880" y="156" width="156" height="220" rx="12" fill="#1DA1F2" filter="url(#shadow)"/>
  <text x="958" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">30分 集中</text>
  <rect x="892" y="200" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="958" y="223" text-anchor="middle" font-size="13" fill="#FFFFFF">📥 インプット 10分</text>
  <rect x="892" y="244" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="958" y="267" text-anchor="middle" font-size="13" fill="#FFFFFF">🔍 週の総復習 10分</text>
  <rect x="892" y="288" width="132" height="36" rx="8" fill="#FFFFFF" opacity="0.2"/>
  <text x="958" y="311" text-anchor="middle" font-size="13" fill="#FFFFFF">📤 アウトプット 10分</text>
  <text x="958" y="352" text-anchor="middle" font-size="12" fill="#D6EBFB">週の締め・定着確認</text>

  <!-- NG example -->
  <rect x="50" y="406" width="500" height="130" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="50" y="406" width="500" height="8" rx="4" fill="#E0245E"/>
  <text x="300" y="440" text-anchor="middle" font-size="17" font-weight="bold" fill="#E0245E">NG: 毎日ダラダラ10分パターン</text>
  <text x="300" y="468" text-anchor="middle" font-size="14" fill="#657786">月〜日 毎日10分、スマホをいじりながら、</text>
  <text x="300" y="490" text-anchor="middle" font-size="14" fill="#657786">同じ教材を流し見。「やった気」だけ残る。</text>
  <text x="300" y="518" text-anchor="middle" font-size="13" fill="#AAB8C2">負荷ゼロ = 脳への刺激ゼロ = 定着率低下</text>

  <!-- OK example -->
  <rect x="610" y="406" width="540" height="130" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="610" y="406" width="540" height="8" rx="4" fill="#1DA1F2"/>
  <text x="880" y="440" text-anchor="middle" font-size="17" font-weight="bold" fill="#1DA1F2">OK: 週3回×30分 集中パターン</text>
  <text x="880" y="468" text-anchor="middle" font-size="14" fill="#657786">火・木・土の30分。スマホを閉じて、</text>
  <text x="880" y="490" text-anchor="middle" font-size="14" fill="#657786">ちょっとキツいと感じる問題に向き合う。</text>
  <text x="880" y="518" text-anchor="middle" font-size="13" fill="#1DA1F2">適度な負荷 = 望ましい困難 = 長期記憶定着</text>

  <!-- Bottom rule -->
  <rect x="100" y="558" width="1000" height="52" rx="14" fill="#14171A"/>
  <text x="600" y="589" text-anchor="middle" font-size="17" fill="#FFFFFF">
    <tspan font-weight="bold" fill="#1DA1F2">鉄則：</tspan>
    <tspan fill="#FFFFFF">「週3回やれる強度」より「毎日できる簡単さ」を選んではいけない</tspan>
  </text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18">@ichi_eigo</text>
</svg>
