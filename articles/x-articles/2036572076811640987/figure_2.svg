<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d7bbf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38b2ac;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2c7a7b;stop-opacity:1"/>
    </linearGradient>
    <filter id="nodeShadow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1DA1F2"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="675" fill="url(#bg4)"/>

  <!-- タイトル -->
  <text x="600" y="50" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle">最適復習タイムライン</text>
  <text x="600" y="76" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786" text-anchor="middle">「80%覚えているうち」に復習 → 記憶が長期定着へ</text>

  <!-- タイムライン軸 -->
  <line x1="80" y1="340" x2="1140" y2="340" stroke="#2d4a5c" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 軸ラベル -->
  <text x="80" y="370" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">学習</text>
  <text x="1100" y="370" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">定着</text>

  <!-- ノード定義: x位置、ラベル、サブラベル、経過時間 -->
  <!-- ノード1: 学習（直後） -->
  <circle cx="130" cy="340" r="36" fill="url(#nodeGrad1)" filter="url(#nodeShadow)"/>
  <text x="130" y="336" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">学習</text>
  <text x="130" y="354" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0eeff" text-anchor="middle">直後</text>
  <text x="130" y="395" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#4fc3f7" text-anchor="middle">Day 0</text>

  <!-- ノード2: 復習1回目（1時間後） -->
  <circle cx="290" cy="340" r="34" fill="url(#nodeGrad1)" filter="url(#nodeShadow)" opacity="0.9"/>
  <text x="290" y="334" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">復習①</text>
  <text x="290" y="351" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0eeff" text-anchor="middle">1時間後</text>
  <text x="290" y="393" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#4fc3f7" text-anchor="middle">+1h</text>

  <!-- ノード3: 復習2回目（翌日） -->
  <circle cx="470" cy="340" r="36" fill="url(#nodeGrad1)" filter="url(#nodeShadow)" opacity="0.88"/>
  <text x="470" y="334" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">復習②</text>
  <text x="470" y="351" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0eeff" text-anchor="middle">翌日</text>
  <text x="470" y="395" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#4fc3f7" text-anchor="middle">+1 day</text>

  <!-- ノード4: 復習3回目（4日後） -->
  <circle cx="660" cy="340" r="38" fill="url(#nodeGrad2)" filter="url(#nodeShadow)" opacity="0.88"/>
  <text x="660" y="334" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">復習③</text>
  <text x="660" y="351" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0eeff" text-anchor="middle">4日後</text>
  <text x="660" y="398" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#38b2ac" text-anchor="middle">+4 days</text>

  <!-- ノード5: 復習4回目（2週間後） -->
  <circle cx="860" cy="340" r="40" fill="url(#nodeGrad2)" filter="url(#nodeShadow)" opacity="0.85"/>
  <text x="860" y="333" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">復習④</text>
  <text x="860" y="350" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#d0eeff" text-anchor="middle">2週間後</text>
  <text x="860" y="401" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#38b2ac" text-anchor="middle">+2 weeks</text>

  <!-- ノード6: 復習5回目（1ヶ月後） -->
  <circle cx="1060" cy="340" r="44" fill="#276749" filter="url(#nodeShadow)" opacity="0.9" stroke="#48bb78" stroke-width="2"/>
  <text x="1060" y="332" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">復習⑤</text>
  <text x="1060" y="349" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#9ae6b4" text-anchor="middle">1ヶ月後</text>
  <text x="1060" y="405" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#48bb78" text-anchor="middle">+1 month</text>
  <text x="1060" y="422" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#9ae6b4" text-anchor="middle">長期定着!</text>

  <!-- 間隔の視覚表現（波型） -->
  <!-- 各ノード間の「間隔が広がる」ことを示す矢印下の注釈 -->
  <text x="210" y="460" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">1h</text>
  <text x="380" y="460" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">23h</text>
  <text x="565" y="460" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#38b2ac" text-anchor="middle">3日</text>
  <text x="760" y="460" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#38b2ac" text-anchor="middle">10日</text>
  <text x="960" y="460" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#48bb78" text-anchor="middle">2週間</text>

  <!-- 「間隔が広がる」注釈 -->
  <rect x="380" y="480" width="440" height="40" fill="#1a2535" rx="20" opacity="0.85"/>
  <text x="600" y="506" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#4fc3f7" text-anchor="middle">復習するたびに間隔が広がる → 少ない労力で長期記憶へ</text>

  <!-- 上部: 記憶強度の上昇を示す矢印 -->
  <line x1="130" y1="295" x2="1060" y2="286" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrow)"/>
  <text x="600" y="276" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2" text-anchor="middle" opacity="0.8">記憶強度が回を追うごとに強化される</text>

  <!-- 80%ルール -->
  <rect x="80" y="150" width="340" height="56" fill="#0d2844" rx="10" stroke="#1DA1F2" stroke-width="1.5" opacity="0.9"/>
  <text x="250" y="174" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="bold" fill="#1DA1F2" text-anchor="middle">Duolingo研究チームが示すポイント</text>
  <text x="250" y="197" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#4fc3f7" text-anchor="middle">「80%覚えているうちに復習」が最強</text>

  <!-- クレジット -->
  <text x="1180" y="660" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
