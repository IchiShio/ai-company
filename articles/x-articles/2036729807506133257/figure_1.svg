<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="1200" height="6" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#14171A">PREP法：ビジネス英語の4ステップフレームワーク</text>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#657786">文法より「構造」で信頼を勝ち取る</text>

  <!-- Step P -->
  <rect x="80" y="130" width="240" height="380" fill="#1DA1F2" rx="16"/>
  <text x="200" y="192" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="900" fill="white">P</text>
  <text x="200" y="232" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="white">POINT</text>
  <text x="200" y="258" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#e8f4fd">結論・主張</text>
  <line x1="120" y1="280" x2="280" y2="280" stroke="white" stroke-width="1" stroke-opacity="0.4"/>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white">"My recommendation</text>
  <text x="200" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white">is X."</text>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">まず結論を言う</text>
  <text x="200" y="392" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">日本語と逆の順序</text>
  <rect x="130" y="462" width="140" height="30" fill="white" fill-opacity="0.2" rx="15"/>
  <text x="200" y="482" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="white" font-weight="700">①最重要</text>

  <!-- Arrow 1 -->
  <text x="355" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" fill="#1DA1F2">→</text>

  <!-- Step R -->
  <rect x="400" y="150" width="200" height="340" fill="#0d8fd9" rx="16"/>
  <text x="500" y="210" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="900" fill="white">R</text>
  <text x="500" y="250" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="white">REASON</text>
  <text x="500" y="276" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#e8f4fd">理由</text>
  <line x1="430" y1="295" x2="570" y2="295" stroke="white" stroke-width="1" stroke-opacity="0.4"/>
  <text x="500" y="325" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white">"Because..."</text>
  <text x="500" y="365" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">理由を1〜2つ</text>
  <text x="500" y="387" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">簡潔に述べる</text>
  <rect x="440" y="452" width="120" height="30" fill="white" fill-opacity="0.2" rx="15"/>
  <text x="500" y="472" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="white" font-weight="700">②</text>

  <!-- Arrow 2 -->
  <text x="635" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" fill="#1DA1F2">→</text>

  <!-- Step E -->
  <rect x="680" y="150" width="200" height="340" fill="#0d8fd9" rx="16"/>
  <text x="780" y="210" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="900" fill="white">E</text>
  <text x="780" y="250" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="white">EXAMPLE</text>
  <text x="780" y="276" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#e8f4fd">具体例</text>
  <line x1="710" y1="295" x2="850" y2="295" stroke="white" stroke-width="1" stroke-opacity="0.4"/>
  <text x="780" y="325" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white">"For example..."</text>
  <text x="780" y="365" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">数字・事例で</text>
  <text x="780" y="387" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">説得力を上げる</text>
  <rect x="720" y="452" width="120" height="30" fill="white" fill-opacity="0.2" rx="15"/>
  <text x="780" y="472" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="white" font-weight="700">③</text>

  <!-- Arrow 3 -->
  <text x="915" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" fill="#1DA1F2">→</text>

  <!-- Step P2 -->
  <rect x="960" y="130" width="200" height="380" fill="#1DA1F2" rx="16"/>
  <text x="1060" y="192" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="900" fill="white">P</text>
  <text x="1060" y="232" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="white">POINT</text>
  <text x="1060" y="258" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#e8f4fd">結論を繰り返す</text>
  <line x1="990" y1="280" x2="1150" y2="280" stroke="white" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1060" y="310" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white">"So, I think</text>
  <text x="1060" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white">we should X."</text>
  <text x="1060" y="370" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">結論で締めると</text>
  <text x="1060" y="392" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e8f4fd">記憶に残る</text>
  <rect x="1000" y="462" width="120" height="30" fill="white" fill-opacity="0.2" rx="15"/>
  <text x="1060" y="482" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="white" font-weight="700">④締め</text>

  <!-- Bottom caption -->
  <rect x="200" y="555" width="800" height="50" fill="white" stroke="#1DA1F2" stroke-width="2" rx="10"/>
  <text x="600" y="576" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#14171A" font-weight="700">文法が多少崩れても「構造が整っていれば」ネイティブは信頼する</text>
  <text x="600" y="596" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">PREP法はビジネス英語の最短ルート</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2">@ichi_eigo</text>
</svg>
