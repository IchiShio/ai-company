<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">動詞描写の練習フロー</text>
  <text x="600" y="78" text-anchor="middle" fill="#657786" font-size="16" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">場面想像 → 動作分解 → 英語化の3ステップ</text>

  <!-- Example banner -->
  <rect x="200" y="95" width="800" height="50" fill="#2C3640" rx="8"/>
  <text x="600" y="115" text-anchor="middle" fill="#AAB8C2" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">練習例: 「映画が良かった」を伝える</text>
  <text x="600" y="135" text-anchor="middle" fill="#657786" font-size="15" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">✗ 形容詞ゾーン: "It was good / amazing / fantastic"</text>

  <!-- Step 1 -->
  <rect x="60" y="170" width="320" height="310" fill="#1A2332" rx="12" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="60" y="170" width="320" height="55" fill="#1DA1F2" rx="12"/>
  <rect x="60" y="205" width="320" height="20" fill="#1DA1F2"/>
  <text x="105" y="193" text-anchor="start" fill="#FFFFFF" font-size="28" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">STEP 1</text>
  <text x="250" y="193" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">場面を想像する</text>
  <text x="220" y="248" text-anchor="middle" fill="#AAB8C2" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「その体験のとき</text>
  <text x="220" y="272" text-anchor="middle" fill="#AAB8C2" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">自分や周りは何をしていた？」</text>
  <line x1="90" y1="292" x2="350" y2="292" stroke="#2C3640" stroke-width="1"/>
  <text x="220" y="320" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">→ 映画を見ながら前のめりになった</text>
  <text x="220" y="348" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">→ エンドロールで席を立てなかった</text>
  <text x="220" y="376" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">→ 隣の人も静かに泣いていた</text>
  <text x="220" y="440" text-anchor="middle" fill="#657786" font-size="13" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">💡 身体感覚・行動・周囲の反応を思い出す</text>

  <!-- Arrow 1→2 -->
  <polygon points="405,325 435,315 435,335" fill="#1DA1F2"/>
  <line x1="380" y1="325" x2="435" y2="325" stroke="#1DA1F2" stroke-width="3"/>

  <!-- Step 2 -->
  <rect x="440" y="170" width="320" height="310" fill="#1A2332" rx="12" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="440" y="170" width="320" height="55" fill="#1DA1F2" rx="12"/>
  <rect x="440" y="205" width="320" height="20" fill="#1DA1F2"/>
  <text x="480" y="193" text-anchor="start" fill="#FFFFFF" font-size="28" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">STEP 2</text>
  <text x="630" y="193" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">動作に分解する</text>
  <text x="600" y="248" text-anchor="middle" fill="#AAB8C2" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「感情を引き起こした</text>
  <text x="600" y="272" text-anchor="middle" fill="#AAB8C2" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">具体的な動作は何か？」</text>
  <line x1="470" y1="292" x2="730" y2="292" stroke="#2C3640" stroke-width="1"/>
  <text x="600" y="320" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">lean forward（前のめりになる）</text>
  <text x="600" y="348" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">stay seated（席を立てない）</text>
  <text x="600" y="376" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">wipe tears（涙を拭う）</text>
  <text x="600" y="440" text-anchor="middle" fill="#657786" font-size="13" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">💡 動詞+目的語の形で考える</text>

  <!-- Arrow 2→3 -->
  <polygon points="785,325 815,315 815,335" fill="#1DA1F2"/>
  <line x1="760" y1="325" x2="815" y2="325" stroke="#1DA1F2" stroke-width="3"/>

  <!-- Step 3 -->
  <rect x="820" y="170" width="330" height="310" fill="#0D1F33" rx="12" stroke="#1DA1F2" stroke-width="3"/>
  <rect x="820" y="170" width="330" height="55" fill="#1DA1F2" rx="12"/>
  <rect x="820" y="205" width="330" height="20" fill="#1DA1F2"/>
  <text x="860" y="193" text-anchor="start" fill="#FFFFFF" font-size="28" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">STEP 3</text>
  <text x="1010" y="193" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">英語化する</text>
  <text x="985" y="248" text-anchor="middle" fill="#AAB8C2" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「動作を主語+動詞で</text>
  <text x="985" y="272" text-anchor="middle" fill="#AAB8C2" font-size="15" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">シンプルな文にする」</text>
  <line x1="850" y1="292" x2="1120" y2="292" stroke="#2C3640" stroke-width="1"/>
  <text x="985" y="320" text-anchor="middle" fill="#1DA1F2" font-size="15" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"Everyone leaned forward."</text>
  <text x="985" y="350" text-anchor="middle" fill="#1DA1F2" font-size="15" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"Nobody left their seat."</text>
  <text x="985" y="380" text-anchor="middle" fill="#1DA1F2" font-size="15" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"The person next to me wept."</text>
  <rect x="860" y="420" width="250" height="34" fill="#1DA1F2" opacity="0.2" rx="6"/>
  <text x="985" y="441" text-anchor="middle" fill="#1DA1F2" font-size="14" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">これで映像が伝わる</text>

  <!-- Bottom section: Key Question -->
  <rect x="150" y="510" width="900" height="100" fill="#1A2332" rx="12" stroke="#1DA1F2" stroke-width="1"/>
  <text x="600" y="540" text-anchor="middle" fill="#1DA1F2" font-size="20" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">使える問いかけ（自分へのプロンプト）</text>
  <text x="600" y="570" text-anchor="middle" fill="#FFFFFF" font-size="17" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「"good/amazing/interesting" と言いそうになったら——</text>
  <text x="600" y="596" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="bold" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">その感情を引き起こした動作は何だった？」</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
