<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#f8f9fa"/>

  <!-- Title bar -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold">1語ずつ読み vs チャンク読み：視線移動の違い</text>

  <!-- Left Panel: 1語ずつ読み -->
  <rect x="40" y="100" width="520" height="520" rx="16" fill="white" stroke="#e1e8ed" stroke-width="2"/>
  <rect x="40" y="100" width="520" height="56" rx="16" fill="#e0245e"/>
  <rect x="40" y="136" width="520" height="20" fill="#e0245e"/>
  <text x="300" y="136" text-anchor="middle" fill="white" font-size="22" font-weight="bold">1語ずつ読み（非効率）</text>

  <!-- Sentence display - word by word -->
  <text x="300" y="200" text-anchor="middle" fill="#657786" font-size="16">サンプル文:</text>
  <text x="300" y="230" text-anchor="middle" fill="#14171A" font-size="22" font-weight="bold">"She walked in front of the store."</text>

  <!-- Word boxes with individual stops -->
  <g transform="translate(60, 260)">
    <!-- She -->
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="30" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">She</text>
    <!-- Eye stop 1 -->
    <circle cx="30" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="30" y="-7" text-anchor="middle" fill="white" font-size="11">1</text>

    <!-- walked -->
    <rect x="75" y="0" width="80" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="115" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">walked</text>
    <circle cx="115" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="115" y="-7" text-anchor="middle" fill="white" font-size="11">2</text>

    <!-- in -->
    <rect x="170" y="0" width="35" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="187" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">in</text>
    <circle cx="187" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="187" y="-7" text-anchor="middle" fill="white" font-size="11">3</text>

    <!-- front -->
    <rect x="220" y="0" width="65" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="252" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">front</text>
    <circle cx="252" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="252" y="-7" text-anchor="middle" fill="white" font-size="11">4</text>

    <!-- of -->
    <rect x="300" y="0" width="35" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="317" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">of</text>
    <circle cx="317" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="317" y="-7" text-anchor="middle" fill="white" font-size="11">5</text>

    <!-- the -->
    <rect x="350" y="0" width="44" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="372" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">the</text>
    <circle cx="372" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="372" y="-7" text-anchor="middle" fill="white" font-size="11">6</text>

    <!-- store -->
    <rect x="408" y="0" width="62" height="40" rx="6" fill="#fff3f5" stroke="#e0245e" stroke-width="2"/>
    <text x="439" y="26" text-anchor="middle" fill="#e0245e" font-size="16" font-weight="bold">store</text>
    <circle cx="439" cy="-12" r="10" fill="#e0245e" opacity="0.8"/>
    <text x="439" y="-7" text-anchor="middle" fill="white" font-size="11">7</text>

    <!-- Arrows between words -->
    <path d="M60,20 L75,20" stroke="#e0245e" stroke-width="2" marker-end="url(#arrow-red)"/>
    <path d="M155,20 L170,20" stroke="#e0245e" stroke-width="2" marker-end="url(#arrow-red)"/>
    <path d="M205,20 L220,20" stroke="#e0245e" stroke-width="2" marker-end="url(#arrow-red)"/>
    <path d="M285,20 L300,20" stroke="#e0245e" stroke-width="2" marker-end="url(#arrow-red)"/>
    <path d="M335,20 L350,20" stroke="#e0245e" stroke-width="2" marker-end="url(#arrow-red)"/>
    <path d="M394,20 L408,20" stroke="#e0245e" stroke-width="2" marker-end="url(#arrow-red)"/>
  </g>

  <!-- Stop count -->
  <text x="300" y="360" text-anchor="middle" fill="#e0245e" font-size="40" font-weight="bold">7回</text>
  <text x="300" y="390" text-anchor="middle" fill="#657786" font-size="18">視点停止（フィクセーション）</text>

  <!-- Processing time indicator -->
  <rect x="80" y="410" width="440" height="50" rx="10" fill="#fff3f5"/>
  <text x="300" y="443" text-anchor="middle" fill="#e0245e" font-size="18" font-weight="bold">処理時間：遅い / 意味把握：断片的</text>

  <!-- Problem description -->
  <text x="300" y="500" text-anchor="middle" fill="#657786" font-size="15">「in」「front」「of」を別々に処理するため</text>
  <text x="300" y="525" text-anchor="middle" fill="#657786" font-size="15">意味の統合に余分な認知負荷がかかる</text>

  <rect x="80" y="555" width="440" height="44" rx="10" fill="#14171A"/>
  <text x="300" y="582" text-anchor="middle" fill="white" font-size="17" font-weight="bold">ワーキングメモリを無駄に消費してしまう</text>

  <!-- Right Panel: チャンク読み -->
  <rect x="640" y="100" width="520" height="520" rx="16" fill="white" stroke="#e1e8ed" stroke-width="2"/>
  <rect x="640" y="100" width="520" height="56" rx="16" fill="#1DA1F2"/>
  <rect x="640" y="136" width="520" height="20" fill="#1DA1F2"/>
  <text x="900" y="136" text-anchor="middle" fill="white" font-size="22" font-weight="bold">チャンク読み（効率的）</text>

  <text x="900" y="200" text-anchor="middle" fill="#657786" font-size="16">サンプル文:</text>
  <text x="900" y="230" text-anchor="middle" fill="#14171A" font-size="22" font-weight="bold">"She walked in front of the store."</text>

  <!-- Chunk groups -->
  <g transform="translate(650, 260)">
    <!-- Chunk 1: She walked -->
    <rect x="0" y="0" width="140" height="60" rx="8" fill="#e8f5fe" stroke="#1DA1F2" stroke-width="2.5"/>
    <text x="70" y="22" text-anchor="middle" fill="#1DA1F2" font-size="13">主語＋動詞</text>
    <text x="70" y="46" text-anchor="middle" fill="#14171A" font-size="18" font-weight="bold">She walked</text>
    <circle cx="70" cy="-15" r="12" fill="#1DA1F2"/>
    <text x="70" y="-10" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>

    <!-- Arrow -->
    <path d="M140,30 L162,30" stroke="#1DA1F2" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

    <!-- Chunk 2: in front of -->
    <rect x="162" y="0" width="140" height="60" rx="8" fill="#e8f5fe" stroke="#1DA1F2" stroke-width="2.5"/>
    <text x="232" y="22" text-anchor="middle" fill="#1DA1F2" font-size="13">前置詞句</text>
    <text x="232" y="46" text-anchor="middle" fill="#14171A" font-size="18" font-weight="bold">in front of</text>
    <circle cx="232" cy="-15" r="12" fill="#1DA1F2"/>
    <text x="232" y="-10" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>

    <!-- Arrow -->
    <path d="M302,30 L324,30" stroke="#1DA1F2" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

    <!-- Chunk 3: the store -->
    <rect x="324" y="0" width="130" height="60" rx="8" fill="#e8f5fe" stroke="#1DA1F2" stroke-width="2.5"/>
    <text x="389" y="22" text-anchor="middle" fill="#1DA1F2" font-size="13">名詞句</text>
    <text x="389" y="46" text-anchor="middle" fill="#14171A" font-size="18" font-weight="bold">the store</text>
    <circle cx="389" cy="-15" r="12" fill="#1DA1F2"/>
    <text x="389" y="-10" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
  </g>

  <!-- Stop count -->
  <text x="900" y="360" text-anchor="middle" fill="#1DA1F2" font-size="40" font-weight="bold">3回</text>
  <text x="900" y="390" text-anchor="middle" fill="#657786" font-size="18">視点停止（フィクセーション）</text>

  <!-- Processing time indicator -->
  <rect x="680" y="410" width="440" height="50" rx="10" fill="#e8f5fe"/>
  <text x="900" y="443" text-anchor="middle" fill="#1DA1F2" font-size="18" font-weight="bold">処理時間：速い / 意味把握：即時</text>

  <!-- Benefit description -->
  <text x="900" y="500" text-anchor="middle" fill="#657786" font-size="15">「in front of」を1つの意味単位として</text>
  <text x="900" y="525" text-anchor="middle" fill="#657786" font-size="15">瞬時に「〜の前に」と処理できる</text>

  <rect x="680" y="555" width="440" height="44" rx="10" fill="#14171A"/>
  <text x="900" y="582" text-anchor="middle" fill="white" font-size="17" font-weight="bold">認知負荷が低くなり読解速度が大幅アップ</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e0245e"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1DA1F2"/>
    </marker>
  </defs>

  <!-- VS divider -->
  <circle cx="600" cy="360" r="36" fill="#14171A"/>
  <text x="600" y="368" text-anchor="middle" fill="white" font-size="22" font-weight="bold">VS</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" fill="#657786" font-size="16">@ichi_eigo</text>
</svg>
