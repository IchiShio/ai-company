<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title area -->
  <rect x="0" y="0" width="1200" height="110" fill="#1DA1F2" rx="0"/>
  <text x="600" y="55" font-size="38" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">英会話を伸ばす「型・パターン」5選</text>
  <text x="600" y="90" font-size="22" fill="white" text-anchor="middle" dominant-baseline="middle">文法書より「使える型」を反復練習する</text>

  <!-- Pattern boxes -->
  <!-- Pattern 1 -->
  <rect x="60" y="145" width="220" height="120" fill="#1DA1F2" rx="12"/>
  <text x="170" y="190" font-size="18" font-weight="bold" fill="white" text-anchor="middle">パターン①</text>
  <text x="170" y="220" font-size="15" fill="white" text-anchor="middle">I was wondering if...</text>
  <text x="170" y="248" font-size="13" fill="#E1E8ED" text-anchor="middle">丁寧な依頼・質問</text>

  <!-- Pattern 2 -->
  <rect x="310" y="145" width="220" height="120" fill="#1DA1F2" rx="12"/>
  <text x="420" y="190" font-size="18" font-weight="bold" fill="white" text-anchor="middle">パターン②</text>
  <text x="420" y="220" font-size="15" fill="white" text-anchor="middle">Could you tell me...?</text>
  <text x="420" y="248" font-size="13" fill="#E1E8ED" text-anchor="middle">情報を引き出す</text>

  <!-- Pattern 3 -->
  <rect x="560" y="145" width="220" height="120" fill="#1DA1F2" rx="12"/>
  <text x="670" y="190" font-size="18" font-weight="bold" fill="white" text-anchor="middle">パターン③</text>
  <text x="670" y="220" font-size="15" fill="white" text-anchor="middle">I think that...</text>
  <text x="670" y="248" font-size="13" fill="#E1E8ED" text-anchor="middle">意見を述べる</text>

  <!-- Pattern 4 -->
  <rect x="810" y="145" width="220" height="120" fill="#1DA1F2" rx="12"/>
  <text x="920" y="190" font-size="18" font-weight="bold" fill="white" text-anchor="middle">パターン④</text>
  <text x="920" y="220" font-size="15" fill="white" text-anchor="middle">What do you mean by...?</text>
  <text x="920" y="248" font-size="13" fill="#E1E8ED" text-anchor="middle">聞き返し・確認</text>

  <!-- Pattern 5 - centered below -->
  <rect x="490" y="290" width="220" height="120" fill="#0d8ecf" rx="12"/>
  <text x="600" y="335" font-size="18" font-weight="bold" fill="white" text-anchor="middle">パターン⑤</text>
  <text x="600" y="365" font-size="15" fill="white" text-anchor="middle">That reminds me of...</text>
  <text x="600" y="393" font-size="13" fill="#E1E8ED" text-anchor="middle">話題を広げる</text>

  <!-- Arrows / flow -->
  <text x="600" y="460" font-size="28" font-weight="bold" fill="#1DA1F2" text-anchor="middle">▼</text>

  <!-- Bottom flow: 3 steps -->
  <rect x="80" y="490" width="300" height="80" fill="#192734" rx="10" stroke="#1DA1F2" stroke-width="2"/>
  <text x="230" y="525" font-size="20" font-weight="bold" fill="white" text-anchor="middle">① 型を声に出す</text>
  <text x="230" y="553" font-size="15" fill="#657786" text-anchor="middle">反復・シャドーイング</text>

  <text x="430" y="532" font-size="30" fill="#1DA1F2" text-anchor="middle">→</text>

  <rect x="450" y="490" width="300" height="80" fill="#192734" rx="10" stroke="#1DA1F2" stroke-width="2"/>
  <text x="600" y="525" font-size="20" font-weight="bold" fill="white" text-anchor="middle">② 独り言で使う</text>
  <text x="600" y="553" font-size="15" fill="#657786" text-anchor="middle">日常→自動化</text>

  <text x="800" y="532" font-size="30" fill="#1DA1F2" text-anchor="middle">→</text>

  <rect x="820" y="490" width="300" height="80" fill="#192734" rx="10" stroke="#1DA1F2" stroke-width="2"/>
  <text x="970" y="525" font-size="20" font-weight="bold" fill="white" text-anchor="middle">③ 英会話で実践</text>
  <text x="970" y="553" font-size="15" fill="#657786" text-anchor="middle">「使える」へ昇格</text>

  <!-- Credit -->
  <text x="1165" y="658" font-size="18" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
