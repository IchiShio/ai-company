<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Header -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    「全部聞く」からの脱出チェックリスト
  </text>

  <!-- Subtitle -->
  <text x="600" y="108" text-anchor="middle" fill="#657786" font-size="17"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    1週間で「聞く意識」を変えるステップ
  </text>

  <!-- Step boxes -->

  <!-- Step 1 -->
  <rect x="60" y="128" width="1080" height="84" rx="12" fill="white" stroke="#1DA1F2" stroke-width="2"/>
  <!-- Check circle -->
  <circle cx="110" cy="170" r="24" fill="#1DA1F2"/>
  <text x="110" y="178" text-anchor="middle" fill="white" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">1</text>
  <!-- Text -->
  <text x="155" y="158" fill="#14171A" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「内容語だけマーク」練習（1週間）</text>
  <text x="155" y="183" fill="#657786" font-size="15"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">知っている英文のスクリプトを見ながら、強く聞こえる単語にだけ印をつける。弱い音は無視してOK。</text>
  <!-- Day badge -->
  <rect x="950" y="148" width="160" height="34" rx="17" fill="#EAF6FF"/>
  <text x="1030" y="170" text-anchor="middle" fill="#1DA1F2" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Day 1〜3</text>

  <!-- Step 2 -->
  <rect x="60" y="228" width="1080" height="84" rx="12" fill="white" stroke="#1DA1F2" stroke-width="2"/>
  <circle cx="110" cy="270" r="24" fill="#1DA1F2"/>
  <text x="110" y="278" text-anchor="middle" fill="white" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">2</text>
  <text x="155" y="258" fill="#14171A" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「キーワード2〜3語を再現」リスニング</text>
  <text x="155" y="283" fill="#657786" font-size="15"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">音声を一度聞いた後、メモに重要単語だけ2〜3語書く。全文書こうとしない。ポイントを拾う癖をつける。</text>
  <rect x="950" y="248" width="160" height="34" rx="17" fill="#EAF6FF"/>
  <text x="1030" y="270" text-anchor="middle" fill="#1DA1F2" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Day 3〜5</text>

  <!-- Step 3 -->
  <rect x="60" y="328" width="1080" height="84" rx="12" fill="white" stroke="#17BF63" stroke-width="2"/>
  <circle cx="110" cy="370" r="24" fill="#17BF63"/>
  <text x="110" y="378" text-anchor="middle" fill="white" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">3</text>
  <text x="155" y="358" fill="#14171A" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「止まらずに流す」リスニングを習慣化</text>
  <text x="155" y="383" fill="#657786" font-size="15"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">聞き取れない部分があっても絶対に止めない。「分からなくても流す」ことで、脳が自動補完を学習する。</text>
  <rect x="950" y="348" width="160" height="34" rx="17" fill="#E8F7EF"/>
  <text x="1030" y="370" text-anchor="middle" fill="#17BF63" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Day 5〜7</text>

  <!-- Step 4 -->
  <rect x="60" y="428" width="1080" height="84" rx="12" fill="white" stroke="#17BF63" stroke-width="2"/>
  <circle cx="110" cy="470" r="24" fill="#17BF63"/>
  <text x="110" y="478" text-anchor="middle" fill="white" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">4</text>
  <text x="155" y="458" fill="#14171A" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「主語＋動詞だけ確認」ニュース練習</text>
  <text x="155" y="483" fill="#657786" font-size="15"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">ニュース英語の1文を聞いて「誰が・何をした」だけ答える。細部は不要。大意把握の筋肉を鍛える。</text>
  <rect x="950" y="448" width="160" height="34" rx="17" fill="#E8F7EF"/>
  <text x="1030" y="470" text-anchor="middle" fill="#17BF63" font-size="14" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">Day 7〜</text>

  <!-- Mindset shift box -->
  <rect x="60" y="530" width="1080" height="90" rx="12" fill="#14171A"/>
  <text x="600" y="562" text-anchor="middle" fill="#1DA1F2" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">マインドセットシフト</text>
  <text x="600" y="590" text-anchor="middle" fill="white" font-size="17"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">❌「全部聞き取らなきゃ」→ ✅「内容語を拾えれば勝ち」</text>
  <text x="600" y="612" text-anchor="middle" fill="#AAB8C2" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">ネイティブも3割は聞き飛ばしている。完璧主義を捨てることがリスニング上達の出発点。</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
