<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="100" fill="#1DA1F2"/>
  <text x="600" y="38" font-size="34" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">完璧主義 vs 週5設計</text>
  <text x="600" y="75" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle">半年後も続く習慣の作り方</text>

  <!-- Left: 完璧主義パターン -->
  <rect x="60" y="120" width="480" height="450" fill="#192734" rx="14" stroke="#657786" stroke-width="2"/>
  <rect x="60" y="120" width="480" height="55" fill="#657786" rx="14"/>
  <rect x="60" y="147" width="480" height="28" fill="#657786"/>
  <text x="300" y="152" font-size="24" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">完璧主義パターン ✗</text>

  <!-- Timeline boxes for 完璧主義 -->
  <rect x="90" y="200" width="420" height="40" fill="#1DA1F2" rx="6"/>
  <text x="300" y="225" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">1〜7日目: 毎日やる！！</text>

  <rect x="90" y="255" width="420" height="40" fill="#1DA1F2" rx="6"/>
  <text x="300" y="280" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">8〜10日目: 疲れてサボる</text>

  <rect x="90" y="310" width="420" height="40" fill="#657786" rx="6"/>
  <text x="300" y="335" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">「3日サボった…もういいや」</text>

  <rect x="90" y="365" width="420" height="40" fill="#14171A" rx="6" stroke="#657786" stroke-width="1"/>
  <text x="300" y="390" font-size="16" fill="#657786" text-anchor="middle" dominant-baseline="middle">完全中断 → 再スタートも難しい</text>

  <text x="300" y="460" font-size="52" text-anchor="middle">😰</text>

  <rect x="90" y="490" width="420" height="60" fill="#14171A" rx="8" stroke="#657786" stroke-width="1"/>
  <text x="300" y="515" font-size="15" fill="#657786" text-anchor="middle">完璧主義が「失敗コスト」を上げ、</text>
  <text x="300" y="538" font-size="15" fill="#657786" text-anchor="middle">継続を困難にする（Fogg, 2019）</text>

  <!-- Right: 週5設計 -->
  <rect x="660" y="120" width="480" height="450" fill="#192734" rx="14" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="660" y="120" width="480" height="55" fill="#1DA1F2" rx="14"/>
  <rect x="660" y="147" width="480" height="28" fill="#1DA1F2"/>
  <text x="900" y="152" font-size="24" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">週5設計パターン ✓</text>

  <!-- Timeline boxes for 週5 -->
  <rect x="690" y="200" width="420" height="40" fill="#1DA1F2" rx="6"/>
  <text x="900" y="225" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">月〜金: 学習日（5日）</text>

  <rect x="690" y="255" width="420" height="40" fill="#0d8ecf" rx="6"/>
  <text x="900" y="280" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">土・日: 休む日（計画的）</text>

  <rect x="690" y="310" width="420" height="40" fill="#1DA1F2" rx="6"/>
  <text x="900" y="335" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">「休んでOK」→ 罪悪感なし</text>

  <rect x="690" y="365" width="420" height="40" fill="#1DA1F2" rx="6"/>
  <text x="900" y="390" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">半年後も継続中</text>

  <text x="900" y="460" font-size="52" text-anchor="middle">😊</text>

  <rect x="690" y="490" width="420" height="60" fill="#14171A" rx="8" stroke="#1DA1F2" stroke-width="1"/>
  <text x="900" y="515" font-size="15" fill="#1DA1F2" text-anchor="middle">「失敗コスト」を下げることが</text>
  <text x="900" y="538" font-size="15" fill="#1DA1F2" text-anchor="middle">長期継続の鍵（BJ Fogg, 2019）</text>

  <!-- Credit -->
  <text x="1165" y="658" font-size="18" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
