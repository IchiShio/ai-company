<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1DA1F2"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AAB8C2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#14171A">単語の反応速度と接触回数の関係</text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">接触回数が多いほど、引き出し速度は速くなる（概念図）</text>

  <!-- Y-axis label -->
  <text x="40" y="380" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786" transform="rotate(-90, 40, 380)">引き出し速度（速→）</text>

  <!-- X-axis label -->
  <text x="680" y="618" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">接触回数（多→）</text>

  <!-- Chart area -->
  <rect x="120" y="108" width="900" height="480" rx="8" fill="#FFFFFF" stroke="#E1E8ED" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="120" y1="228" x2="1020" y2="228" stroke="#F0F4F7" stroke-width="1.5"/>
  <line x1="120" y1="348" x2="1020" y2="348" stroke="#F0F4F7" stroke-width="1.5"/>
  <line x1="120" y1="468" x2="1020" y2="468" stroke="#F0F4F7" stroke-width="1.5"/>
  <line x1="300" y1="108" x2="300" y2="588" stroke="#F0F4F7" stroke-width="1.5"/>
  <line x1="480" y1="108" x2="480" y2="588" stroke="#F0F4F7" stroke-width="1.5"/>
  <line x1="660" y1="108" x2="660" y2="588" stroke="#F0F4F7" stroke-width="1.5"/>
  <line x1="840" y1="108" x2="840" y2="588" stroke="#F0F4F7" stroke-width="1.5"/>

  <!-- Y-axis tick labels -->
  <text x="108" y="136" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">0.1秒</text>
  <text x="108" y="236" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">0.5秒</text>
  <text x="108" y="356" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">1.5秒</text>
  <text x="108" y="476" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">3秒</text>

  <!-- X-axis tick labels -->
  <text x="180" y="603" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#AAB8C2">1〜5回</text>
  <text x="360" y="603" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#AAB8C2">10〜20回</text>
  <text x="570" y="603" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#AAB8C2">50〜100回</text>
  <text x="780" y="603" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#AAB8C2">500回+</text>
  <text x="970" y="603" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#AAB8C2">1000回+</text>

  <!-- Curve: opportunity / abstract words -->
  <path d="M 150,490 C 250,488 350,460 500,400 C 640,345 760,290 870,260 C 920,248 970,235 1010,228"
        stroke="#AAB8C2" stroke-width="3" fill="none" stroke-dasharray="8,4"/>

  <!-- Curve: apple / common words (starts high on y = low reaction time) -->
  <path d="M 150,480 C 200,420 280,320 400,240 C 520,170 680,142 900,132 C 960,130 1000,128 1010,128"
        stroke="#1DA1F2" stroke-width="4" fill="none"/>

  <!-- Annotation: opportunity current state -->
  <circle cx="200" cy="488" r="10" fill="#AAB8C2"/>
  <rect x="210" y="454" width="220" height="52" rx="8" fill="#FFFFFF" stroke="#AAB8C2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="477" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">"opportunity"</text>
  <text x="320" y="496" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#CC3333">接触数: 少 → 3秒かかる</text>

  <!-- Annotation: apple current state -->
  <circle cx="900" cy="132" r="10" fill="#1DA1F2"/>
  <rect x="760" y="98" width="200" height="52" rx="8" fill="#FFFFFF" stroke="#1DA1F2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="121" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">"apple"</text>
  <text x="860" y="140" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">接触数: 多 → 0.1秒</text>

  <!-- Arrow: "opportunity" can move to faster zone -->
  <line x1="420" y1="488" x2="700" y2="420" stroke="#1DA1F2" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <rect x="440" y="505" width="240" height="28" rx="6" fill="#1DA1F2" opacity="0.15"/>
  <text x="560" y="522" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="bold" fill="#1DA1F2">接触回数を増やせば移動できる！</text>

  <!-- Axes -->
  <line x1="120" y1="108" x2="120" y2="588" stroke="#14171A" stroke-width="2"/>
  <line x1="120" y1="588" x2="1020" y2="588" stroke="#14171A" stroke-width="2"/>

  <!-- Legend -->
  <line x1="130" y1="635" x2="170" y2="635" stroke="#1DA1F2" stroke-width="3"/>
  <text x="180" y="639" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A">日常頻出語（apple / the / go ...）</text>
  <line x1="440" y1="635" x2="480" y2="635" stroke="#AAB8C2" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="490" y="639" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A">学習英単語（opportunity / ambiguity ...）</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
