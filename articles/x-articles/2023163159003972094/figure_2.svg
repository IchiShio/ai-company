<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Header -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold">瞬間英作文 1日10分 実践プログラム</text>
  <text x="600" y="70" text-anchor="middle" fill="#657786" font-size="14">初級 → 中級 → 上級の段階的ステップアップ</text>

  <!-- 段階ラベル -->
  <!-- 初級 -->
  <rect x="40" y="100" width="340" height="530" rx="16" fill="#FFFFFF" stroke="#17BF63" stroke-width="2.5"/>
  <rect x="40" y="100" width="340" height="52" rx="16" fill="#17BF63"/>
  <rect x="40" y="134" width="340" height="18" fill="#17BF63"/>
  <text x="210" y="134" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">STEP 1  初級</text>
  <text x="210" y="168" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold">目標: 基本文型を体に入れる</text>
  <text x="210" y="190" text-anchor="middle" fill="#657786" font-size="13">期間の目安: 2〜4週間</text>

  <line x1="60" y1="200" x2="360" y2="200" stroke="#E1E8ED" stroke-width="1"/>

  <text x="70" y="228" fill="#17BF63" font-size="13" font-weight="bold">例文タイプ</text>
  <rect x="60" y="237" width="300" height="38" rx="7" fill="#F0FFF4" stroke="#17BF63" stroke-width="1"/>
  <text x="210" y="253" text-anchor="middle" fill="#14171A" font-size="13">I am happy. / She is kind.</text>
  <text x="210" y="269" text-anchor="middle" fill="#657786" font-size="12">be動詞の肯定・否定・疑問文</text>

  <rect x="60" y="283" width="300" height="38" rx="7" fill="#F0FFF4" stroke="#17BF63" stroke-width="1"/>
  <text x="210" y="299" text-anchor="middle" fill="#14171A" font-size="13">I go to school. / She works.</text>
  <text x="210" y="315" text-anchor="middle" fill="#657786" font-size="12">一般動詞の現在形</text>

  <rect x="60" y="329" width="300" height="38" rx="7" fill="#F0FFF4" stroke="#17BF63" stroke-width="1"/>
  <text x="210" y="345" text-anchor="middle" fill="#14171A" font-size="13">I like coffee. / I want water.</text>
  <text x="210" y="361" text-anchor="middle" fill="#657786" font-size="12">目的語を持つ動詞</text>

  <line x1="60" y1="378" x2="360" y2="378" stroke="#E1E8ED" stroke-width="1"/>
  <text x="70" y="401" fill="#17BF63" font-size="13" font-weight="bold">10分の使い方</text>
  <text x="70" y="422" fill="#14171A" font-size="13">1. 日本語を見て3秒で英語を出す</text>
  <text x="70" y="445" fill="#14171A" font-size="13">2. 即座に正解を確認・音読</text>
  <text x="70" y="468" fill="#14171A" font-size="13">3. 20文を反復（1周約10分）</text>

  <rect x="60" y="490" width="300" height="55" rx="8" fill="#17BF6320"/>
  <text x="210" y="512" text-anchor="middle" fill="#17BF63" font-size="13" font-weight="bold">ポイント</text>
  <text x="210" y="532" text-anchor="middle" fill="#14171A" font-size="12">「考える前に口から出す」が目標</text>
  <text x="210" y="552" text-anchor="middle" fill="#657786" font-size="12">間違えてもすぐ次へ進む</text>

  <!-- 矢印 初級→中級 -->
  <text x="420" y="370" text-anchor="middle" fill="#1DA1F2" font-size="26" font-weight="bold">→</text>

  <!-- 中級 -->
  <rect x="430" y="100" width="340" height="530" rx="16" fill="#FFFFFF" stroke="#1DA1F2" stroke-width="2.5"/>
  <rect x="430" y="100" width="340" height="52" rx="16" fill="#1DA1F2"/>
  <rect x="430" y="134" width="340" height="18" fill="#1DA1F2"/>
  <text x="600" y="134" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">STEP 2  中級</text>
  <text x="600" y="168" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold">目標: 時制・助動詞を自動化</text>
  <text x="600" y="190" text-anchor="middle" fill="#657786" font-size="13">期間の目安: 1〜2ヶ月</text>

  <line x1="450" y1="200" x2="750" y2="200" stroke="#E1E8ED" stroke-width="1"/>

  <text x="460" y="228" fill="#1DA1F2" font-size="13" font-weight="bold">例文タイプ</text>
  <rect x="450" y="237" width="300" height="38" rx="7" fill="#E8F5FD" stroke="#1DA1F2" stroke-width="1"/>
  <text x="600" y="253" text-anchor="middle" fill="#14171A" font-size="13">I went there. / She called me.</text>
  <text x="600" y="269" text-anchor="middle" fill="#657786" font-size="12">過去形・未来形の切り替え</text>

  <rect x="450" y="283" width="300" height="38" rx="7" fill="#E8F5FD" stroke="#1DA1F2" stroke-width="1"/>
  <text x="600" y="299" text-anchor="middle" fill="#14171A" font-size="13">I can / should / must do it.</text>
  <text x="600" y="315" text-anchor="middle" fill="#657786" font-size="12">助動詞を状況で使い分ける</text>

  <rect x="450" y="329" width="300" height="38" rx="7" fill="#E8F5FD" stroke="#1DA1F2" stroke-width="1"/>
  <text x="600" y="345" text-anchor="middle" fill="#14171A" font-size="13">I have been to Japan.</text>
  <text x="600" y="361" text-anchor="middle" fill="#657786" font-size="12">現在完了形の感覚をつかむ</text>

  <line x1="450" y1="378" x2="750" y2="378" stroke="#E1E8ED" stroke-width="1"/>
  <text x="460" y="401" fill="#1DA1F2" font-size="13" font-weight="bold">10分の使い方</text>
  <text x="460" y="422" fill="#14171A" font-size="13">1. 日本語→英語を0.5秒以内で出す</text>
  <text x="460" y="445" fill="#14171A" font-size="13">2. 同じ文を時制を変えて応用</text>
  <text x="460" y="468" fill="#14171A" font-size="13">3. 声に出して完文を言い切る</text>

  <rect x="450" y="490" width="300" height="55" rx="8" fill="#1DA1F220"/>
  <text x="600" y="512" text-anchor="middle" fill="#1DA1F2" font-size="13" font-weight="bold">ポイント</text>
  <text x="600" y="532" text-anchor="middle" fill="#14171A" font-size="12">文法説明は読まずに例文を繰り返す</text>
  <text x="600" y="552" text-anchor="middle" fill="#657786" font-size="12">「なぜ？」より「何度も」が優先</text>

  <!-- 矢印 中級→上級 -->
  <text x="820" y="370" text-anchor="middle" fill="#1DA1F2" font-size="26" font-weight="bold">→</text>

  <!-- 上級 -->
  <rect x="820" y="100" width="340" height="530" rx="16" fill="#FFFFFF" stroke="#794BC4" stroke-width="2.5"/>
  <rect x="820" y="100" width="340" height="52" rx="16" fill="#794BC4"/>
  <rect x="820" y="134" width="340" height="18" fill="#794BC4"/>
  <text x="990" y="134" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">STEP 3  上級</text>
  <text x="990" y="168" text-anchor="middle" fill="#14171A" font-size="14" font-weight="bold">目標: 複文・長文の即時出力</text>
  <text x="990" y="190" text-anchor="middle" fill="#657786" font-size="13">期間の目安: 3ヶ月〜継続</text>

  <line x1="840" y1="200" x2="1140" y2="200" stroke="#E1E8ED" stroke-width="1"/>

  <text x="850" y="228" fill="#794BC4" font-size="13" font-weight="bold">例文タイプ</text>
  <rect x="840" y="237" width="300" height="38" rx="7" fill="#F0E8FF" stroke="#794BC4" stroke-width="1"/>
  <text x="990" y="251" text-anchor="middle" fill="#14171A" font-size="12">I think (that) she will come.</text>
  <text x="990" y="269" text-anchor="middle" fill="#657786" font-size="12">接続詞・従属節の即時出力</text>

  <rect x="840" y="283" width="300" height="38" rx="7" fill="#F0E8FF" stroke="#794BC4" stroke-width="1"/>
  <text x="990" y="299" text-anchor="middle" fill="#14171A" font-size="12">If I were you, I would do it.</text>
  <text x="990" y="315" text-anchor="middle" fill="#657786" font-size="12">仮定法・複雑構文の自動化</text>

  <rect x="840" y="329" width="300" height="38" rx="7" fill="#F0E8FF" stroke="#794BC4" stroke-width="1"/>
  <text x="990" y="345" text-anchor="middle" fill="#14171A" font-size="12">自分の意見・経験を即座に英語で</text>
  <text x="990" y="361" text-anchor="middle" fill="#657786" font-size="12">フリートーク対応レベル</text>

  <line x1="840" y1="378" x2="1140" y2="378" stroke="#E1E8ED" stroke-width="1"/>
  <text x="850" y="401" fill="#794BC4" font-size="13" font-weight="bold">10分の使い方</text>
  <text x="850" y="422" fill="#14171A" font-size="13">1. 答えを見ずにスピーキング</text>
  <text x="850" y="445" fill="#14171A" font-size="13">2. 言い換え・展開の練習</text>
  <text x="850" y="468" fill="#14171A" font-size="13">3. 実際の会話シーンを想像しながら</text>

  <rect x="840" y="490" width="300" height="55" rx="8" fill="#794BC420"/>
  <text x="990" y="512" text-anchor="middle" fill="#794BC4" font-size="13" font-weight="bold">ポイント</text>
  <text x="990" y="532" text-anchor="middle" fill="#14171A" font-size="12">実用フレーズを中心に選ぶ</text>
  <text x="990" y="552" text-anchor="middle" fill="#657786" font-size="12">日常会話の頻出パターンに絞る</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" fill="#657786" font-size="13">@ichi_eigo</text>
</svg>
