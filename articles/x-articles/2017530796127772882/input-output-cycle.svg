<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000022"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1DA1F2"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#657786"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" font-size="32" font-weight="bold" fill="#14171A">インプット → 検証 → アウトプットのサイクル</text>
  <text x="600" y="88" text-anchor="middle" font-size="20" fill="#657786">「わかった気」を「本物の定着」に変える3ステップ</text>

  <!-- Step 1: INPUT -->
  <rect x="80" y="200" width="280" height="260" rx="20" fill="#1DA1F2" filter="url(#shadow)"/>
  <text x="220" y="272" text-anchor="middle" font-size="52" fill="#FFFFFF">📥</text>
  <text x="220" y="326" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFFFFF">インプット</text>
  <text x="220" y="362" text-anchor="middle" font-size="17" fill="#D6EBFB">INPUT</text>
  <text x="220" y="402" text-anchor="middle" font-size="15" fill="#D6EBFB">リスニング / リーディング</text>
  <text x="220" y="426" text-anchor="middle" font-size="15" fill="#D6EBFB">動画 / ポッドキャスト</text>

  <!-- Arrow 1 -->
  <line x1="368" y1="330" x2="438" y2="330" stroke="#1DA1F2" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="403" y="318" text-anchor="middle" font-size="13" fill="#657786">5分以内</text>

  <!-- Step 2: VERIFY (center, highlighted) -->
  <rect x="448" y="180" width="304" height="300" rx="20" fill="#14171A" filter="url(#shadow)"/>
  <rect x="456" y="188" width="288" height="284" rx="16" fill="#1DA1F2" opacity="0.12"/>
  <text x="600" y="264" text-anchor="middle" font-size="52" fill="#FFFFFF">🔍</text>
  <text x="600" y="320" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFFFFF">検証（再現）</text>
  <text x="600" y="356" text-anchor="middle" font-size="17" fill="#AAB8C2">VERIFY</text>
  <text x="600" y="396" text-anchor="middle" font-size="15" fill="#AAB8C2">「自分で再現できるか？」</text>
  <text x="600" y="420" text-anchor="middle" font-size="15" fill="#1DA1F2">←最重要ステップ→</text>
  <text x="600" y="448" text-anchor="middle" font-size="13" fill="#657786">illusion of knowing を破壊する</text>

  <!-- Arrow 2 -->
  <line x1="760" y1="330" x2="830" y2="330" stroke="#1DA1F2" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="795" y="318" text-anchor="middle" font-size="13" fill="#657786">定着へ</text>

  <!-- Step 3: OUTPUT -->
  <rect x="840" y="200" width="280" height="260" rx="20" fill="#657786" filter="url(#shadow)"/>
  <text x="980" y="272" text-anchor="middle" font-size="52" fill="#FFFFFF">📤</text>
  <text x="980" y="326" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFFFFF">アウトプット</text>
  <text x="980" y="362" text-anchor="middle" font-size="17" fill="#E1E8ED">OUTPUT</text>
  <text x="980" y="402" text-anchor="middle" font-size="15" fill="#E1E8ED">要約 / 音読 / 書き出し</text>
  <text x="980" y="426" text-anchor="middle" font-size="15" fill="#E1E8ED">会話 / メモ</text>

  <!-- Feedback loop arrow -->
  <path d="M980 468 Q980 570 600 570 Q220 570 220 468" stroke="#1DA1F2" stroke-width="2.5" fill="none" stroke-dasharray="8,4" marker-end="url(#arrow-blue)"/>
  <text x="600" y="558" text-anchor="middle" font-size="14" fill="#1DA1F2">次のインプットに活かすフィードバックループ</text>

  <!-- Bottom note -->
  <rect x="300" y="600" width="600" height="42" rx="10" fill="#E8F5FE"/>
  <text x="600" y="626" text-anchor="middle" font-size="15" fill="#1DA1F2" font-weight="bold">Roediger &amp; Karpicke (2006): テスト想起は再読より最大50%以上記憶を保持</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18">@ichi_eigo</text>
</svg>
