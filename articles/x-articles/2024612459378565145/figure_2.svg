<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="timelineBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#17BF63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg5)" />
  <rect x="0" y="0" width="1200" height="4" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">1日30分 × 3年のタイムライン</text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">毎日の積み上げで確実に変わる — マイルストーン付き</text>

  <!-- Timeline bar base -->
  <rect x="80" y="300" width="1040" height="12" rx="6" fill="#1a2a3a" />
  <rect x="80" y="300" width="1040" height="12" rx="6" fill="url(#timelineBar)" />

  <!-- Month markers on timeline -->
  <!-- Start -->
  <circle cx="80" cy="306" r="10" fill="#1DA1F2" stroke="#0d1117" stroke-width="2" />
  <!-- 3 months = 25% -->
  <circle cx="340" cy="306" r="10" fill="#1DA1F2" stroke="#0d1117" stroke-width="2" />
  <!-- 6 months = 50% -->
  <circle cx="600" cy="306" r="12" fill="#1DA1F2" stroke="#0d1117" stroke-width="3" />
  <!-- 1 year = 67% (8 months into 12 months progression) -->
  <circle cx="773" cy="306" r="12" fill="#17BF63" stroke="#0d1117" stroke-width="3" />
  <!-- 2 years = 83% -->
  <circle cx="946" cy="306" r="10" fill="#17BF63" stroke="#0d1117" stroke-width="2" />
  <!-- 3 years = 100% -->
  <circle cx="1120" cy="306" r="16" fill="#17BF63" stroke="#FFD700" stroke-width="3" />

  <!-- Milestone: Start -->
  <line x1="80" y1="294" x2="80" y2="240" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="3,3" />
  <rect x="20" y="205" width="120" height="35" rx="8" fill="#0a1929" stroke="#1DA1F2" stroke-width="1" />
  <text x="80" y="222" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#1DA1F2">スタート</text>
  <text x="80" y="236" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">今日から</text>

  <!-- Milestone: 3 months -->
  <line x1="340" y1="294" x2="340" y2="175" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="3,3" />
  <rect x="258" y="120" width="164" height="55" rx="8" fill="#0a1929" stroke="#1DA1F2" stroke-width="1" />
  <text x="340" y="142" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#1DA1F2">3ヶ月 ≈ 45h</text>
  <text x="340" y="162" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">リスニングの</text>
  <text x="340" y="175" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">変化を実感</text>

  <!-- Milestone: 6 months -->
  <line x1="600" y1="292" x2="600" y2="240" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="3,3" />
  <rect x="518" y="185" width="164" height="55" rx="8" fill="#0a1929" stroke="#1DA1F2" stroke-width="2" />
  <text x="600" y="207" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#1DA1F2">6ヶ月 ≈ 90h</text>
  <text x="600" y="227" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">基本会話の</text>
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">骨格が形成</text>

  <!-- Milestone: 1 year (below the line) -->
  <line x1="773" y1="318" x2="773" y2="395" stroke="#17BF63" stroke-width="1.5" stroke-dasharray="3,3" />
  <rect x="691" y="395" width="164" height="55" rx="8" fill="#0a1929" stroke="#17BF63" stroke-width="2" />
  <text x="773" y="417" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#17BF63">1年 ≈ 183h</text>
  <text x="773" y="437" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">日常会話が</text>
  <text x="773" y="450" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">成立し始める</text>

  <!-- Milestone: 2 years -->
  <line x1="946" y1="294" x2="946" y2="175" stroke="#17BF63" stroke-width="1.5" stroke-dasharray="3,3" />
  <rect x="864" y="120" width="164" height="55" rx="8" fill="#0a1929" stroke="#17BF63" stroke-width="1" />
  <text x="946" y="142" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#17BF63">2年 ≈ 365h</text>
  <text x="946" y="162" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">旅行・趣味の</text>
  <text x="946" y="175" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">英語が使える</text>

  <!-- Milestone: 3 years (GOAL) -->
  <line x1="1120" y1="290" x2="1120" y2="240" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="3,3" />
  <rect x="1022" y="180" width="176" height="60" rx="8" fill="#1a1a0a" stroke="#FFD700" stroke-width="2" />
  <text x="1110" y="202" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#FFD700">3年 ≈ 548h</text>
  <text x="1110" y="222" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">ビジネス英語</text>
  <text x="1110" y="235" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">の入口に到達</text>
  <!-- Goal star -->
  <text x="1120" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" fill="#FFD700">★</text>

  <!-- Bottom message -->
  <rect x="80" y="480" width="1040" height="70" rx="12" fill="#0a1929" stroke="#1DA1F2" stroke-width="1.5" />
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#1DA1F2">たった1日30分。しかし「毎日」が鍵</text>
  <text x="600" y="538" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#AAB8C2">週に3.5h（週末集中）より、毎日30分のほうが頻度が高く記憶定着率が上がる</text>

  <!-- Calculation box -->
  <rect x="80" y="565" width="480" height="52" rx="10" fill="#0d1e2d" stroke="#1a3a5c" stroke-width="1" />
  <text x="320" y="588" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#AAB8C2">0.5h × 365日 = 182.5h/年</text>
  <text x="320" y="607" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2">3年で合計 547.5時間 の接触</text>

  <rect x="620" y="565" width="500" height="52" rx="10" fill="#0d2a1a" stroke="#17BF63" stroke-width="1" />
  <text x="870" y="588" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#AAB8C2">目安: コミュ英語 500〜1000h</text>
  <text x="870" y="607" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#17BF63">3〜6年で到達可能な現実的な目標</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
