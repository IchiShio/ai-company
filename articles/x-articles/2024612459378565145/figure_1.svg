<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d7abf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#17BF63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8f47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#657786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5668;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg4)" />
  <rect x="0" y="0" width="1200" height="4" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">英語接触時間の比較: 才能ではなく時間の差</text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">各ケース別の推定英語接触時間（時間）</text>

  <!-- Chart base -->
  <line x1="160" y1="500" x2="1100" y2="500" stroke="#657786" stroke-width="1.5" />
  <line x1="160" y1="130" x2="160" y2="500" stroke="#2a3a4a" stroke-width="1.5" />

  <!-- Grid lines -->
  <line x1="160" y1="130" x2="1100" y2="130" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="160" y1="222" x2="1100" y2="222" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="160" y1="314" x2="1100" y2="314" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="160" y1="406" x2="1100" y2="406" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Y axis labels -->
  <text x="148" y="134" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">10,000h</text>
  <text x="148" y="226" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">7,500h</text>
  <text x="148" y="318" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">5,000h</text>
  <text x="148" y="410" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">2,500h</text>
  <text x="148" y="504" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">0h</text>

  <!-- Bar 1: 帰国子女（海外5年） 約10,000h = 370px height -->
  <rect x="230" y="130" width="200" height="370" rx="6" fill="url(#barA)" />
  <text x="330" y="122" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#1DA1F2">≈10,000h</text>
  <text x="330" y="528" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">帰国子女</text>
  <text x="330" y="548" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（海外生活5年）</text>
  <!-- Annotation -->
  <rect x="215" y="145" width="230" height="28" rx="6" fill="#0a2a4a" opacity="0.9" />
  <text x="330" y="163" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">毎日14h接触 × 5年 ≈ 10,000h</text>

  <!-- Bar 2: 社会人独学（1日30分 × 3年） 約550h = 20.4px / 100h × scale -->
  <!-- 550h / 10000h × 370px = 20.4px → too small, use relative scale: 550/10000 * 370 = ~20 -->
  <!-- Better: scale to 1000h max for bottom bars -->
  <!-- Use separate scale: 1000h = 370px → 550h = 203px, 800h = 296px -->
  <rect x="510" y="297" width="200" height="203" rx="6" fill="url(#barB)" />
  <text x="610" y="289" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#17BF63">≈550h</text>
  <text x="610" y="528" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">独学（毎日30分）</text>
  <text x="610" y="548" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（3年継続）</text>
  <rect x="495" y="312" width="230" height="28" rx="6" fill="#0a2a1a" opacity="0.9" />
  <text x="610" y="330" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">0.5h × 365日 × 3年 = 547.5h</text>

  <!-- Bar 3: 学校英語（6年間） 約800h = 296px -->
  <rect x="790" y="204" width="200" height="296" rx="6" fill="url(#barC)" />
  <text x="890" y="196" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#AAB8C2">≈800h</text>
  <text x="890" y="528" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">学校英語</text>
  <text x="890" y="548" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（中学〜高校6年）</text>
  <rect x="775" y="219" width="230" height="28" rx="6" fill="#1a2030" opacity="0.9" />
  <text x="890" y="237" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#AAB8C2">週4h × 200日 × 6年 ≈ 800h（概算）</text>

  <!-- Scale note -->
  <text x="600" y="615" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#3a4a5a">※棒グラフは対数的な概念図。帰国子女の棒はスケールの都合で圧縮表示。学校英語の授業時数は概算。</text>

  <!-- Key insight box -->
  <rect x="160" y="575" width="880" height="32" rx="8" fill="#0a1929" />
  <text x="600" y="596" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="bold" fill="#1DA1F2">「才能」に見えるのは、接触時間の桁違いな差。才能ではなく累積時間の差。</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
