  <text x="838" y="400" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2" text-anchor="middle">人前で緊張しない</text>

  <!-- Card 5 -->
  <rect x="974" y="100" width="200" height="360" rx="14" fill="#1DA1F2" opacity="0.08" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="974" y="100" width="200" height="50" rx="14" fill="#1DA1F2" opacity="0.3"/>
  <text x="1074" y="132" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">METHOD 5</text>
  <text x="1074" y="185" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" text-anchor="middle">🎯</text>
  <text x="1074" y="225" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#1DA1F2" text-anchor="middle" font-weight="bold">音読</text>
  <line x1="994" y1="245" x2="1154" y2="245" stroke="#657786" stroke-width="0.5"/>
  <text x="994" y="272" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">短い英文を繰り返し</text>
  <text x="994" y="292" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">声に出して読む</text>
  <text x="994" y="325" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">場所: 家・通勤中</text>
  <text x="994" y="348" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">難度: ★★☆☆☆</text>
  <rect x="994" y="380" width="160" height="30" rx="6" fill="#1DA1F2" opacity="0.25"/>
  <text x="1074" y="400" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2" text-anchor="middle">発音も同時に改善</text>

  <!-- Bottom -->
  <rect x="0" y="498" width="1200" height="177" fill="#14171A"/>
  <text x="600" y="535" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#1DA1F2" text-anchor="middle" font-weight="bold">「どれか1つ」を今日から5分やるだけでいい</text>
  <text x="600" y="562" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#8899a6" text-anchor="middle">完璧にやろうとしない。5分続けた人が、1時間勉強した人に勝つ。</text>

  <!-- Progress bar -->
  <rect x="200" y="585" width="800" height="20" rx="10" fill="#1e2f3e"/>
  <rect x="200" y="585" width="80" height="20" rx="10" fill="#1DA1F2"/>
  <text x="300" y="601" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#8899a6">今日5分 → 1週間 → 1ヶ月 → 習慣化</text>

  <text x="600" y="642" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2" text-anchor="middle">native-real.com</text>
  <text x="1170" y="660" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
