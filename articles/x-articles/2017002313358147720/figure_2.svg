<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2533;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#1DA1F2" opacity="0.12"/>
  <text x="600" y="30" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2" text-anchor="middle" font-weight="bold">毎日5分でOK</text>
  <text x="600" y="62" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" fill="#FFFFFF" text-anchor="middle" font-weight="bold">5分間アウトプット練習メニュー 5選</text>

  <!-- Card 1 -->
  <rect x="30" y="100" width="220" height="360" rx="14" fill="#1DA1F2" opacity="0.08" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="30" y="100" width="220" height="50" rx="14" fill="#1DA1F2" opacity="0.3"/>
  <text x="140" y="132" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">METHOD 1</text>
  <text x="140" y="185" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" text-anchor="middle">🗣️</text>
  <text x="140" y="225" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#1DA1F2" text-anchor="middle" font-weight="bold">独り言実況</text>
  <line x1="50" y1="245" x2="230" y2="245" stroke="#657786" stroke-width="0.5"/>
  <text x="50" y="272" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">今やっていることを</text>
  <text x="50" y="292" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">英語で5分間実況する</text>
  <text x="50" y="325" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">場所: 家・通勤中</text>
  <text x="50" y="348" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">難度: ★☆☆☆☆</text>
  <rect x="50" y="380" width="160" height="30" rx="6" fill="#1DA1F2" opacity="0.25"/>
  <text x="130" y="400" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2" text-anchor="middle">まず これから始めよう</text>

  <!-- Card 2 -->
  <rect x="266" y="100" width="220" height="360" rx="14" fill="#1DA1F2" opacity="0.08" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="266" y="100" width="220" height="50" rx="14" fill="#1DA1F2" opacity="0.3"/>
  <text x="376" y="132" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">METHOD 2</text>
  <text x="376" y="185" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" text-anchor="middle">📝</text>
  <text x="376" y="225" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#1DA1F2" text-anchor="middle" font-weight="bold">英語日記</text>
  <line x1="286" y1="245" x2="466" y2="245" stroke="#657786" stroke-width="0.5"/>
  <text x="286" y="272" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">今日あったことを</text>
  <text x="286" y="292" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">3文だけ英語で書く</text>
  <text x="286" y="325" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">場所: スマホ・手帳</text>
  <text x="286" y="348" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">難度: ★★☆☆☆</text>
  <rect x="286" y="380" width="160" height="30" rx="6" fill="#1DA1F2" opacity="0.25"/>
  <text x="366" y="400" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2" text-anchor="middle">寝る前5分でOK</text>

  <!-- Card 3 - Highlighted -->
  <rect x="502" y="90" width="220" height="380" rx="14" fill="#1DA1F2" opacity="0.15" stroke="#1DA1F2" stroke-width="2.5"/>
  <rect x="502" y="90" width="220" height="50" rx="14" fill="#1DA1F2" opacity="0.5"/>
  <text x="612" y="122" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">METHOD 3 ★</text>
  <text x="612" y="178" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" text-anchor="middle">🎙️</text>
  <text x="612" y="218" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#1DA1F2" text-anchor="middle" font-weight="bold">シャドーイング</text>
  <line x1="522" y1="238" x2="702" y2="238" stroke="#1DA1F2" stroke-width="0.8"/>
  <text x="522" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">音声を聞きながら</text>
  <text x="522" y="285" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">同時に声に出す練習</text>
  <text x="522" y="318" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">場所: 家・電車（小声）</text>
  <text x="522" y="341" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">難度: ★★★☆☆</text>
  <rect x="522" y="376" width="160" height="30" rx="6" fill="#1DA1F2" opacity="0.5"/>
  <text x="602" y="396" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">特に効果が高い</text>

  <!-- Card 4 -->
  <rect x="738" y="100" width="220" height="360" rx="14" fill="#1DA1F2" opacity="0.08" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="738" y="100" width="220" height="50" rx="14" fill="#1DA1F2" opacity="0.3"/>
  <text x="848" y="132" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">METHOD 4</text>
  <text x="848" y="185" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="36" text-anchor="middle">💬</text>
  <text x="848" y="225" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#1DA1F2" text-anchor="middle" font-weight="bold">AIと英会話</text>
  <line x1="758" y1="245" x2="938" y2="245" stroke="#657786" stroke-width="0.5"/>
  <text x="758" y="272" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">ChatGPT等のAIに</text>
  <text x="758" y="292" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8899a6">英語で話しかける</text>
  <text x="758" y="325" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">場所: スマホ・PC</text>
  <text x="758" y="348" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">難度: ★★★☆☆</text>
