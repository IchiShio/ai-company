<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
    <linearGradient id="grad-no" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0245e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#c41645;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-yes" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d8fd8;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#f8f9fa"/>

  <!-- Title bar -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold">録音なし vs 録音あり：シャドーイング発音改善曲線</text>

  <!-- Chart area background -->
  <rect x="70" y="100" width="1100" height="520" rx="12" fill="white" stroke="#e1e8ed" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="40" y="380" text-anchor="middle" fill="#657786" font-size="15" transform="rotate(-90, 40, 380)">発音精度（%）</text>

  <!-- X-axis label -->
  <text x="620" y="655" text-anchor="middle" fill="#657786" font-size="15">練習期間（週）</text>

  <!-- Grid lines -->
  <line x1="140" y1="140" x2="1130" y2="140" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="200" x2="1130" y2="200" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="260" x2="1130" y2="260" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="320" x2="1130" y2="320" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="380" x2="1130" y2="380" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="440" x2="1130" y2="440" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="500" x2="1130" y2="500" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="140" y1="560" x2="1130" y2="560" stroke="#e1e8ed" stroke-width="1.5"/>

  <!-- Y-axis ticks -->
  <line x1="135" y1="140" x2="145" y2="140" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="145" text-anchor="end" fill="#657786" font-size="13">100</text>
  <line x1="135" y1="200" x2="145" y2="200" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="205" text-anchor="end" fill="#657786" font-size="13">90</text>
  <line x1="135" y1="260" x2="145" y2="260" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="265" text-anchor="end" fill="#657786" font-size="13">80</text>
  <line x1="135" y1="320" x2="145" y2="320" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="325" text-anchor="end" fill="#657786" font-size="13">70</text>
  <line x1="135" y1="380" x2="145" y2="380" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="385" text-anchor="end" fill="#657786" font-size="13">60</text>
  <line x1="135" y1="440" x2="145" y2="440" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="445" text-anchor="end" fill="#657786" font-size="13">50</text>
  <line x1="135" y1="500" x2="145" y2="500" stroke="#657786" stroke-width="1.5"/>
  <text x="128" y="505" text-anchor="end" fill="#657786" font-size="13">40</text>

  <!-- X-axis ticks (weeks 0-12) -->
  <line x1="140" y1="555" x2="140" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="140" y="580" text-anchor="middle" fill="#657786" font-size="13">0</text>
  <line x1="222" y1="555" x2="222" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="222" y="580" text-anchor="middle" fill="#657786" font-size="13">1</text>
  <line x1="304" y1="555" x2="304" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="304" y="580" text-anchor="middle" fill="#657786" font-size="13">2</text>
  <line x1="386" y1="555" x2="386" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="386" y="580" text-anchor="middle" fill="#657786" font-size="13">3</text>
  <line x1="468" y1="555" x2="468" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="468" y="580" text-anchor="middle" fill="#657786" font-size="13">4</text>
  <line x1="550" y1="555" x2="550" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="550" y="580" text-anchor="middle" fill="#657786" font-size="13">5</text>
  <line x1="632" y1="555" x2="632" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="632" y="580" text-anchor="middle" fill="#657786" font-size="13">6</text>
  <line x1="714" y1="555" x2="714" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="714" y="580" text-anchor="middle" fill="#657786" font-size="13">7</text>
  <line x1="796" y1="555" x2="796" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="796" y="580" text-anchor="middle" fill="#657786" font-size="13">8</text>
  <line x1="878" y1="555" x2="878" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="878" y="580" text-anchor="middle" fill="#657786" font-size="13">9</text>
  <line x1="960" y1="555" x2="960" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="960" y="580" text-anchor="middle" fill="#657786" font-size="13">10</text>
  <line x1="1042" y1="555" x2="1042" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="1042" y="580" text-anchor="middle" fill="#657786" font-size="13">11</text>
  <line x1="1124" y1="555" x2="1124" y2="565" stroke="#657786" stroke-width="1.5"/>
  <text x="1124" y="580" text-anchor="middle" fill="#657786" font-size="13">12</text>

  <!-- Axes -->
  <line x1="140" y1="560" x2="1130" y2="560" stroke="#14171A" stroke-width="2"/>
  <line x1="140" y1="140" x2="140" y2="560" stroke="#14171A" stroke-width="2"/>

  <!-- Plateau region annotation -->
  <rect x="380" y="390" width="350" height="30" rx="4" fill="#fff3f5" opacity="0.8"/>
  <text x="555" y="410" text-anchor="middle" fill="#e0245e" font-size="13">自己流の発音が強化されるだけで停滞</text>

  <!-- Line 1: 録音なし (plateau/slow growth) -->
  <!-- Points: (0, 50%) → 週を経てもほぼ横ばい -->
  <polyline
    points="140,500 222,490 304,480 386,475 468,472 550,470 632,468 714,466 796,465 878,464 960,463 1042,462 1124,461"
    fill="none" stroke="#e0245e" stroke-width="3.5" stroke-dasharray="8,5"/>

  <!-- Dots for 録音なし -->
  <circle cx="140" cy="500" r="6" fill="#e0245e"/>
  <circle cx="386" cy="475" r="6" fill="#e0245e"/>
  <circle cx="632" cy="468" r="6" fill="#e0245e"/>
  <circle cx="878" cy="464" r="6" fill="#e0245e"/>
  <circle cx="1124" cy="461" r="6" fill="#e0245e"/>

  <!-- Line 2: 録音あり (accelerating growth) -->
  <polyline
    points="140,500 222,488 304,470 386,448 468,420 550,390 632,358 714,322 796,286 878,252 960,218 1042,185 1124,155"
    fill="none" stroke="#1DA1F2" stroke-width="3.5"/>

  <!-- Dots for 録音あり -->
  <circle cx="140" cy="500" r="6" fill="#1DA1F2"/>
  <circle cx="386" cy="448" r="6" fill="#1DA1F2"/>
  <circle cx="632" cy="358" r="6" fill="#1DA1F2"/>
  <circle cx="878" cy="252" r="6" fill="#1DA1F2"/>
  <circle cx="1124" cy="155" r="6" fill="#1DA1F2"/>

  <!-- Fill area between curves -->
  <polygon
    points="140,500 222,488 304,470 386,448 468,420 550,390 632,358 714,322 796,286 878,252 960,218 1042,185 1124,155 1124,461 1042,462 960,463 878,464 796,465 714,466 632,468 550,470 468,472 386,475 304,480 222,490 140,500"
    fill="#1DA1F2" opacity="0.08"/>

  <!-- Endpoint labels -->
  <text x="1100" y="148" text-anchor="end" fill="#1DA1F2" font-size="15" font-weight="bold">+94%達成</text>
  <text x="1100" y="453" text-anchor="end" fill="#e0245e" font-size="15" font-weight="bold">+2%程度</text>

  <!-- Divergence arrow at week 6 -->
  <line x1="632" y1="358" x2="632" y2="468" stroke="#14171A" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="650" y="415" fill="#14171A" font-size="13" font-weight="bold">差が開く</text>

  <!-- Legend -->
  <rect x="830" y="115" width="280" height="80" rx="10" fill="#f8f9fa" stroke="#e1e8ed" stroke-width="1"/>
  <line x1="850" y1="145" x2="890" y2="145" stroke="#1DA1F2" stroke-width="3"/>
  <circle cx="870" cy="145" r="5" fill="#1DA1F2"/>
  <text x="900" y="150" fill="#1DA1F2" font-size="15" font-weight="bold">録音あり（フィードバック）</text>
  <line x1="850" y1="175" x2="890" y2="175" stroke="#e0245e" stroke-width="3" stroke-dasharray="8,5"/>
  <circle cx="870" cy="175" r="5" fill="#e0245e"/>
  <text x="900" y="180" fill="#e0245e" font-size="15" font-weight="bold">録音なし</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" fill="#657786" font-size="16">@ichi_eigo</text>
</svg>
