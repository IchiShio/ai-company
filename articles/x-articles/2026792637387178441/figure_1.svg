<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="tempGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1DA1F2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#657786"/>
      <stop offset="100%" stop-color="#8899A6"/>
    </linearGradient>
    <linearGradient id="barGrad5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1DA1F2"/>
      <stop offset="100%" stop-color="#0D8FD8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#FFFFFF"/>
  <rect width="1200" height="675" fill="url(#tempGrad)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="90" fill="#14171A"/>
  <text x="60" y="57" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF">「わかった」の感情温度計</text>
  <text x="60" y="78" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#AAB8C2">冷静・事務的 → 共感・感情的</text>

  <!-- Temperature axis label left -->
  <text x="60" y="145" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">❄ 冷静</text>
  <text x="60" y="590" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#1DA1F2">🔥 共感</text>

  <!-- Thermometer bar (vertical) -->
  <rect x="100" y="155" width="28" height="410" rx="14" fill="#E1E8ED"/>
  <rect x="100" y="365" width="28" height="200" rx="14" fill="#1DA1F2"/>
  <circle cx="114" cy="580" r="22" fill="#1DA1F2"/>

  <!-- Level 1: I understand -->
  <rect x="165" y="150" width="880" height="68" rx="8" fill="#F5F8FA" stroke="#E1E8ED" stroke-width="1.5"/>
  <rect x="165" y="150" width="6" height="68" rx="3" fill="#657786"/>
  <text x="192" y="178" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#14171A">I understand.</text>
  <text x="192" y="202" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">事務的・フォーマル。上司への報告、書き言葉に向く</text>
  <text x="990" y="190" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">🌡 Lv.1</text>

  <!-- Level 2: Got it -->
  <rect x="165" y="232" width="880" height="68" rx="8" fill="#F5F8FA" stroke="#E1E8ED" stroke-width="1.5"/>
  <rect x="165" y="232" width="6" height="68" rx="3" fill="#8899A6"/>
  <text x="192" y="260" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#14171A">Got it.</text>
  <text x="192" y="284" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">シンプルで中立。日常会話で最も使いやすい万能フレーズ</text>
  <text x="990" y="272" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">🌡 Lv.2</text>

  <!-- Level 3: Makes sense -->
  <rect x="165" y="314" width="880" height="68" rx="8" fill="#F0F8FF" stroke="#B8D8F0" stroke-width="1.5"/>
  <rect x="165" y="314" width="6" height="68" rx="3" fill="#4DB8F0"/>
  <text x="192" y="342" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#14171A">Makes sense.</text>
  <text x="192" y="366" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「論理的に納得した」ニュアンス。説明を聞いたあとに自然</text>
  <text x="990" y="354" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#4DB8F0">🌡 Lv.3</text>

  <!-- Level 4: I see -->
  <rect x="165" y="396" width="880" height="68" rx="8" fill="#E8F4FF" stroke="#A8CFED" stroke-width="1.5"/>
  <rect x="165" y="396" width="6" height="68" rx="3" fill="#1DA1F2"/>
  <text x="192" y="424" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#14171A">I see.</text>
  <text x="192" y="448" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「なるほど」の感覚。新情報を受け取った実感が伝わる</text>
  <text x="990" y="436" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2">🌡 Lv.4</text>

  <!-- Level 5: That makes total sense -->
  <rect x="165" y="478" width="880" height="68" rx="8" fill="#E0F2FF" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="165" y="478" width="6" height="68" rx="3" fill="#0D8FD8"/>
  <text x="192" y="506" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#14171A">That makes total sense!</text>
  <text x="192" y="530" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#0D8FD8">強い共感・感情的な同意。相手の気持ちに寄り添う場面に最適</text>
  <text x="990" y="518" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#0D8FD8">🌡 Lv.5</text>

  <!-- Bottom note -->
  <text x="165" y="610" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">💡 場面の「感情温度」に合わせて使い分けることで、会話の質が変わる</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
