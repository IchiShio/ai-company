<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="88" fill="#14171A"/>
  <text x="60" y="52" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">「強い音だけ拾う」練習ステップ</text>
  <text x="60" y="74" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#AAB8C2">今日から始められるリスニング戦略の切り替えフロー</text>

  <!-- Step connector line -->
  <line x1="120" y1="175" x2="120" y2="555" stroke="#E1E8ED" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- Step 1 -->
  <circle cx="120" cy="175" r="28" fill="#1DA1F2"/>
  <text x="120" y="182" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">1</text>
  <rect x="168" y="140" width="960" height="76" rx="10" fill="#E8F5FF" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="195" y="170" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#14171A">「全部聞こう」をやめる</text>
  <text x="195" y="200" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「聞こえなかった = 失敗」という思い込みを手放す。機能語が消えるのは正常。</text>

  <!-- Step 2 -->
  <circle cx="120" cy="285" r="28" fill="#1DA1F2"/>
  <text x="120" y="292" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">2</text>
  <rect x="168" y="250" width="960" height="76" rx="10" fill="#F5F8FA" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="195" y="280" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#14171A">名詞・動詞だけ追う練習（週1〜2回、5分）</text>
  <text x="195" y="310" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">英語音声を聞きながら「強く聞こえた単語」だけをメモ。最初は2〜3語でOK。</text>

  <!-- Step 3 -->
  <circle cx="120" cy="395" r="28" fill="#1DA1F2"/>
  <text x="120" y="402" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">3</text>
  <rect x="168" y="360" width="960" height="76" rx="10" fill="#F5F8FA" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="195" y="390" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#14171A">メモした単語から意味を推測する</text>
  <text x="195" y="420" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">"WANT / GRAB / COFFEE" → 「コーヒーに誘っている」と判断できればOK。</text>

  <!-- Step 4 -->
  <circle cx="120" cy="505" r="28" fill="#1DA1F2"/>
  <text x="120" y="512" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">4</text>
  <rect x="168" y="470" width="960" height="76" rx="10" fill="#F5F8FA" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="195" y="500" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#14171A">形容詞・副詞を加えて解像度を上げる</text>
  <text x="195" y="530" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">内容語の幅を広げることで細かいニュアンスも拾えるようになる。機能語は自然についてくる。</text>

  <!-- Goal box -->
  <rect x="40" y="568" width="1120" height="56" rx="8" fill="#14171A"/>
  <text x="65" y="591" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="bold" fill="#1DA1F2">GOAL</text>
  <text x="120" y="591" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#FFFFFF">強い音を「自動的に」拾えるようになること。耳ではなく、脳の処理モードを変える。</text>
  <text x="65" y="614" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#AAB8C2">練習素材: ニュース音声・Podcast（1.0〜1.2倍速）/ ListenUpのリスニング問題</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
