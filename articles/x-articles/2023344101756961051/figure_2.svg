<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e8f4fd"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bgG2)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#14171A">
    週5設計テンプレート — 最初から休む日を決める
  </text>
  <text x="600" y="76" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">
    「休まないこと」を目標にしない。「週5をこなすこと」だけを目標にする
  </text>

  <!-- Week calendar card -->
  <rect x="60" y="98" width="1080" height="260" rx="16" fill="white" filter="url(#sh2)"/>

  <!-- Day headers -->
  <!-- x positions for 7 days: 60 + (i*154 + 77) -->
  <!-- Mon=137, Tue=291, Wed=445, Thu=599, Fri=753, Sat=907, Sun=1061 -->

  <!-- Day columns -->
  <!-- MON -->
  <rect x="68" y="106" width="140" height="244" rx="10" fill="#e8f4fd"/>
  <text x="138" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">月</text>
  <text x="138" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">Mon</text>
  <rect x="82" y="162" width="112" height="3" rx="1.5" fill="#1DA1F2" opacity="0.4"/>
  <text x="138" y="190" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22">🎧</text>
  <text x="138" y="215" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A" font-weight="600">リスニング</text>
  <text x="138" y="233" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">20〜30分</text>
  <text x="138" y="253" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">ListenUp で</text>
  <text x="138" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">原因特定サイクル</text>
  <rect x="90" y="320" width="96" height="18" rx="9" fill="#1DA1F2"/>
  <text x="138" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white">✔ 学習日</text>

  <!-- TUE -->
  <rect x="222" y="106" width="140" height="244" rx="10" fill="#e8f4fd"/>
  <text x="292" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">火</text>
  <text x="292" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">Tue</text>
  <rect x="236" y="162" width="112" height="3" rx="1.5" fill="#1DA1F2" opacity="0.4"/>
  <text x="292" y="190" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22">📖</text>
  <text x="292" y="215" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A" font-weight="600">語彙・文法</text>
  <text x="292" y="233" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">20〜30分</text>
  <text x="292" y="253" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">単語カード /</text>
  <text x="292" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">GrammarUp</text>
  <rect x="244" y="320" width="96" height="18" rx="9" fill="#1DA1F2"/>
  <text x="292" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white">✔ 学習日</text>

  <!-- WED — REST DAY -->
  <rect x="376" y="106" width="140" height="244" rx="10" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="446" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#bdc3c7">水</text>
  <text x="446" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#bdc3c7">Wed</text>
  <text x="446" y="210" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32">😴</text>
  <text x="446" y="245" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#bdc3c7">オフ日</text>
  <text x="446" y="265" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#bdc3c7">休息が記憶を</text>
  <text x="446" y="282" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#bdc3c7">定着させる</text>
  <rect x="398" y="320" width="96" height="18" rx="9" fill="#e0e0e0"/>
  <text x="446" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="#bdc3c7">休日（計画通り）</text>

  <!-- THU -->
  <rect x="530" y="106" width="140" height="244" rx="10" fill="#e8f4fd"/>
  <text x="600" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">木</text>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">Thu</text>
  <rect x="544" y="162" width="112" height="3" rx="1.5" fill="#1DA1F2" opacity="0.4"/>
  <text x="600" y="190" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22">🎧</text>
  <text x="600" y="215" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A" font-weight="600">リスニング</text>
  <text x="600" y="233" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">20〜30分</text>
  <text x="600" y="253" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">月曜の復習</text>
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">+新しい問題</text>
  <rect x="552" y="320" width="96" height="18" rx="9" fill="#1DA1F2"/>
  <text x="600" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white">✔ 学習日</text>

  <!-- FRI -->
  <rect x="684" y="106" width="140" height="244" rx="10" fill="#e8f4fd"/>
  <text x="754" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">金</text>
  <text x="754" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">Fri</text>
  <rect x="698" y="162" width="112" height="3" rx="1.5" fill="#1DA1F2" opacity="0.4"/>
  <text x="754" y="190" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22">🗣</text>
  <text x="754" y="215" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A" font-weight="600">スピーキング</text>
  <text x="754" y="233" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">20〜30分</text>
  <text x="754" y="253" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">音読 /</text>
  <text x="754" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">シャドーイング</text>
  <rect x="706" y="320" width="96" height="18" rx="9" fill="#1DA1F2"/>
  <text x="754" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white">✔ 学習日</text>

  <!-- SAT -->
  <rect x="838" y="106" width="140" height="244" rx="10" fill="#e8f4fd"/>
  <text x="908" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">土</text>
  <text x="908" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">Sat</text>
  <rect x="852" y="162" width="112" height="3" rx="1.5" fill="#1DA1F2" opacity="0.4"/>
  <text x="908" y="190" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22">📝</text>
  <text x="908" y="215" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#14171A" font-weight="600">週次レビュー</text>
  <text x="908" y="233" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">30〜40分</text>
  <text x="908" y="253" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">週の振り返り</text>
  <text x="908" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">+来週の計画</text>
  <rect x="860" y="320" width="96" height="18" rx="9" fill="#1DA1F2"/>
  <text x="908" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white">✔ 学習日</text>

  <!-- SUN — REST DAY -->
  <rect x="992" y="106" width="140" height="244" rx="10" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="1062" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#bdc3c7">日</text>
  <text x="1062" y="155" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#bdc3c7">Sun</text>
  <text x="1062" y="210" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="32">😴</text>
  <text x="1062" y="245" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#bdc3c7">オフ日</text>
  <text x="1062" y="265" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#bdc3c7">睡眠中に記憶が</text>
  <text x="1062" y="282" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#bdc3c7">長期記憶へ移行</text>
  <rect x="1014" y="320" width="96" height="18" rx="9" fill="#e0e0e0"/>
  <text x="1062" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="#bdc3c7">休日（計画通り）</text>

  <!-- Mindset blocks -->
  <rect x="60" y="382" width="516" height="200" rx="14" fill="white" filter="url(#sh2)"/>
  <rect x="60" y="382" width="516" height="5" rx="2.5" fill="#e74c3c"/>
  <text x="318" y="410" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#e74c3c">❌ 完璧主義マインド（やめる原因）</text>
  <text x="90" y="438" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「3日サボった → 全部やめよう」</text>
  <text x="90" y="462" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「毎日できなかった → 意志が弱い」</text>
  <text x="90" y="486" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「完璧にできない日は意味がない」</text>
  <text x="90" y="510" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「ゼロかヒャクか思考で設計が崩れる」</text>
  <text x="90" y="540" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e74c3c">→ 「休んだ」ではなく「もう終わり」と解釈してしまう</text>
  <text x="90" y="558" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e74c3c">→ 1〜2ヶ月で大半が脱落</text>

  <rect x="624" y="382" width="516" height="200" rx="14" fill="white" filter="url(#sh2)"/>
  <rect x="624" y="382" width="516" height="5" rx="2.5" fill="#1DA1F2"/>
  <text x="882" y="410" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">✅ 週5設計マインド（続く秘訣）</text>
  <text x="654" y="438" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「水・日は休む日。設計通り」</text>
  <text x="654" y="462" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「1日多く休んでも、週4はこなした」</text>
  <text x="654" y="486" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「休息日に記憶が固まる（科学的根拠あり）」</text>
  <text x="654" y="510" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">「明日また再開するだけ」</text>
  <text x="654" y="540" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">→ 「休んだ」は「予定通り」という認知に変わる</text>
  <text x="654" y="558" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">→ 半年・1年後も習慣として残る</text>

  <!-- Credit -->
  <text x="1175" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
