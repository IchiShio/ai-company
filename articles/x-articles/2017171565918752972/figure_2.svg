<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg6)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">反射回路 構築ロードマップ</text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#657786">音→意味の自動化を3フェーズで達成する</text>
  <line x1="80" y1="100" x2="1120" y2="100" stroke="#21262d" stroke-width="1.5"/>

  <!-- Vertical flow line -->
  <line x1="600" y1="130" x2="600" y2="590" stroke="#21262d" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- PHASE 1 -->
  <circle cx="600" cy="165" r="20" fill="#1DA1F2" opacity="0.25" stroke="#1DA1F2" stroke-width="2"/>
  <text x="600" y="172" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="bold" fill="#1DA1F2">1</text>

  <rect x="100" y="135" width="430" height="120" rx="14" fill="#1DA1F2" opacity="0.07" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="315" y="163" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#1DA1F2">フェーズ 1：音の認識</text>
  <text x="315" y="188" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#8b949e">各単語の「音声形式」を正確に把握する</text>
  <text x="315" y="212" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">フォニックス ／ 発音記号 ／ 単語音声を聞いて確認</text>
  <text x="315" y="242" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#8b949e">目標: 音声を聞いて「どの単語か」を識別できる</text>

  <!-- Right side info 1 -->
  <rect x="670" y="135" width="430" height="120" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="165" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">推奨トレーニング</text>
  <text x="885" y="192" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">発音練習 ／ フォニックス学習</text>
  <text x="885" y="216" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">音声付き単語帳</text>
  <text x="885" y="244" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">期間目安: 1〜3ヶ月</text>

  <!-- Arrow down -->
  <polygon points="594,270 606,270 600,285" fill="#657786"/>

  <!-- PHASE 2 -->
  <circle cx="600" cy="320" r="20" fill="#9B59B6" opacity="0.25" stroke="#9B59B6" stroke-width="2"/>
  <text x="600" y="327" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="bold" fill="#9B59B6">2</text>

  <rect x="100" y="292" width="430" height="120" rx="14" fill="#9B59B6" opacity="0.07" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="315" y="320" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#9B59B6">フェーズ 2：即時変換</text>
  <text x="315" y="345" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#8b949e">音 → 意味を日本語介さず直結させる</text>
  <text x="315" y="369" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">スピードリスニング ／ リスニングクイズ ／ 即答練習</text>
  <text x="315" y="399" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#8b949e">目標: 音を聞いた瞬間に意味が浮かぶ</text>

  <!-- Right side info 2 -->
  <rect x="670" y="292" width="430" height="120" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="322" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">推奨トレーニング</text>
  <text x="885" y="348" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">ListenUp リスニングクイズ</text>
  <text x="885" y="372" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">シャドーイング</text>
  <text x="885" y="400" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">期間目安: 3〜6ヶ月</text>

  <!-- Arrow down -->
  <polygon points="594,428 606,428 600,443" fill="#657786"/>

  <!-- PHASE 3 -->
  <circle cx="600" cy="477" r="20" fill="#00C896" opacity="0.25" stroke="#00C896" stroke-width="2"/>
  <text x="600" y="484" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="bold" fill="#00C896">3</text>

  <rect x="100" y="450" width="430" height="120" rx="14" fill="#00C896" opacity="0.08" stroke="#00C896" stroke-width="2"/>
  <text x="315" y="479" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#00C896">フェーズ 3：文脈処理</text>
  <text x="315" y="504" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#8b949e">文全体を即時理解できる速度まで引き上げる</text>
  <text x="315" y="528" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">多量インプット ／ ドラマ・Podcast ／ 自然速リスニング</text>
  <text x="315" y="556" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#8b949e">目標: 字幕なしでドラマを理解できる</text>

  <!-- Right side info 3 -->
  <rect x="670" y="450" width="430" height="120" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="480" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">推奨トレーニング</text>
  <text x="885" y="506" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">英語ドラマ（字幕なし）</text>
  <text x="885" y="530" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#FFFFFF">英語 Podcast / ラジオ</text>
  <text x="885" y="558" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">期間目安: 6ヶ月〜</text>

  <!-- Bottom goal -->
  <rect x="300" y="590" width="600" height="46" rx="12" fill="#00C896" opacity="0.12" stroke="#00C896" stroke-width="1.5"/>
  <text x="600" y="618" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="bold" fill="#00C896">GOAL：海外ドラマを字幕なしで楽しめる</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" fill="#AAB8C2" font-size="18">@ichi_eigo</text>
</svg>
