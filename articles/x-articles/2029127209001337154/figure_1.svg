<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="100" fill="#1DA1F2"/>
  <text x="600" y="38" font-size="34" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">「休んだ日」に脳は何をしているか</text>
  <text x="600" y="75" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle">筋トレと記憶固定の共通メカニズム</text>

  <!-- Two columns comparison -->
  <!-- Left: 筋トレ -->
  <rect x="60" y="125" width="500" height="430" fill="#192734" rx="14" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="60" y="125" width="500" height="50" fill="#1DA1F2" rx="14"/>
  <rect x="60" y="148" width="500" height="27" fill="#1DA1F2"/>
  <text x="310" y="153" font-size="22" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">筋トレの超回復</text>

  <text x="310" y="215" font-size="60" text-anchor="middle">💪</text>

  <rect x="90" y="270" width="440" height="55" fill="#14171A" rx="8"/>
  <text x="310" y="292" font-size="16" fill="#1DA1F2" text-anchor="middle" dominant-baseline="middle">トレーニング日</text>
  <text x="310" y="313" font-size="14" fill="#657786" text-anchor="middle">筋繊維に微細なダメージ</text>

  <text x="310" y="353" font-size="24" fill="#1DA1F2" text-anchor="middle">▼</text>

  <rect x="90" y="370" width="440" height="55" fill="#14171A" rx="8"/>
  <text x="310" y="392" font-size="16" fill="#1DA1F2" text-anchor="middle" dominant-baseline="middle">休息日</text>
  <text x="310" y="413" font-size="14" fill="#657786" text-anchor="middle">筋肉が修復・以前より強く成長</text>

  <text x="310" y="453" font-size="24" fill="#1DA1F2" text-anchor="middle">▼</text>

  <rect x="90" y="470" width="440" height="55" fill="#1DA1F2" rx="8"/>
  <text x="310" y="492" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">超回復完了</text>
  <text x="310" y="513" font-size="14" fill="#E1E8ED" text-anchor="middle">休んだ日こそ成長の日</text>

  <!-- Right: 記憶固定 -->
  <rect x="640" y="125" width="500" height="430" fill="#192734" rx="14" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="640" y="125" width="500" height="50" fill="#1DA1F2" rx="14"/>
  <rect x="640" y="148" width="500" height="27" fill="#1DA1F2"/>
  <text x="890" y="153" font-size="22" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">記憶の固定（Memory Consolidation）</text>

  <text x="890" y="215" font-size="60" text-anchor="middle">🧠</text>

  <rect x="670" y="270" width="440" height="55" fill="#14171A" rx="8"/>
  <text x="890" y="292" font-size="16" fill="#1DA1F2" text-anchor="middle" dominant-baseline="middle">学習日</text>
  <text x="890" y="313" font-size="14" fill="#657786" text-anchor="middle">海馬に短期記憶として保存</text>

  <text x="890" y="353" font-size="24" fill="#1DA1F2" text-anchor="middle">▼</text>

  <rect x="670" y="370" width="440" height="55" fill="#14171A" rx="8"/>
  <text x="890" y="392" font-size="16" fill="#1DA1F2" text-anchor="middle" dominant-baseline="middle">睡眠・休息日</text>
  <text x="890" y="413" font-size="14" fill="#657786" text-anchor="middle">脳が記憶を再活性化・整理・統合</text>

  <text x="890" y="453" font-size="24" fill="#1DA1F2" text-anchor="middle">▼</text>

  <rect x="670" y="470" width="440" height="55" fill="#1DA1F2" rx="8"/>
  <text x="890" y="492" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">長期記憶へ定着</text>
  <text x="890" y="513" font-size="14" fill="#E1E8ED" text-anchor="middle">Stickgold, R. (2005) Nature</text>

  <!-- Credit -->
  <text x="1165" y="658" font-size="18" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
