<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#14171A">英語の謝罪表現：強さスペクトラム</text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">軽い一言から、責任を明確にする重い表現まで</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AAB8C2"/>
      <stop offset="50%" stop-color="#1DA1F2"/>
      <stop offset="100%" stop-color="#14171A"/>
    </linearGradient>
  </defs>
  <rect x="80" y="110" width="1040" height="18" rx="9" fill="url(#spectrumGrad)"/>
  <text x="80" y="145" text-anchor="start" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">← 軽い・日常的</text>
  <text x="1120" y="145" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A">重い・公式的 →</text>

  <!-- Level 1 -->
  <circle cx="140" cy="119" r="8" fill="#FFFFFF" stroke="#AAB8C2" stroke-width="3"/>
  <rect x="60" y="160" width="200" height="200" rx="14" fill="#FFFFFF" stroke="#AAB8C2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="160" width="200" height="36" rx="14" fill="#AAB8C2"/>
  <rect x="60" y="182" width="200" height="14" fill="#AAB8C2"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Lv.1  ごく軽い</text>
  <text x="160" y="222" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#14171A">Sorry.</text>
  <text x="160" y="252" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">ちょっとした</text>
  <text x="160" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">すれ違い・</text>
  <text x="160" y="288" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">小さなミス</text>
  <text x="160" y="312" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#AAB8C2">★☆☆☆☆</text>
  <text x="160" y="332" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">日常のみ</text>
  <text x="160" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="#999999">誠意なしに聞こえることも</text>

  <!-- Level 2 -->
  <circle cx="340" cy="119" r="8" fill="#FFFFFF" stroke="#87CEEB" stroke-width="3"/>
  <rect x="260" y="160" width="200" height="200" rx="14" fill="#FFFFFF" stroke="#87CEEB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="260" y="160" width="200" height="36" rx="14" fill="#87CEEB"/>
  <rect x="260" y="182" width="200" height="14" fill="#87CEEB"/>
  <text x="360" y="185" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Lv.2  一般的</text>
  <text x="360" y="222" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" font-weight="bold" fill="#14171A">I'm sorry.</text>
  <text x="360" y="252" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">感情を込めた</text>
  <text x="360" y="270" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">一般的な謝罪</text>
  <text x="360" y="312" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#87CEEB">★★☆☆☆</text>
  <text x="360" y="332" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">友人・知人に有効</text>
  <text x="360" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="#999999">ビジネスでは弱い場合も</text>

  <!-- Level 3 -->
  <circle cx="560" cy="119" r="8" fill="#FFFFFF" stroke="#1DA1F2" stroke-width="3"/>
  <rect x="460" y="160" width="200" height="200" rx="14" fill="#FFFFFF" stroke="#1DA1F2" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="460" y="160" width="200" height="36" rx="14" fill="#1DA1F2"/>
  <rect x="460" y="182" width="200" height="14" fill="#1DA1F2"/>
  <text x="560" y="185" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Lv.3  責任表明</text>
  <text x="560" y="218" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">I should have</text>
  <text x="560" y="237" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">told you sooner.</text>
  <text x="560" y="262" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">「もっと早く</text>
  <text x="560" y="278" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">伝えるべきでした」</text>
  <text x="560" y="312" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2">★★★☆☆</text>
  <text x="560" y="332" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">職場・報告遅延に</text>
  <!-- Highlight badge -->
  <rect x="480" y="348" width="160" height="22" rx="6" fill="#1DA1F2" opacity="0.15"/>
  <text x="560" y="363" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#1DA1F2" font-weight="bold">← 今日から使いたい1文</text>

  <!-- Level 4 -->
  <circle cx="800" cy="119" r="8" fill="#FFFFFF" stroke="#0B7EC8" stroke-width="3"/>
  <rect x="700" y="160" width="200" height="200" rx="14" fill="#FFFFFF" stroke="#0B7EC8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="700" y="160" width="200" height="36" rx="14" fill="#0B7EC8"/>
  <rect x="700" y="182" width="200" height="14" fill="#0B7EC8"/>
  <text x="800" y="185" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Lv.4  公式謝罪</text>
  <text x="800" y="218" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">I apologize for</text>
  <text x="800" y="237" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">the inconvenience.</text>
  <text x="800" y="262" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">「ご迷惑を</text>
  <text x="800" y="278" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">おかけしました」</text>
  <text x="800" y="312" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#0B7EC8">★★★★☆</text>
  <text x="800" y="332" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">書面・ビジネス向け</text>
  <text x="800" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="#999999">やや格式ばった印象</text>

  <!-- Level 5 -->
  <circle cx="1040" cy="119" r="8" fill="#FFFFFF" stroke="#14171A" stroke-width="3"/>
  <rect x="940" y="160" width="200" height="200" rx="14" fill="#FFFFFF" stroke="#14171A" stroke-width="2" filter="url(#shadow)"/>
  <rect x="940" y="160" width="200" height="36" rx="14" fill="#14171A"/>
  <rect x="940" y="182" width="200" height="14" fill="#14171A"/>
  <text x="1040" y="185" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Lv.5  完全な責任</text>
  <text x="1040" y="218" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">I take full</text>
  <text x="1040" y="237" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="bold" fill="#14171A">responsibility.</text>
  <text x="1040" y="262" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">「全責任は</text>
  <text x="1040" y="278" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">私にあります」</text>
  <text x="1040" y="312" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#14171A">★★★★★</text>
  <text x="1040" y="332" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786">重大ミス・損害時</text>
  <text x="1040" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="#999999">最も強い責任表明</text>

  <!-- Bottom summary -->
  <rect x="80" y="390" width="1040" height="56" rx="10" fill="#14171A" opacity="0.06"/>
  <text x="600" y="415" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="bold" fill="#14171A">「should have + 過去分詞」= 後悔 + 責任表明。ビジネス英語で最も伝わる謝罪構文</text>
  <text x="600" y="436" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">例: I should have informed you earlier. / I should have double-checked the figures.</text>

  <!-- Grammar note -->
  <rect x="80" y="460" width="1040" height="155" rx="10" fill="#FFFFFF" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="120" y="490" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="bold" fill="#1DA1F2">使い分けポイント</text>
  <text x="120" y="516" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A">Lv.1–2：友人・カジュアル場面 → "Sorry" "I'm sorry" で十分</text>
  <text x="120" y="538" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A">Lv.3：職場の報告遅れ・情報共有ミス → "I should have..." が最適</text>
  <text x="120" y="560" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A">Lv.4：メール・公式コミュニケーション → "I apologize for..." を使用</text>
  <text x="120" y="582" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#14171A">Lv.5：重大ミス・クライアントへの謝罪 → "I take full responsibility." で締める</text>
  <text x="120" y="600" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2">→ 詳しい例文は native-real.com/grammar/ で確認</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
