<body>
  <!-- GTM noscript -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PS9R9844" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <canvas id="loom-canvas"></canvas>

  <!-- Minimal top bar (appears on hover) -->
  <div class="top-bar">
    <span class="timer" id="timer">0:00</span>
    <button id="settings-btn" title="Settings">&#9881;</button>
    <button id="fs-btn" title="Fullscreen">&#x26F6;</button>
  </div>

  <!-- Settings slide-in panel -->
  <div class="settings-panel" id="settings-panel">
    <h2>English Loom</h2>

    <div class="setting-group">
      <label>Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="drift"> Drift</label>
        <label><input type="radio" name="mode" value="breathing" checked> Breathing</label>
        <label><input type="radio" name="mode" value="night"> Night</label>
        <label><input type="radio" name="mode" value="custom"> Custom</label>
      </div>
    </div>

    <div class="setting-group">
      <label>Speed</label>
      <input type="range" id="speed-slider" min="0.1" max="1" step="0.1" value="0.5">
    </div>

    <div class="setting-group">
      <label>Font Size</label>
      <input type="range" id="font-slider" min="16" max="28" step="1" value="19">
    </div>

    <div class="setting-group">
      <label>Text</label>
      <select id="preset-select"></select>
      <button class="paste-btn" id="paste-btn">Paste your own text</button>
    </div>
  </div>

  <!-- Bottom title (appears on hover) -->
  <div class="title-overlay">
    <h1>English Loom</h1>
