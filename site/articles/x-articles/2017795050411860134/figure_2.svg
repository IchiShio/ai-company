<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-size="26" font-weight="bold" fill="#FFFFFF">目的別おすすめ学習プラン</text>
  <text x="600" y="82" text-anchor="middle" font-size="16" fill="#657786">TOEIC目標 / 会話目標 / 両立　3パターン</text>

  <!-- Column headers -->
  <!-- TOEIC column -->
  <rect x="60" y="105" width="320" height="50" rx="8" fill="#1DA1F2"/>
  <text x="220" y="136" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">🎯 TOEICスコア重視</text>

  <!-- 会話 column -->
  <rect x="440" y="105" width="320" height="50" rx="8" fill="#F59E0B"/>
  <text x="600" y="136" text-anchor="middle" font-size="18" font-weight="bold" fill="#14171A">🗣 会話力重視</text>

  <!-- 両立 column -->
  <rect x="820" y="105" width="320" height="50" rx="8" fill="#10B981"/>
  <text x="980" y="136" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">⚖️ スコア＋会話 両立</text>

  <!-- Row 1: 主な目的 -->
  <rect x="60" y="168" width="320" height="65" rx="6" fill="#1DA1F2" fill-opacity="0.12" stroke="#1DA1F2" stroke-width="1"/>
  <text x="220" y="192" text-anchor="middle" font-size="13" fill="#657786">主な目的</text>
  <text x="220" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">就職・昇進・履歴書</text>
  <text x="220" y="230" text-anchor="middle" font-size="14" fill="#FFFFFF">スコア証明</text>

  <rect x="440" y="168" width="320" height="65" rx="6" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="1"/>
  <text x="600" y="192" text-anchor="middle" font-size="13" fill="#657786">主な目的</text>
  <text x="600" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">海外出張・旅行・</text>
  <text x="600" y="230" text-anchor="middle" font-size="14" fill="#FFFFFF">外国人との交流</text>

  <rect x="820" y="168" width="320" height="65" rx="6" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="1"/>
  <text x="980" y="192" text-anchor="middle" font-size="13" fill="#657786">主な目的</text>
  <text x="980" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">グローバル業務・</text>
  <text x="980" y="230" text-anchor="middle" font-size="14" fill="#FFFFFF">キャリアアップ</text>

  <!-- Row 2: 週間配分 -->
  <rect x="60" y="245" width="320" height="120" rx="6" fill="#1DA1F2" fill-opacity="0.08" stroke="#1DA1F2" stroke-width="1"/>
  <text x="220" y="267" text-anchor="middle" font-size="13" fill="#657786">週間配分（例：7時間）</text>
  <text x="100" y="292" font-size="14" fill="#1DA1F2">■</text><text x="118" y="292" font-size="14" fill="#FFFFFF">公式問題集　　4h（57%）</text>
  <text x="100" y="316" font-size="14" fill="#1DA1F2">■</text><text x="118" y="316" font-size="14" fill="#FFFFFF">語彙・文法　　2h（29%）</text>
  <text x="100" y="340" font-size="14" fill="#1DA1F2">■</text><text x="118" y="340" font-size="14" fill="#FFFFFF">リスニング　　1h（14%）</text>

  <rect x="440" y="245" width="320" height="120" rx="6" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-width="1"/>
  <text x="600" y="267" text-anchor="middle" font-size="13" fill="#657786">週間配分（例：7時間）</text>
  <text x="480" y="292" font-size="14" fill="#F59E0B">■</text><text x="498" y="292" font-size="14" fill="#FFFFFF">シャドーイング　3h（43%）</text>
  <text x="480" y="316" font-size="14" fill="#F59E0B">■</text><text x="498" y="316" font-size="14" fill="#FFFFFF">瞬間英作文　　 2h（29%）</text>
  <text x="480" y="340" font-size="14" fill="#F59E0B">■</text><text x="498" y="340" font-size="14" fill="#FFFFFF">音読・速音読　 2h（29%）</text>

  <rect x="820" y="245" width="320" height="120" rx="6" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="980" y="267" text-anchor="middle" font-size="13" fill="#657786">週間配分（例：7時間）</text>
  <text x="860" y="292" font-size="14" fill="#10B981">■</text><text x="878" y="292" font-size="14" fill="#FFFFFF">問題集＋語彙　2h（29%）</text>
  <text x="860" y="316" font-size="14" fill="#10B981">■</text><text x="878" y="316" font-size="14" fill="#FFFFFF">音読・速音読　2h（29%）</text>
  <text x="860" y="340" font-size="14" fill="#10B981">■</text><text x="878" y="340" font-size="14" fill="#FFFFFF">シャドーイング 3h（43%）</text>

  <!-- Row 3: おすすめリソース -->
  <rect x="60" y="378" width="320" height="110" rx="6" fill="#1DA1F2" fill-opacity="0.08" stroke="#1DA1F2" stroke-width="1"/>
  <text x="220" y="400" text-anchor="middle" font-size="13" fill="#657786">おすすめリソース</text>
  <text x="220" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">公式TOEIC問題集</text>
  <text x="220" y="446" text-anchor="middle" font-size="14" fill="#FFFFFF">金フレ・銀フレ</text>
  <text x="220" y="468" text-anchor="middle" font-size="14" fill="#1DA1F2">▶ native-real.com/grammar/</text>

  <rect x="440" y="378" width="320" height="110" rx="6" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-width="1"/>
  <text x="600" y="400" text-anchor="middle" font-size="13" fill="#657786">おすすめリソース</text>
  <text x="600" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">瞬間英作文（森沢洋介）</text>
  <text x="600" y="446" text-anchor="middle" font-size="14" fill="#FFFFFF">BBCラジオ・VOA教材</text>
  <text x="600" y="468" text-anchor="middle" font-size="14" fill="#F59E0B">▶ オンライン英会話</text>

  <rect x="820" y="378" width="320" height="110" rx="6" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="980" y="400" text-anchor="middle" font-size="13" fill="#657786">おすすめリソース</text>
  <text x="980" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">ニュース英語音読</text>
  <text x="980" y="446" text-anchor="middle" font-size="14" fill="#FFFFFF">TOEIC公式 + 速音読</text>
  <text x="980" y="468" text-anchor="middle" font-size="14" fill="#10B981">▶ 週1スピーキング練習</text>

  <!-- Bottom message -->
  <rect x="200" y="508" width="800" height="55" rx="10" fill="#1DA1F2" fill-opacity="0.15" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="600" y="531" text-anchor="middle" font-size="16" font-weight="bold" fill="#1DA1F2">まず「自分の目的」を決める。それが最短ルートの出発点。</text>
  <text x="600" y="553" text-anchor="middle" font-size="14" fill="#FFFFFF">スコアと会話力、どちらを先に鍛えるかで学習設計が変わる。</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
