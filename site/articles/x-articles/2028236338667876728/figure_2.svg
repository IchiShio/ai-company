<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#f8f9fa"/>

  <!-- Title bar -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold">内容語 vs 機能語：分類チートシート</text>

  <!-- Left: 内容語 (Content Words) -->
  <rect x="30" y="100" width="560" height="540" rx="16" fill="white" stroke="#e1e8ed" stroke-width="2"/>
  <rect x="30" y="100" width="560" height="60" rx="16" fill="#1DA1F2"/>
  <rect x="30" y="140" width="560" height="20" fill="#1DA1F2"/>
  <text x="310" y="138" text-anchor="middle" fill="white" font-size="24" font-weight="bold">内容語（Content Words）</text>
  <text x="310" y="175" text-anchor="middle" fill="#14171A" font-size="16">強く・はっきり・長めに読む</text>

  <!-- Nouns -->
  <rect x="55" y="195" width="510" height="80" rx="10" fill="#e8f5fe"/>
  <text x="75" y="223" fill="#1DA1F2" font-size="17" font-weight="bold">名詞（Nouns）</text>
  <text x="75" y="248" fill="#14171A" font-size="15">dog / house / idea / problem / solution / music</text>
  <text x="75" y="268" fill="#657786" font-size="13">→ 物・人・場所・概念を表す語</text>

  <!-- Main Verbs -->
  <rect x="55" y="290" width="510" height="80" rx="10" fill="#e8f5fe"/>
  <text x="75" y="318" fill="#1DA1F2" font-size="17" font-weight="bold">動詞（Main Verbs）</text>
  <text x="75" y="343" fill="#14171A" font-size="15">run / think / decide / understand / create</text>
  <text x="75" y="363" fill="#657786" font-size="13">→ 動作・状態を表す語（助動詞は機能語）</text>

  <!-- Adjectives -->
  <rect x="55" y="385" width="510" height="80" rx="10" fill="#e8f5fe"/>
  <text x="75" y="413" fill="#1DA1F2" font-size="17" font-weight="bold">形容詞（Adjectives）</text>
  <text x="75" y="438" fill="#14171A" font-size="15">beautiful / important / difficult / small / new</text>
  <text x="75" y="458" fill="#657786" font-size="13">→ 名詞を修飾する語</text>

  <!-- Adverbs -->
  <rect x="55" y="480" width="510" height="80" rx="10" fill="#e8f5fe"/>
  <text x="75" y="508" fill="#1DA1F2" font-size="17" font-weight="bold">副詞（Adverbs）</text>
  <text x="75" y="533" fill="#14171A" font-size="15">quickly / very / always / never / really / well</text>
  <text x="75" y="553" fill="#657786" font-size="13">→ 動詞・形容詞・文全体を修飾する語</text>

  <!-- Tip box -->
  <rect x="55" y="575" width="510" height="45" rx="8" fill="#14171A"/>
  <text x="310" y="603" text-anchor="middle" fill="white" font-size="16" font-weight="bold">POINT: 新情報・強調したい語をさらに強く</text>

  <!-- Right: 機能語 (Function Words) -->
  <rect x="610" y="100" width="560" height="540" rx="16" fill="white" stroke="#e1e8ed" stroke-width="2"/>
  <rect x="610" y="100" width="560" height="60" rx="16" fill="#657786"/>
  <rect x="610" y="140" width="560" height="20" fill="#657786"/>
  <text x="890" y="138" text-anchor="middle" fill="white" font-size="24" font-weight="bold">機能語（Function Words）</text>
  <text x="890" y="175" text-anchor="middle" fill="#14171A" font-size="16">弱く・短く・流れるように読む</text>

  <!-- Articles -->
  <rect x="635" y="195" width="510" height="80" rx="10" fill="#f7f9fa"/>
  <text x="655" y="223" fill="#657786" font-size="17" font-weight="bold">冠詞（Articles）</text>
  <text x="655" y="248" fill="#14171A" font-size="15">a → /ə/　　an → /ən/　　the → /ðə/ または /ðɪ/</text>
  <text x="655" y="268" fill="#657786" font-size="13">→ 弱形で発音。強調時のみフルで読む</text>

  <!-- Prepositions -->
  <rect x="635" y="290" width="510" height="80" rx="10" fill="#f7f9fa"/>
  <text x="655" y="318" fill="#657786" font-size="17" font-weight="bold">前置詞（Prepositions）</text>
  <text x="655" y="343" fill="#14171A" font-size="15">at / in / on / to / for / with / from / of</text>
  <text x="655" y="363" fill="#657786" font-size="13">→ 文法的な位置関係を示す語</text>

  <!-- Auxiliary Verbs -->
  <rect x="635" y="385" width="510" height="80" rx="10" fill="#f7f9fa"/>
  <text x="655" y="413" fill="#657786" font-size="17" font-weight="bold">助動詞（Auxiliary Verbs）</text>
  <text x="655" y="438" fill="#14171A" font-size="15">am / is / are / was / were / have / has / do / will</text>
  <text x="655" y="458" fill="#657786" font-size="13">→ 時制・文法機能を示す。短縮形が基本</text>

  <!-- Conjunctions & Pronouns -->
  <rect x="635" y="480" width="510" height="80" rx="10" fill="#f7f9fa"/>
  <text x="655" y="508" fill="#657786" font-size="17" font-weight="bold">接続詞・代名詞</text>
  <text x="655" y="533" fill="#14171A" font-size="15">and / but / or / I / you / he / she / it / they</text>
  <text x="655" y="553" fill="#657786" font-size="13">→ 文をつなぐ・指示する役割</text>

  <!-- Tip box right -->
  <rect x="635" y="575" width="510" height="45" rx="8" fill="#14171A"/>
  <text x="890" y="603" text-anchor="middle" fill="white" font-size="16" font-weight="bold">POINT: 機能語を弱めるとリズムが自然に出る</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" fill="#657786" font-size="16">@ichi_eigo</text>
</svg>
