<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8fd9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="1200" height="6" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#14171A">語彙数と会話カバー率：収穫逓減の法則</text>
  <text x="600" y="94" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="17" fill="#657786">増やせば増やすほど「効率」は落ちる</text>

  <!-- Axes -->
  <line x1="120" y1="540" x2="1100" y2="540" stroke="#14171A" stroke-width="2"/>
  <line x1="120" y1="130" x2="120" y2="540" stroke="#14171A" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="108" y="535" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">0%</text>
  <text x="108" y="435" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">25%</text>
  <text x="108" y="335" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">50%</text>
  <text x="108" y="235" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">75%</text>
  <text x="108" y="155" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">95%</text>

  <!-- Grid lines -->
  <line x1="120" y1="435" x2="1100" y2="435" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="335" x2="1100" y2="335" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="235" x2="1100" y2="235" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="155" x2="1100" y2="155" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- X-axis labels -->
  <text x="220" y="565" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">500語</text>
  <text x="380" y="565" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">1,000語</text>
  <text x="540" y="565" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">1,500語</text>
  <text x="700" y="565" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">3,000語</text>
  <text x="860" y="565" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">5,000語</text>
  <text x="1020" y="565" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">10,000語</text>

  <!-- Curve: logarithmic growth (収穫逓減) -->
  <!-- Points: 500→62%, 1000→80%, 1500→89%, 3000→93%, 5000→95%, 10000→96% -->
  <!-- y = 540 - (value/100)*410 -->
  <!-- 62%: y=285, 80%: y=212, 89%: y=175, 93%: y=159, 95%: y=151, 96%: y=147 -->
  <polyline points="220,285 380,212 540,175 700,163 860,155 1020,151"
    fill="none" stroke="#1DA1F2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Area under curve -->
  <polygon points="120,540 220,285 380,212 540,175 700,163 860,155 1020,151 1020,540"
    fill="#1DA1F2" fill-opacity="0.08"/>

  <!-- Key markers -->
  <!-- 1500語 marker -->
  <circle cx="540" cy="175" r="10" fill="#1DA1F2"/>
  <line x1="540" y1="175" x2="540" y2="540" stroke="#1DA1F2" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="420" y="118" width="240" height="44" fill="#1DA1F2" rx="22"/>
  <text x="540" y="136" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white" font-weight="700">1,500語で日常会話の89%をカバー</text>
  <text x="540" y="154" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="white">← ここが費用対効果の頂点</text>

  <!-- Axis labels -->
  <text x="610" y="600" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#14171A" font-weight="600">語彙数（語）</text>
  <text x="68" y="340" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#14171A" font-weight="600" transform="rotate(-90, 68, 340)">会話カバー率（%）</text>

  <!-- Diminishing returns zone annotation -->
  <rect x="700" y="300" width="320" height="60" fill="white" stroke="#AAB8C2" stroke-width="1.5" rx="8"/>
  <text x="860" y="323" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">3,000語以降は</text>
  <text x="860" y="347" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">カバー率がほぼ変わらない</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2">@ichi_eigo</text>
</svg>
