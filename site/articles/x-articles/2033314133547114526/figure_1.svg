<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>
  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold">get / make / take 意味マップ</text>
  <text x="600" y="74" text-anchor="middle" fill="#657786" font-size="16">3つの基本動詞だけで英会話の大半はカバーできる</text>

  <!-- ===== GET node ===== -->
  <circle cx="200" cy="320" r="58" fill="#1DA1F2" opacity="0.15" stroke="#1DA1F2" stroke-width="2.5"/>
  <text x="200" y="315" text-anchor="middle" fill="#1DA1F2" font-size="32" font-weight="bold">get</text>
  <text x="200" y="336" text-anchor="middle" fill="#657786" font-size="13">手に入れる/なる/到着</text>

  <!-- GET branches -->
  <!-- get + 名詞 -->
  <line x1="158" y1="275" x2="80" y2="190" stroke="#1DA1F2" stroke-width="1.5" opacity="0.7"/>
  <rect x="10" y="155" width="145" height="46" rx="8" fill="#1DA1F2" opacity="0.12" stroke="#1DA1F2" stroke-width="1"/>
  <text x="83" y="174" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">get a taxi</text>
  <text x="83" y="192" text-anchor="middle" fill="#657786" font-size="12">タクシーを呼ぶ</text>

  <!-- get + 形容詞 -->
  <line x1="148" y1="290" x2="52" y2="295" stroke="#1DA1F2" stroke-width="1.5" opacity="0.7"/>
  <rect x="-10" y="272" width="148" height="46" rx="8" fill="#1DA1F2" opacity="0.12" stroke="#1DA1F2" stroke-width="1"/>
  <text x="64" y="291" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">get tired</text>
  <text x="64" y="309" text-anchor="middle" fill="#657786" font-size="12">疲れてくる</text>

  <!-- get + to -->
  <line x1="155" y1="355" x2="70" y2="400" stroke="#1DA1F2" stroke-width="1.5" opacity="0.7"/>
  <rect x="0" y="380" width="148" height="46" rx="8" fill="#1DA1F2" opacity="0.12" stroke="#1DA1F2" stroke-width="1"/>
  <text x="74" y="399" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">get to know</text>
  <text x="74" y="417" text-anchor="middle" fill="#657786" font-size="12">知るようになる</text>

  <!-- get it -->
  <line x1="170" y1="370" x2="120" y2="460" stroke="#1DA1F2" stroke-width="1.5" opacity="0.7"/>
  <rect x="45" y="445" width="148" height="46" rx="8" fill="#1DA1F2" opacity="0.12" stroke="#1DA1F2" stroke-width="1"/>
  <text x="119" y="464" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">get it</text>
  <text x="119" y="482" text-anchor="middle" fill="#657786" font-size="12">理解する</text>

  <!-- ===== MAKE node ===== -->
  <circle cx="600" cy="320" r="58" fill="#17BF63" opacity="0.15" stroke="#17BF63" stroke-width="2.5"/>
  <text x="600" y="315" text-anchor="middle" fill="#17BF63" font-size="32" font-weight="bold">make</text>
  <text x="600" y="336" text-anchor="middle" fill="#657786" font-size="13">作る/させる/達成</text>

  <!-- MAKE branches top -->
  <line x1="570" y1="264" x2="490" y2="185" stroke="#17BF63" stroke-width="1.5" opacity="0.7"/>
  <rect x="405" y="152" width="160" height="46" rx="8" fill="#17BF63" opacity="0.12" stroke="#17BF63" stroke-width="1"/>
  <text x="485" y="171" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">make a decision</text>
  <text x="485" y="189" text-anchor="middle" fill="#657786" font-size="12">決断する</text>

  <line x1="600" y1="262" x2="600" y2="185" stroke="#17BF63" stroke-width="1.5" opacity="0.7"/>
  <rect x="520" y="148" width="160" height="46" rx="8" fill="#17BF63" opacity="0.12" stroke="#17BF63" stroke-width="1"/>
  <text x="600" y="167" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">make sense</text>
  <text x="600" y="185" text-anchor="middle" fill="#657786" font-size="12">意味をなす</text>

  <line x1="630" y1="264" x2="710" y2="185" stroke="#17BF63" stroke-width="1.5" opacity="0.7"/>
  <rect x="635" y="152" width="160" height="46" rx="8" fill="#17BF63" opacity="0.12" stroke="#17BF63" stroke-width="1"/>
  <text x="715" y="171" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">make it</text>
  <text x="715" y="189" text-anchor="middle" fill="#657786" font-size="12">成功する/間に合う</text>

  <!-- MAKE branches bottom -->
  <line x1="570" y1="375" x2="490" y2="450" stroke="#17BF63" stroke-width="1.5" opacity="0.7"/>
  <rect x="405" y="435" width="165" height="46" rx="8" fill="#17BF63" opacity="0.12" stroke="#17BF63" stroke-width="1"/>
  <text x="487" y="454" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">make friends</text>
  <text x="487" y="472" text-anchor="middle" fill="#657786" font-size="12">友達を作る</text>

  <line x1="630" y1="375" x2="710" y2="450" stroke="#17BF63" stroke-width="1.5" opacity="0.7"/>
  <rect x="635" y="435" width="165" height="46" rx="8" fill="#17BF63" opacity="0.12" stroke="#17BF63" stroke-width="1"/>
  <text x="717" y="454" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">make sb do</text>
  <text x="717" y="472" text-anchor="middle" fill="#657786" font-size="12">〜させる</text>

  <!-- ===== TAKE node ===== -->
  <circle cx="1000" cy="320" r="58" fill="#FFAD1F" opacity="0.15" stroke="#FFAD1F" stroke-width="2.5"/>
  <text x="1000" y="315" text-anchor="middle" fill="#FFAD1F" font-size="32" font-weight="bold">take</text>
  <text x="1000" y="336" text-anchor="middle" fill="#657786" font-size="13">取る/かかる/受け入れ</text>

  <!-- TAKE branches -->
  <line x1="1030" y1="268" x2="1095" y2="190" stroke="#FFAD1F" stroke-width="1.5" opacity="0.7"/>
  <rect x="1040" y="155" width="148" height="46" rx="8" fill="#FFAD1F" opacity="0.12" stroke="#FFAD1F" stroke-width="1"/>
  <text x="1114" y="174" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">take time</text>
  <text x="1114" y="192" text-anchor="middle" fill="#657786" font-size="12">時間がかかる</text>

  <line x1="1050" y1="290" x2="1148" y2="295" stroke="#FFAD1F" stroke-width="1.5" opacity="0.7"/>
  <rect x="1063" y="272" width="148" height="46" rx="8" fill="#FFAD1F" opacity="0.12" stroke="#FFAD1F" stroke-width="1"/>
  <text x="1137" y="291" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">take a break</text>
  <text x="1137" y="309" text-anchor="middle" fill="#657786" font-size="12">休憩する</text>

  <line x1="1042" y1="355" x2="1120" y2="405" stroke="#FFAD1F" stroke-width="1.5" opacity="0.7"/>
  <rect x="1052" y="390" width="148" height="46" rx="8" fill="#FFAD1F" opacity="0.12" stroke="#FFAD1F" stroke-width="1"/>
  <text x="1126" y="409" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">take care of</text>
  <text x="1126" y="427" text-anchor="middle" fill="#657786" font-size="12">〜の世話をする</text>

  <line x1="965" y1="268" x2="900" y2="190" stroke="#FFAD1F" stroke-width="1.5" opacity="0.7"/>
  <rect x="815" y="155" width="160" height="46" rx="8" fill="#FFAD1F" opacity="0.12" stroke="#FFAD1F" stroke-width="1"/>
  <text x="895" y="174" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">take a look</text>
  <text x="895" y="192" text-anchor="middle" fill="#657786" font-size="12">見てみる</text>

  <line x1="960" y1="370" x2="890" y2="450" stroke="#FFAD1F" stroke-width="1.5" opacity="0.7"/>
  <rect x="810" y="435" width="160" height="46" rx="8" fill="#FFAD1F" opacity="0.12" stroke="#FFAD1F" stroke-width="1"/>
  <text x="890" y="454" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">take it easy</text>
  <text x="890" y="472" text-anchor="middle" fill="#657786" font-size="12">気楽にやる</text>

  <!-- Bottom label -->
  <text x="600" y="615" text-anchor="middle" fill="#657786" font-size="14">各動詞は20〜50以上の意味・フレーズを持つ — 深く使いこなすほど表現力が広がる</text>

  <!-- Credit -->
  <text x="1175" y="658" text-anchor="end" fill="#657786" font-size="13">@ichi_eigo</text>
</svg>
