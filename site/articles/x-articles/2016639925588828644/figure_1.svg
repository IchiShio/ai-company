<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Header bar -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    "down" の意味は文脈で変わる — ビフォーアフター早見表
  </text>

  <!-- Section headers -->
  <!-- Left: NG / Wrong -->
  <rect x="60" y="110" width="500" height="50" rx="8" fill="#E0245E"/>
  <text x="310" y="143" text-anchor="middle" fill="white" font-size="22" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    ❌ 直訳の罠（教科書的解釈）
  </text>

  <!-- Right: OK / Correct -->
  <rect x="640" y="110" width="500" height="50" rx="8" fill="#17BF63"/>
  <text x="890" y="143" text-anchor="middle" fill="white" font-size="22" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    ✅ ネイティブの実際の意味
  </text>

  <!-- Arrow divider center -->
  <line x1="600" y1="100" x2="600" y2="615" stroke="#1DA1F2" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="590,610 600,630 610,610" fill="#1DA1F2"/>

  <!-- Row 1 -->
  <rect x="60" y="178" width="500" height="70" rx="8" fill="white" stroke="#E0245E" stroke-width="1.5"/>
  <text x="310" y="207" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"I'm down"</text>
  <text x="310" y="232" text-anchor="middle" fill="#E0245E" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">落ち込んでいる 😢</text>

  <rect x="640" y="178" width="500" height="70" rx="8" fill="white" stroke="#17BF63" stroke-width="1.5"/>
  <text x="890" y="207" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"I'm down"</text>
  <text x="890" y="232" text-anchor="middle" fill="#17BF63" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">いいよ！賛成！乗った！ 🙌</text>

  <!-- Row 2 -->
  <rect x="60" y="268" width="500" height="70" rx="8" fill="white" stroke="#E0245E" stroke-width="1.5"/>
  <text x="310" y="297" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"That's sick"</text>
  <text x="310" y="322" text-anchor="middle" fill="#E0245E" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">気持ち悪い 🤢</text>

  <rect x="640" y="268" width="500" height="70" rx="8" fill="white" stroke="#17BF63" stroke-width="1.5"/>
  <text x="890" y="297" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"That's sick"</text>
  <text x="890" y="322" text-anchor="middle" fill="#17BF63" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">超かっこいい！最高！ 🔥</text>

  <!-- Row 3 -->
  <rect x="60" y="358" width="500" height="70" rx="8" fill="white" stroke="#E0245E" stroke-width="1.5"/>
  <text x="310" y="387" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"I'm good"（断り文句として）</text>
  <text x="310" y="412" text-anchor="middle" fill="#E0245E" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">私は良い状態です 😊</text>

  <rect x="640" y="358" width="500" height="70" rx="8" fill="white" stroke="#17BF63" stroke-width="1.5"/>
  <text x="890" y="387" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"I'm good"（断り文句として）</text>
  <text x="890" y="412" text-anchor="middle" fill="#17BF63" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">結構です・いらないです 🙅</text>

  <!-- Row 4 -->
  <rect x="60" y="448" width="500" height="70" rx="8" fill="white" stroke="#E0245E" stroke-width="1.5"/>
  <text x="310" y="477" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"It's fire"</text>
  <text x="310" y="502" text-anchor="middle" fill="#E0245E" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">火事だ ⚠️</text>

  <rect x="640" y="448" width="500" height="70" rx="8" fill="white" stroke="#17BF63" stroke-width="1.5"/>
  <text x="890" y="477" text-anchor="middle" fill="#657786" font-size="16"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">"It's fire"</text>
  <text x="890" y="502" text-anchor="middle" fill="#17BF63" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">めちゃくちゃ美味い・熱い 🌟</text>

  <!-- Bottom tip -->
  <rect x="60" y="540" width="1080" height="55" rx="10" fill="#1DA1F2" opacity="0.12"/>
  <text x="600" y="572" text-anchor="middle" fill="#1DA1F2" font-size="19" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    💡 スラングは「単語 × 文脈」をセットで記憶すること。辞書の意味は出発点に過ぎない。
  </text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
