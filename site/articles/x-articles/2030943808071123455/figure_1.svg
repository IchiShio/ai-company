<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="25" font-weight="bold" fill="#FFFFFF">TOEICが測る範囲 vs 実際の英語能力</text>
  <text x="600" y="78" text-anchor="middle" font-size="16" fill="#657786">4象限マトリクスで見るスキルギャップ</text>

  <!-- 4-quadrant grid -->
  <!-- Axes -->
  <line x1="200" y1="130" x2="1000" y2="130" stroke="#657786" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="200" y1="530" x2="1000" y2="530" stroke="#657786" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="200" y1="130" x2="200" y2="530" stroke="#657786" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1000" y1="130" x2="1000" y2="530" stroke="#657786" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="110" x2="600" y2="550" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="180" y1="330" x2="1020" y2="330" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="600" y="112" text-anchor="middle" font-size="14" fill="#657786">↑ TOEICで測れる</text>
  <text x="600" y="560" text-anchor="middle" font-size="14" fill="#657786">↓ TOEICで測れない</text>
  <text x="182" y="335" text-anchor="end" font-size="14" fill="#657786">受信←</text>
  <text x="1022" y="335" text-anchor="start" font-size="14" fill="#657786">→発信</text>

  <!-- Q1: TOEIC測定可・受信（左上） -->
  <rect x="210" y="140" width="375" height="180" rx="8" fill="#1DA1F2" fill-opacity="0.20" stroke="#1DA1F2" stroke-width="2"/>
  <text x="397" y="168" text-anchor="middle" font-size="16" font-weight="bold" fill="#1DA1F2">🎧 Listening</text>
  <text x="397" y="192" text-anchor="middle" font-size="13" fill="#657786">TOEICが測る ✓　受信系</text>
  <text x="250" y="220" font-size="14" fill="#FFFFFF">・Part 1〜4のリスニング</text>
  <text x="250" y="243" font-size="14" fill="#FFFFFF">・会話・説明文の聞き取り</text>
  <text x="250" y="266" font-size="14" fill="#FFFFFF">・図表と音声の照合</text>
  <rect x="340" y="288" width="115" height="22" rx="4" fill="#1DA1F2"/>
  <text x="397" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">TOEICスコアに直結</text>

  <!-- Q2: TOEIC測定可・発信（右上） -->
  <rect x="615" y="140" width="375" height="180" rx="8" fill="#657786" fill-opacity="0.20" stroke="#657786" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="802" y="168" text-anchor="middle" font-size="16" font-weight="bold" fill="#A0AEC0">🗣 Speaking</text>
  <text x="802" y="192" text-anchor="middle" font-size="13" fill="#657786">TOEICでは測れない ✗　発信系</text>
  <text x="655" y="220" font-size="14" fill="#A0AEC0">・会話の即時応答</text>
  <text x="655" y="243" font-size="14" fill="#A0AEC0">・プレゼン・交渉・議論</text>
  <text x="655" y="266" font-size="14" fill="#A0AEC0">・感情・ニュアンス表現</text>
  <rect x="700" y="288" width="205" height="22" rx="4" fill="#EF4444"/>
  <text x="802" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">900点でも0の可能性</text>

  <!-- Q3: TOEIC測定可・受信下（左下）= Reading -->
  <rect x="210" y="345" width="375" height="175" rx="8" fill="#1DA1F2" fill-opacity="0.20" stroke="#1DA1F2" stroke-width="2"/>
  <text x="397" y="373" text-anchor="middle" font-size="16" font-weight="bold" fill="#1DA1F2">📖 Reading</text>
  <text x="397" y="397" text-anchor="middle" font-size="13" fill="#657786">TOEICが測る ✓　受信系</text>
  <text x="250" y="423" font-size="14" fill="#FFFFFF">・Part 5〜7の読解</text>
  <text x="250" y="446" font-size="14" fill="#FFFFFF">・文法・語彙問題</text>
  <text x="250" y="469" font-size="14" fill="#FFFFFF">・メール・広告文読解</text>
  <rect x="340" y="490" width="115" height="22" rx="4" fill="#1DA1F2"/>
  <text x="397" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">TOEICスコアに直結</text>

  <!-- Q4: TOEIC測定不可・発信（右下）= Writing -->
  <rect x="615" y="345" width="375" height="175" rx="8" fill="#657786" fill-opacity="0.20" stroke="#657786" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="802" y="373" text-anchor="middle" font-size="16" font-weight="bold" fill="#A0AEC0">✍️ Writing</text>
  <text x="802" y="397" text-anchor="middle" font-size="13" fill="#657786">TOEICでは測れない ✗　発信系</text>
  <text x="655" y="423" font-size="14" fill="#A0AEC0">・ビジネスメール作成</text>
  <text x="655" y="446" font-size="14" fill="#A0AEC0">・レポート・報告書</text>
  <text x="655" y="469" font-size="14" fill="#A0AEC0">・SNS・チャット英語</text>
  <rect x="700" y="490" width="205" height="22" rx="4" fill="#EF4444"/>
  <text x="802" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">900点でも0の可能性</text>

  <!-- Bottom insight -->
  <rect x="200" y="545" width="800" height="50" rx="8" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="1.5"/>
  <text x="600" y="566" text-anchor="middle" font-size="15" font-weight="bold" fill="#EF4444">TOEICが測るのはListening + Reading の2技能のみ</text>
  <text x="600" y="585" text-anchor="middle" font-size="13" fill="#FFFFFF">Speaking/Writingはゼロのまま900点取得も起こりうる</text>

  <!-- Credit -->
  <text x="1170" y="660" text-anchor="end" font-size="13" fill="#657786">@ichi_eigo</text>
</svg>
