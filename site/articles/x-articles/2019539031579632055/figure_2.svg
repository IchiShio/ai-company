<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#14171A"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">強調すべき単語の選び方：内容語判別ガイド</text>
  <text x="600" y="85" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">Content Words vs. Function Words</text>

  <!-- Two columns -->
  <!-- Left: Content Words (強調する) -->
  <rect x="60" y="115" width="500" height="380" rx="14" fill="#132030" stroke="#1DA1F2" stroke-width="2.5"/>
  <rect x="60" y="115" width="500" height="56" rx="14" fill="#1DA1F2"/>
  <rect x="60" y="153" width="500" height="18" rx="0" fill="#1DA1F2"/>
  <text x="310" y="150" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">内容語（強調する）</text>
  <text x="310" y="168" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#c8e8f8">Content Words — 意味の核心を担う</text>

  <!-- Content word types -->
  <text x="90" y="210" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">名詞</text>
  <text x="200" y="210" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#CCCCCC">I went to the STORE</text>
  <line x1="80" y1="220" x2="540" y2="220" stroke="#1a3050" stroke-width="1"/>

  <text x="90" y="248" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">動詞</text>
  <text x="200" y="248" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#CCCCCC">She RAN all the way home</text>
  <line x1="80" y1="258" x2="540" y2="258" stroke="#1a3050" stroke-width="1"/>

  <text x="90" y="286" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">形容詞</text>
  <text x="200" y="286" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#CCCCCC">That's a HUGE problem</text>
  <line x1="80" y1="296" x2="540" y2="296" stroke="#1a3050" stroke-width="1"/>

  <text x="90" y="324" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">副詞</text>
  <text x="200" y="324" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#CCCCCC">He spoke VERY clearly</text>
  <line x1="80" y1="334" x2="540" y2="334" stroke="#1a3050" stroke-width="1"/>

  <text x="90" y="362" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">疑問詞</text>
  <text x="200" y="362" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#CCCCCC">WHEN did you leave?</text>

  <!-- Tip in left column -->
  <rect x="80" y="395" width="460" height="75" rx="8" fill="#0a1828" stroke="#1DA1F2" stroke-width="1" opacity="0.9"/>
  <text x="310" y="418" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1DA1F2">練習のコツ</text>
  <text x="310" y="438" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#CCCCCC">内容語を少し長め・高めに発音する</text>
  <text x="310" y="456" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#CCCCCC">機能語は短く・弱く・速く流す</text>

  <!-- Right: Function Words (弱める) -->
  <rect x="640" y="115" width="500" height="380" rx="14" fill="#1e1a2a" stroke="#657786" stroke-width="2"/>
  <rect x="640" y="115" width="500" height="56" rx="14" fill="#657786" opacity="0.7"/>
  <rect x="640" y="153" width="500" height="18" rx="0" fill="#657786" opacity="0.7"/>
  <text x="890" y="150" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">機能語（弱める）</text>
  <text x="890" y="168" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#BBBBBB">Function Words — 文法的な接着剤</text>

  <text x="670" y="210" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#888888">冠詞</text>
  <text x="780" y="210" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#888888">a, an, the</text>
  <line x1="660" y1="220" x2="1120" y2="220" stroke="#2a2a3a" stroke-width="1"/>

  <text x="670" y="248" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#888888">前置詞</text>
  <text x="780" y="248" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#888888">in, on, at, to, of, for</text>
  <line x1="660" y1="258" x2="1120" y2="258" stroke="#2a2a3a" stroke-width="1"/>

  <text x="670" y="286" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#888888">代名詞</text>
  <text x="780" y="286" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#888888">I, you, he, she, it</text>
  <line x1="660" y1="296" x2="1120" y2="296" stroke="#2a2a3a" stroke-width="1"/>

  <text x="670" y="324" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#888888">助動詞</text>
  <text x="780" y="324" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#888888">am, is, are, was, will</text>
  <line x1="660" y1="334" x2="1120" y2="334" stroke="#2a2a3a" stroke-width="1"/>

  <text x="670" y="362" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#888888">接続詞</text>
  <text x="780" y="362" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#888888">and, but, or, because</text>

  <!-- Tip in right column -->
  <rect x="660" y="395" width="460" height="75" rx="8" fill="#0f0f1a" stroke="#657786" stroke-width="1" opacity="0.9"/>
  <text x="890" y="418" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#888888">機能語の扱い</text>
  <text x="890" y="438" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">省略・短縮形で話すことも多い</text>
  <text x="890" y="456" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">"going to" → "gonna" など</text>

  <!-- Bottom example sentence -->
  <rect x="100" y="520" width="1000" height="110" rx="12" fill="#0a1020" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="600" y="548" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">例文で確認</text>
  <text x="600" y="574" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#FFFFFF">I   went   to   the   <tspan font-weight="700" fill="#1DA1F2" font-size="22">STORE</tspan>   yesterday   to   <tspan font-weight="700" fill="#1DA1F2" font-size="22">BUY</tspan>   some   <tspan font-weight="700" fill="#1DA1F2" font-size="22">MILK</tspan>.</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">→ 青文字3語だけ強調するだけで、文全体の意図が伝わる</text>
  <text x="600" y="622" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">ListenUp でネイティブの強調パターンを耳で鍛える → native-real.com</text>

  <!-- Credit -->
  <text x="1175" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">@ichi_eigo</text>
</svg>
