<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#14171A"/>
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#657786"/>
      <stop offset="50%" stop-color="#1DA1F2"/>
      <stop offset="100%" stop-color="#e0245e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="58" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    共感の温度スペクトラム
  </text>
  <text x="600" y="88" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="18" fill="#AAB8C2" text-anchor="middle">
    Empathy Temperature Spectrum — 共感度の"熱さ"を可視化
  </text>

  <!-- Spectrum bar -->
  <rect x="80" y="160" width="1040" height="28" rx="14" fill="url(#spectrumGrad)" opacity="0.9"/>
  <!-- Tick marks -->
  <line x1="80" y1="155" x2="80" y2="195" stroke="#AAB8C2" stroke-width="1.5"/>
  <line x1="340" y1="155" x2="340" y2="195" stroke="#AAB8C2" stroke-width="1.5"/>
  <line x1="600" y1="155" x2="600" y2="195" stroke="#AAB8C2" stroke-width="1.5"/>
  <line x1="860" y1="155" x2="860" y2="195" stroke="#AAB8C2" stroke-width="1.5"/>
  <line x1="1120" y1="155" x2="1120" y2="195" stroke="#AAB8C2" stroke-width="1.5"/>

  <!-- Label: 論理的 -->
  <text x="80" y="148" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="14" fill="#657786" text-anchor="middle">論理的</text>
  <!-- Label: 感情的 -->
  <text x="1120" y="148" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="14" fill="#e0245e" text-anchor="middle">感情的</text>

  <!-- Expression cards -->
  <!-- 1: I understand -->
  <rect x="30" y="230" width="200" height="160" rx="12" fill="#1C2938" stroke="#657786" stroke-width="1.5"/>
  <circle cx="130" cy="250" r="0" fill="none"/>
  <text x="130" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="17" font-weight="700" fill="#AAB8C2" text-anchor="middle">I understand</text>
  <rect x="50" y="275" width="160" height="3" rx="1.5" fill="#657786"/>
  <text x="130" y="298" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#8899A6" text-anchor="middle">わかりました</text>
  <text x="130" y="318" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">フォーマル・論理的</text>
  <text x="130" y="338" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">感情は乗らない</text>
  <text x="130" y="370" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="22" text-anchor="middle">🧊</text>

  <!-- Connector line -->
  <line x1="230" y1="310" x2="290" y2="310" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="290,305 302,310 290,315" fill="#2D3748"/>

  <!-- 2: I see / Got it -->
  <rect x="300" y="230" width="200" height="160" rx="12" fill="#1C2938" stroke="#657786" stroke-width="1.5"/>
  <text x="400" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="17" font-weight="700" fill="#8899A6" text-anchor="middle">I see / Got it</text>
  <rect x="320" y="275" width="160" height="3" rx="1.5" fill="#657786"/>
  <text x="400" y="298" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#8899A6" text-anchor="middle">なるほど・わかった</text>
  <text x="400" y="318" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">カジュアル・受容</text>
  <text x="400" y="338" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">感情は薄め</text>
  <text x="400" y="370" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="22" text-anchor="middle">🙂</text>

  <!-- Connector line -->
  <line x1="500" y1="310" x2="560" y2="310" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="560,305 572,310 560,315" fill="#2D3748"/>

  <!-- 3: I feel you (HERO) -->
  <rect x="568" y="215" width="220" height="185" rx="14" fill="#0d2540" stroke="#1DA1F2" stroke-width="2.5"/>
  <!-- Glow effect -->
  <rect x="568" y="215" width="220" height="185" rx="14" fill="none" stroke="#1DA1F2" stroke-width="6" opacity="0.15"/>
  <text x="678" y="252" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="19" font-weight="900" fill="#1DA1F2" text-anchor="middle">I feel you ✦</text>
  <rect x="590" y="262" width="175" height="3" rx="1.5" fill="#1DA1F2" opacity="0.6"/>
  <text x="678" y="285" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#C8D8E8" text-anchor="middle">わかる・共感する</text>
  <text x="678" y="305" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#1DA1F2" text-anchor="middle">中間・自然な共感</text>
  <text x="678" y="325" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#AAB8C2" text-anchor="middle">スラング寄りでも</text>
  <text x="678" y="343" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#AAB8C2" text-anchor="middle">フォーマルでもない</text>
  <text x="678" y="378" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="26" text-anchor="middle">💙</text>

  <!-- Connector line -->
  <line x1="788" y1="310" x2="848" y2="310" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="848,305 860,310 848,315" fill="#2D3748"/>

  <!-- 4: I hear you -->
  <rect x="860" y="230" width="200" height="160" rx="12" fill="#1C2938" stroke="#e0245e" stroke-width="1.5"/>
  <text x="960" y="265" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="17" font-weight="700" fill="#e08080" text-anchor="middle">I hear you</text>
  <rect x="880" y="275" width="160" height="3" rx="1.5" fill="#e0245e" opacity="0.5"/>
  <text x="960" y="298" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#8899A6" text-anchor="middle">聞いてるよ・受け止める</text>
  <text x="960" y="318" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">感情を受け止める</text>
  <text x="960" y="338" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">より寄り添い強め</text>
  <text x="960" y="370" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="22" text-anchor="middle">🤝</text>

  <!-- That's rough label below -->
  <text x="600" y="450" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    ポイント：共感表現は「温度」で選ぶ
  </text>

  <!-- Bottom comparison boxes -->
  <rect x="80" y="480" width="300" height="80" rx="10" fill="#1C2938" stroke="#657786" stroke-width="1"/>
  <text x="230" y="510" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="14" fill="#657786" text-anchor="middle">I understand（冷静）</text>
  <text x="230" y="535" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#8899A6" text-anchor="middle">"I understand you're upset."</text>
  <text x="230" y="552" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">怒ってるのはわかる（距離あり）</text>

  <rect x="450" y="480" width="300" height="80" rx="10" fill="#0d2540" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="600" y="510" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="14" fill="#1DA1F2" text-anchor="middle">I feel you（温かい）</text>
  <text x="600" y="535" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#C8D8E8" text-anchor="middle">"This week has been so long."</text>
  <text x="600" y="552" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#1DA1F2" text-anchor="middle">"I feel you." ← 感情が乗る</text>

  <rect x="820" y="480" width="300" height="80" rx="10" fill="#1C2938" stroke="#e0245e" stroke-width="1"/>
  <text x="970" y="510" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="14" fill="#e08080" text-anchor="middle">That's rough（熱い）</text>
  <text x="970" y="535" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="13" fill="#8899A6" text-anchor="middle">"That's rough, man."</text>
  <text x="970" y="552" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="12" fill="#657786" text-anchor="middle">つらいね（強い感情移入）</text>

  <!-- Credit -->
  <text x="1170" y="655" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="18" fill="#AAB8C2" text-anchor="end">@ichi_eigo</text>
</svg>
