<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2340;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0adffa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradSmall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#657786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8899aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1DA1F2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#ffffff">効果量0.92の意味と、発音改善のタイムライン</text>

  <!-- Left panel: Effect size explanation -->
  <rect x="40" y="80" width="530" height="540" rx="16" fill="#0d1a2e" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="305" y="115" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#1DA1F2">効果量（Cohen's d）とは？</text>

  <!-- Scale labels -->
  <text x="90" y="158" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">小さい  →  中程度  →  大きい</text>

  <!-- Bar: Small effect 0.2 -->
  <text x="90" y="195" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">d = 0.2（小）</text>
  <rect x="90" y="202" width="88" height="28" rx="6" fill="url(#barGradSmall)" fill-opacity="0.5"/>
  <text x="190" y="222" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">一般的な学習法</text>

  <!-- Bar: Medium effect 0.5 -->
  <text x="90" y="258" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">d = 0.5（中）</text>
  <rect x="90" y="265" width="220" height="28" rx="6" fill="url(#barGradSmall)"/>
  <text x="325" y="285" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">集中練習</text>

  <!-- Bar: Large effect 0.8 -->
  <text x="90" y="322" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">d = 0.8（大）</text>
  <rect x="90" y="329" width="352" height="28" rx="6" fill="url(#barGrad)" fill-opacity="0.7"/>
  <text x="455" y="349" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">大きな改善</text>

  <!-- Bar: 0.92 highlight -->
  <text x="90" y="386" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">d = 0.92 ← 聞き分け訓練</text>
  <rect x="90" y="393" width="405" height="36" rx="8" fill="url(#barGrad)"/>
  <text x="308" y="417" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">0.92</text>

  <!-- Annotation -->
  <line x1="352" y1="355" x2="352" y2="392" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="440" y="373" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">0.8超 = 「大きな効果」</text>

  <!-- Interpretation -->
  <rect x="70" y="450" width="480" height="150" rx="10" fill="#1DA1F2" fill-opacity="0.08" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.3"/>
  <text x="310" y="478" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">d=0.92 が意味すること</text>
  <text x="90" y="505" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">• 平均的な学習者を大きく上回る改善が期待できる</text>
  <text x="90" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">• 効果の安定性が高く、多くの学習者に有効</text>
  <text x="90" y="551" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">• 短期間でも実感できる変化が生まれやすい</text>
  <text x="90" y="574" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">※ Cohen's dの目安: 0.2=小、0.5=中、0.8以上=大</text>

  <!-- Right panel: Timeline -->
  <rect x="630" y="80" width="530" height="540" rx="16" fill="#0d1a2e" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="895" y="115" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#1DA1F2">発音改善タイムライン</text>

  <!-- Timeline axis -->
  <line x1="680" y1="160" x2="680" y2="560" stroke="#1DA1F2" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Week 1 -->
  <circle cx="680" cy="190" r="10" fill="#1DA1F2" fill-opacity="0.5"/>
  <text x="700" y="186" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ffffff">開始〜1週間</text>
  <text x="700" y="208" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">音の違いに気づき始める</text>

  <!-- Line segment -->
  <line x1="680" y1="200" x2="680" y2="270" stroke="#1DA1F2" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Month 1 -->
  <circle cx="680" cy="280" r="12" fill="#1DA1F2" fill-opacity="0.7"/>
  <text x="700" y="276" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">1ヶ月後</text>
  <text x="700" y="298" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">聞き分け精度が向上</text>
  <text x="700" y="318" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">自分の発音の間違いに気づく</text>

  <!-- Line segment -->
  <line x1="680" y1="292" x2="680" y2="370" stroke="#1DA1F2" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Month 2-3 -->
  <circle cx="680" cy="380" r="14" fill="#1DA1F2" fill-opacity="0.9"/>
  <text x="700" y="376" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">2〜3ヶ月後</text>
  <rect x="700" y="390" width="100" height="22" rx="5" fill="#1DA1F2" fill-opacity="0.3"/>
  <text x="750" y="406" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#ffffff">発音改善</text>
  <text x="812" y="406" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#1DA1F2" font-weight="600">が実感できる</text>
  <text x="700" y="426" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">知覚と産出が連動し始める</text>

  <!-- Line segment -->
  <line x1="680" y1="394" x2="680" y2="470" stroke="#1DA1F2" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Months -->
  <circle cx="680" cy="480" r="16" fill="#1DA1F2"/>
  <text x="700" y="476" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">数ヶ月後も持続</text>
  <text x="700" y="498" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">効果が定着・安定</text>
  <text x="700" y="518" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">継続的なリスニング習慣で維持</text>

  <!-- CTA -->
  <rect x="650" y="545" width="490" height="60" rx="12" fill="#1DA1F2" fill-opacity="0.2" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="895" y="572" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">今すぐ聞き分けトレーニングを始める</text>
  <text x="895" y="594" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#ffffff">native-real.com → ListenUp</text>

  <!-- Credit -->
  <text x="1180" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">@ichi_eigo</text>
</svg>
