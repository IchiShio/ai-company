<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="100" fill="#1DA1F2"/>
  <text x="600" y="38" font-size="34" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">完璧な継続 vs 途切れない習慣</text>
  <text x="600" y="75" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle">1年後に差がつくのはどちらか？</text>

  <!-- Timeline: 毎日派 -->
  <rect x="60" y="125" width="1080" height="195" fill="#192734" rx="12"/>
  <text x="90" y="160" font-size="20" font-weight="bold" fill="#657786">完璧主義：毎日やらないと意味がない</text>

  <!-- Week blocks -->
  <!-- Week 1 -->
  <rect x="90" y="175" width="50" height="60" fill="#1DA1F2" rx="5"/>
  <text x="115" y="210" font-size="13" fill="white" text-anchor="middle">月</text>
  <rect x="148" y="175" width="50" height="60" fill="#1DA1F2" rx="5"/>
  <text x="173" y="210" font-size="13" fill="white" text-anchor="middle">火</text>
  <rect x="206" y="175" width="50" height="60" fill="#1DA1F2" rx="5"/>
  <text x="231" y="210" font-size="13" fill="white" text-anchor="middle">水</text>
  <rect x="264" y="175" width="50" height="60" fill="#1DA1F2" rx="5"/>
  <text x="289" y="210" font-size="13" fill="white" text-anchor="middle">木</text>
  <rect x="322" y="175" width="50" height="60" fill="#1DA1F2" rx="5"/>
  <text x="347" y="210" font-size="13" fill="white" text-anchor="middle">金</text>
  <rect x="380" y="175" width="50" height="60" fill="#657786" rx="5"/>
  <text x="405" y="210" font-size="13" fill="white" text-anchor="middle">土</text>
  <!-- Sunday off → crash -->
  <rect x="438" y="175" width="50" height="60" fill="#657786" rx="5"/>
  <text x="463" y="210" font-size="13" fill="white" text-anchor="middle">日</text>

  <!-- Arrow to crash -->
  <text x="520" y="210" font-size="28" fill="#657786" text-anchor="middle">→</text>

  <rect x="545" y="175" width="200" height="60" fill="#14171A" rx="5" stroke="#657786" stroke-width="1"/>
  <text x="645" y="200" font-size="16" fill="#657786" text-anchor="middle">「2日休んだ…</text>
  <text x="645" y="222" font-size="16" fill="#657786" text-anchor="middle">もうダメだ」→ 中断</text>

  <text x="780" y="210" font-size="28" fill="#657786" text-anchor="middle">→</text>

  <rect x="810" y="175" width="200" height="60" fill="#14171A" rx="5" stroke="#657786" stroke-width="1"/>
  <text x="910" y="200" font-size="16" fill="#657786" text-anchor="middle">長期中断</text>
  <text x="910" y="222" font-size="16" fill="#657786" text-anchor="middle">→ やめてしまう</text>

  <text x="1055" y="210" font-size="50" text-anchor="middle">😞</text>

  <!-- Timeline: 途切れない習慣派 -->
  <rect x="60" y="345" width="1080" height="230" fill="#192734" rx="12" stroke="#1DA1F2" stroke-width="2"/>
  <text x="90" y="380" font-size="20" font-weight="bold" fill="#1DA1F2">途切れない習慣：週3〜5でいい、やめないことが全て</text>

  <!-- 3ヶ月 -->
  <rect x="90" y="400" width="140" height="110" fill="#14171A" rx="8" stroke="#1DA1F2" stroke-width="1"/>
  <text x="160" y="430" font-size="14" fill="#1DA1F2" text-anchor="middle">1ヶ月目</text>
  <text x="160" y="455" font-size="26" text-anchor="middle">📚</text>
  <text x="160" y="490" font-size="13" fill="#657786" text-anchor="middle">週3〜5 継続中</text>

  <text x="270" y="460" font-size="28" fill="#1DA1F2" text-anchor="middle">→</text>

  <rect x="300" y="400" width="140" height="110" fill="#14171A" rx="8" stroke="#1DA1F2" stroke-width="1"/>
  <text x="370" y="430" font-size="14" fill="#1DA1F2" text-anchor="middle">3ヶ月目</text>
  <text x="370" y="455" font-size="26" text-anchor="middle">📚📚</text>
  <text x="370" y="490" font-size="13" fill="#657786" text-anchor="middle">基本フレーズ定着</text>

  <text x="480" y="460" font-size="28" fill="#1DA1F2" text-anchor="middle">→</text>

  <rect x="510" y="400" width="140" height="110" fill="#14171A" rx="8" stroke="#1DA1F2" stroke-width="1"/>
  <text x="580" y="430" font-size="14" fill="#1DA1F2" text-anchor="middle">6ヶ月目</text>
  <text x="580" y="455" font-size="26" text-anchor="middle">🗣️</text>
  <text x="580" y="490" font-size="13" fill="#657786" text-anchor="middle">会話ができ始める</text>

  <text x="690" y="460" font-size="28" fill="#1DA1F2" text-anchor="middle">→</text>

  <rect x="720" y="400" width="140" height="110" fill="#14171A" rx="8" stroke="#1DA1F2" stroke-width="1"/>
  <text x="790" y="430" font-size="14" fill="#1DA1F2" text-anchor="middle">1年目</text>
  <text x="790" y="455" font-size="26" text-anchor="middle">🏆</text>
  <text x="790" y="490" font-size="13" fill="#657786" text-anchor="middle">英語力が大幅向上</text>

  <text x="900" y="460" font-size="28" fill="#1DA1F2" text-anchor="middle">→</text>

  <rect x="930" y="400" width="195" height="110" fill="#1DA1F2" rx="8"/>
  <text x="1027" y="440" font-size="16" font-weight="bold" fill="white" text-anchor="middle">やめなかった</text>
  <text x="1027" y="468" font-size="16" font-weight="bold" fill="white" text-anchor="middle">人の勝ち</text>

  <!-- Bottom message -->
  <rect x="60" y="595" width="1080" height="50" fill="#1DA1F2" rx="8"/>
  <text x="600" y="625" font-size="20" font-weight="bold" fill="white" text-anchor="middle">「完璧な毎日」より「途切れない習慣」— BJ Fogg (2019) Tiny Habits</text>

  <!-- Credit -->
  <text x="1165" y="658" font-size="18" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
