<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="1200" height="6" fill="#1DA1F2" />

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#14171A">構文別 パターン音読トレーニング表</text>
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">各構文を20回音読 → 文法が「感覚」で身につく</text>

  <!-- Table header -->
  <rect x="60" y="110" width="1080" height="52" fill="#1DA1F2" rx="10"/>
  <text x="120" y="142" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="white" font-weight="700">構文</text>
  <text x="310" y="142" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="white" font-weight="700">代表例文</text>
  <text x="790" y="142" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="white" font-weight="700">ポイント</text>
  <text x="1030" y="142" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="white" font-weight="700">進捗</text>

  <!-- Row 1 -->
  <rect x="60" y="162" width="1080" height="84" fill="white" rx="0"/>
  <line x1="60" y1="246" x2="1140" y2="246" stroke="#e1e8ed" stroke-width="1"/>
  <rect x="60" y="162" width="4" height="84" fill="#1DA1F2"/>
  <text x="120" y="196" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#14171A" font-weight="700">① SV構文</text>
  <text x="120" y="218" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">主語＋動詞</text>
  <text x="310" y="196" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A" font-style="italic">"She runs every morning."</text>
  <text x="310" y="218" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">変化形: he/they/I で言い換える</text>
  <text x="790" y="205" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">主語を入れ替えて20回</text>
  <!-- Progress circles -->
  <circle cx="1040" cy="204" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1070" cy="204" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1100" cy="204" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>

  <!-- Row 2 -->
  <rect x="60" y="246" width="1080" height="84" fill="#f8fbff" rx="0"/>
  <line x1="60" y1="330" x2="1140" y2="330" stroke="#e1e8ed" stroke-width="1"/>
  <rect x="60" y="246" width="4" height="84" fill="#1DA1F2"/>
  <text x="120" y="280" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#14171A" font-weight="700">② SVO構文</text>
  <text x="120" y="302" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">主語＋動詞＋目的語</text>
  <text x="310" y="280" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A" font-style="italic">"I need your help."</text>
  <text x="310" y="302" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">目的語を日替わりで変える</text>
  <text x="790" y="289" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">目的語を5種類×4回</text>
  <circle cx="1040" cy="288" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1070" cy="288" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1100" cy="288" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>

  <!-- Row 3 -->
  <rect x="60" y="330" width="1080" height="84" fill="white" rx="0"/>
  <line x1="60" y1="414" x2="1140" y2="414" stroke="#e1e8ed" stroke-width="1"/>
  <rect x="60" y="330" width="4" height="84" fill="#1DA1F2"/>
  <text x="120" y="364" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#14171A" font-weight="700">③ There is 構文</text>
  <text x="120" y="386" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">存在を表す</text>
  <text x="310" y="364" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A" font-style="italic">"There is a problem with this."</text>
  <text x="310" y="386" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">名詞・場所を変えて反復</text>
  <text x="790" y="373" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">there is/are 両方使う</text>
  <circle cx="1040" cy="372" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1070" cy="372" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1100" cy="372" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>

  <!-- Row 4 -->
  <rect x="60" y="414" width="1080" height="84" fill="#f8fbff" rx="0"/>
  <line x1="60" y1="498" x2="1140" y2="498" stroke="#e1e8ed" stroke-width="1"/>
  <rect x="60" y="414" width="4" height="84" fill="#1DA1F2"/>
  <text x="120" y="448" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#14171A" font-weight="700">④ If 仮定文</text>
  <text x="120" y="470" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">条件を表す</text>
  <text x="310" y="448" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A" font-style="italic">"If you have time, let me know."</text>
  <text x="310" y="470" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">条件部分を自分で作る</text>
  <text x="790" y="457" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">if節の内容を変えて20回</text>
  <circle cx="1040" cy="456" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1070" cy="456" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1100" cy="456" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>

  <!-- Row 5 -->
  <rect x="60" y="498" width="1080" height="84" fill="white" rx="0"/>
  <rect x="60" y="498" width="4" height="84" fill="#1DA1F2"/>
  <text x="120" y="532" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#14171A" font-weight="700">⑤ I think that 構文</text>
  <text x="120" y="554" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">意見を述べる</text>
  <text x="310" y="532" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#14171A" font-style="italic">"I think that it's a good idea."</text>
  <text x="310" y="554" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">that節の内容を毎回変える</text>
  <text x="790" y="541" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">I feel/believe も並行練習</text>
  <circle cx="1040" cy="540" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1070" cy="540" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>
  <circle cx="1100" cy="540" r="12" fill="none" stroke="#AAB8C2" stroke-width="2"/>

  <!-- Bottom -->
  <rect x="60" y="594" width="1080" height="2" fill="#e1e8ed"/>
  <text x="600" y="628" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#1DA1F2" font-weight="700">各構文20回音読 × 5構文 = 100回の発話練習</text>
  <text x="600" y="650" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">毎日15分 × 5日間で文法を「体感」に変える</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2">@ichi_eigo</text>
</svg>
