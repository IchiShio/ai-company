<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2340;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barBeginner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d7bc9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barIntermediate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0d7bc9;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="barAdvanced" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#657786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#445566;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad4)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#ffffff">レベル別シャドーイング効果：初中級者ほど伸びる</text>

  <!-- Chart container -->
  <rect x="80" y="80" width="650" height="530" rx="16" fill="#0d1a2e" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Chart title -->
  <text x="405" y="115" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">リスニングスコア改善幅（相対的比較）</text>

  <!-- Y axis -->
  <line x1="160" y1="145" x2="160" y2="520" stroke="#657786" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="160" y1="520" x2="680" y2="520" stroke="#657786" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="152" y="524" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">0</text>
  <text x="152" y="430" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">25</text>
  <text x="152" y="340" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">50</text>
  <text x="152" y="250" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">75</text>
  <text x="152" y="160" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">100</text>
  <text x="90" y="350" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" transform="rotate(-90, 90, 350)">改善スコア（相対値）</text>

  <!-- Grid lines -->
  <line x1="160" y1="430" x2="680" y2="430" stroke="#657786" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="160" y1="340" x2="680" y2="340" stroke="#657786" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="160" y1="250" x2="680" y2="250" stroke="#657786" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bar 1: Beginner (biggest) -->
  <rect x="205" y="160" width="130" height="360" rx="8" fill="url(#barBeginner)"/>
  <!-- Value label -->
  <text x="270" y="152" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#1DA1F2">+92</text>
  <!-- X label -->
  <text x="270" y="542" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">初級者</text>
  <text x="270" y="560" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">TOEIC 400以下</text>

  <!-- Star badge -->
  <circle cx="270" cy="175" r="22" fill="#1DA1F2" fill-opacity="0.3" stroke="#1DA1F2" stroke-width="2"/>
  <text x="270" y="181" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#ffffff">★</text>

  <!-- Bar 2: Intermediate -->
  <rect x="385" y="250" width="130" height="270" rx="8" fill="url(#barIntermediate)"/>
  <text x="450" y="242" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#1DA1F2">+68</text>
  <text x="450" y="542" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">中級者</text>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">TOEIC 400〜700</text>

  <!-- Bar 3: Advanced -->
  <rect x="565" y="385" width="100" height="135" rx="8" fill="url(#barAdvanced)"/>
  <text x="615" y="377" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#657786">+32</text>
  <text x="615" y="542" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">上級者</text>
  <text x="615" y="560" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">TOEIC 700+</text>

  <!-- Trend arrow overlay -->
  <line x1="270" y1="310" x2="615" y2="453" stroke="#1DA1F2" stroke-width="2" stroke-dasharray="6,4" stroke-opacity="0.6"/>

  <!-- Annotation -->
  <rect x="83" y="575" width="644" height="28" rx="6" fill="#1DA1F2" fill-opacity="0.08"/>
  <text x="405" y="594" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">※ 数値はツイートに示された実験結果の傾向を模式的に示したもの。原典の実数値ではありません</text>

  <!-- Right panel: Reasoning -->
  <rect x="760" y="80" width="400" height="530" rx="16" fill="#0d1a2e" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="960" y="115" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2">なぜ初中級者が最も伸びるのか</text>

  <!-- Reason 1 -->
  <rect x="780" y="132" width="360" height="95" rx="10" fill="#1DA1F2" fill-opacity="0.1" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="800" y="158" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1DA1F2">理由1: 改善の「伸びしろ」が大きい</text>
  <text x="800" y="182" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">上級者はすでに高いレベルに</text>
  <text x="800" y="200" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">達しているため改善余地が限られる</text>
  <text x="800" y="218" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（天井効果 ceiling effect）</text>

  <!-- Reason 2 -->
  <rect x="780" y="242" width="360" height="95" rx="10" fill="#1DA1F2" fill-opacity="0.1" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="800" y="268" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1DA1F2">理由2: 音韻フォームの早期定着</text>
  <text x="800" y="292" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">誤った発音習慣がつく前に</text>
  <text x="800" y="310" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">正しい音のパターンを身体に刻む</text>
  <text x="800" y="328" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（化石化防止 fossilization prevention）</text>

  <!-- Reason 3 -->
  <rect x="780" y="352" width="360" height="95" rx="10" fill="#1DA1F2" fill-opacity="0.1" stroke="#1DA1F2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="800" y="378" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1DA1F2">理由3: 音への集中度が高い</text>
  <text x="800" y="402" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">初中級者は意味処理に余裕がある分、</text>
  <text x="800" y="420" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e0e8f0">音のパターン習得に注意を向けやすい</text>
  <text x="800" y="438" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">（注意資源の配分効果）</text>

  <!-- Key message -->
  <rect x="780" y="462" width="360" height="85" rx="10" fill="#1DA1F2" fill-opacity="0.2" stroke="#1DA1F2" stroke-width="2"/>
  <text x="960" y="492" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#ffffff">「難しすぎる」と感じるなら</text>
  <text x="960" y="514" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1DA1F2">速度を落として短文から</text>
  <text x="960" y="536" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#ffffff">始めることが正解</text>

  <!-- Credit -->
  <text x="1180" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">@ichi_eigo</text>
</svg>
