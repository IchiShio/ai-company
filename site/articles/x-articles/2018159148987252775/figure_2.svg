<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e8f4fd"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#14171A">最優先50パターン：5カテゴリ分類図</text>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">日常会話の8割をカバーする構文を、使用頻度の高い順に分類</text>

  <!-- ===== CENTER hub ===== -->
  <circle cx="600" cy="340" r="68" fill="#14171A" filter="url(#shadow)"/>
  <text x="600" y="333" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="800" fill="white">50の</text>
  <text x="600" y="353" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="800" fill="white">基本パターン</text>
  <text x="600" y="372" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">8割カバー</text>

  <!-- ===== CATEGORY 1: 挨拶・日常 (top) ===== -->
  <!-- Connector line -->
  <line x1="600" y1="272" x2="600" y2="210" stroke="#1DA1F2" stroke-width="2.5"/>
  <!-- Card -->
  <rect x="430" y="108" width="340" height="104" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="430" y="108" width="340" height="42" rx="14" fill="#1DA1F2"/>
  <rect x="430" y="136" width="340" height="14" fill="#1DA1F2"/>
  <text x="600" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white">挨拶・日常  ｜10パターン</text>
  <text x="446" y="167" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">• How's it going? / What's up?</text>
  <text x="446" y="183" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">• I'll get back to you / Let me check.</text>
  <text x="446" y="199" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">• That makes sense / Sounds good!</text>

  <!-- ===== CATEGORY 2: 提案・依頼 (top-right) ===== -->
  <line x1="648" y1="291" x2="870" y2="200" stroke="#0d7fc0" stroke-width="2.5"/>
  <rect x="860" y="108" width="300" height="120" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="860" y="108" width="300" height="42" rx="14" fill="#0d7fc0"/>
  <rect x="860" y="136" width="300" height="14" fill="#0d7fc0"/>
  <text x="1010" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white">提案・依頼  ｜10パターン</text>
  <text x="876" y="167" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#0d7fc0">• Could you ~? / Would you mind ~?</text>
  <text x="876" y="183" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#0d7fc0">• Why don't we ~? / How about ~?</text>
  <text x="876" y="199" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#0d7fc0">• Let me know if ~ / Feel free to ~</text>

  <!-- ===== CATEGORY 3: 感情・共感 (bottom-right) ===== -->
  <line x1="662" y1="356" x2="880" y2="430" stroke="#ff6b6b" stroke-width="2.5"/>
  <rect x="870" y="410" width="290" height="130" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="870" y="410" width="290" height="42" rx="14" fill="#ff6b6b"/>
  <rect x="870" y="438" width="290" height="14" fill="#ff6b6b"/>
  <text x="1015" y="436" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white">感情・共感  ｜10パターン</text>
  <text x="886" y="469" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#c0392b">• That's (so) + adjective!</text>
  <text x="886" y="485" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#c0392b">• I know how you feel / I get it.</text>
  <text x="886" y="501" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#c0392b">• It depends / It's up to you.</text>
  <text x="886" y="517" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#c0392b">• I'm not sure about that.</text>

  <!-- ===== CATEGORY 4: 質問・確認 (bottom-left) ===== -->
  <line x1="538" y1="356" x2="330" y2="430" stroke="#e67e22" stroke-width="2.5"/>
  <rect x="40" y="410" width="300" height="130" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="410" width="300" height="42" rx="14" fill="#e67e22"/>
  <rect x="40" y="438" width="300" height="14" fill="#e67e22"/>
  <text x="190" y="436" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white">質問・確認  ｜10パターン</text>
  <text x="56" y="469" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e67e22">• What do you mean by ~?</text>
  <text x="56" y="485" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e67e22">• Can you say that again?</text>
  <text x="56" y="501" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e67e22">• Just to confirm ~ / Is it right that ~?</text>
  <text x="56" y="517" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e67e22">• Do you know where/when/how ~?</text>

  <!-- ===== CATEGORY 5: 意見・説明 (top-left) ===== -->
  <line x1="552" y1="291" x2="340" y2="200" stroke="#8e44ad" stroke-width="2.5"/>
  <rect x="40" y="108" width="310" height="120" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="108" width="310" height="42" rx="14" fill="#8e44ad"/>
  <rect x="40" y="136" width="310" height="14" fill="#8e44ad"/>
  <text x="195" y="134" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white">意見・説明  ｜10パターン</text>
  <text x="56" y="167" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8e44ad">• I think ~ / In my opinion ~</text>
  <text x="56" y="183" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8e44ad">• The reason is ~ / That's because ~</text>
  <text x="56" y="199" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#8e44ad">• For example ~ / Such as ~</text>

  <!-- ===== MASTERY LEVEL INDICATOR ===== -->
  <rect x="400" y="570" width="400" height="70" rx="12" fill="#14171A" filter="url(#shadow)"/>
  <text x="600" y="598" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">習熟度の目安（反射レベル）</text>

  <!-- Level bars -->
  <rect x="416" y="608" width="80" height="18" rx="4" fill="#657786"/>
  <text x="456" y="621" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="white">知ってる</text>

  <rect x="504" y="608" width="80" height="18" rx="4" fill="#1DA1F2"/>
  <text x="544" y="621" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="white">使える</text>

  <rect x="592" y="608" width="80" height="18" rx="4" fill="#0d7fc0"/>
  <text x="632" y="621" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="white">考えず出る</text>

  <rect x="680" y="608" width="104" height="18" rx="4" fill="#ff6b6b"/>
  <text x="732" y="621" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" fill="white">← 目標: 反射レベル</text>

  <!-- side note -->
  <text x="600" y="658" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">各カテゴリ10パターン × 5カテゴリ = 50パターン。まず挨拶カテゴリから反射レベルを目指す</text>

  <!-- Credit -->
  <text x="1180" y="670" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786">@ichi_eigo</text>
</svg>