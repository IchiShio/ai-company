<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d84d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="52" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">翻訳型思考 vs 実況型思考｜処理フロー比較</text>
  <line x1="200" y1="64" x2="1000" y2="64" stroke="#1DA1F2" stroke-width="1.5" opacity="0.4"/>

  <!-- LEFT: 翻訳型 -->
  <rect x="60" y="85" width="500" height="540" rx="16" fill="#1a1a2e" stroke="#e74c3c" stroke-width="1.5" opacity="0.9"/>
  <rect x="60" y="85" width="500" height="52" rx="16" fill="#e74c3c"/>
  <rect x="60" y="117" width="500" height="20" rx="0" fill="#e74c3c"/>
  <text x="310" y="118" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">翻訳型思考（日本人の多く）</text>

  <!-- Steps Left -->
  <!-- Step 1 -->
  <rect x="100" y="158" width="420" height="64" rx="10" fill="#2d1b1b" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="130" cy="190" r="16" fill="#e74c3c"/>
  <text x="130" y="196" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="320" y="185" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#f5c6c6" text-anchor="middle">目の前の出来事を認識</text>
  <text x="320" y="207" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#99627a" text-anchor="middle">（視覚情報入力）</text>

  <!-- Arrow -->
  <line x1="310" y1="222" x2="310" y2="242" stroke="#e74c3c" stroke-width="2"/>
  <polygon points="310,248 303,238 317,238" fill="#e74c3c"/>

  <!-- Step 2 -->
  <rect x="100" y="252" width="420" height="64" rx="10" fill="#2d1b1b" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="130" cy="284" r="16" fill="#e74c3c"/>
  <text x="130" y="290" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="320" y="279" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#f5c6c6" text-anchor="middle">日本語で意味を形成</text>
  <text x="320" y="301" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#99627a" text-anchor="middle">「あ、犬が走っている」</text>

  <!-- Arrow -->
  <line x1="310" y1="316" x2="310" y2="336" stroke="#e74c3c" stroke-width="2"/>
  <polygon points="310,342 303,332 317,332" fill="#e74c3c"/>

  <!-- Step 3 -->
  <rect x="100" y="346" width="420" height="64" rx="10" fill="#2d1b1b" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="130" cy="378" r="16" fill="#e74c3c"/>
  <text x="130" y="384" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="320" y="373" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#f5c6c6" text-anchor="middle">英語の文法・語順を検索</text>
  <text x="320" y="395" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#99627a" text-anchor="middle">「主語は？動詞は？」</text>

  <!-- Arrow -->
  <line x1="310" y1="410" x2="310" y2="430" stroke="#e74c3c" stroke-width="2"/>
  <polygon points="310,436 303,426 317,426" fill="#e74c3c"/>

  <!-- Step 4 -->
  <rect x="100" y="440" width="420" height="64" rx="10" fill="#2d1b1b" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="130" cy="472" r="16" fill="#e74c3c"/>
  <text x="130" y="478" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="320" y="467" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#f5c6c6" text-anchor="middle">完璧な文が組み上がるまで待機</text>
  <text x="320" y="489" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#99627a" text-anchor="middle">（沈黙・硬直）</text>

  <!-- Arrow -->
  <line x1="310" y1="504" x2="310" y2="524" stroke="#e74c3c" stroke-width="2"/>
  <polygon points="310,530 303,520 317,520" fill="#e74c3c"/>

  <!-- Result Left -->
  <rect x="100" y="534" width="420" height="60" rx="10" fill="#3d0e0e" stroke="#e74c3c" stroke-width="2"/>
  <text x="310" y="560" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#ff6b6b" text-anchor="middle">発話まで 3〜10秒</text>
  <text x="310" y="581" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#99627a" text-anchor="middle">会話リズムが崩れる・機会損失</text>

  <!-- RIGHT: 実況型 -->
  <rect x="640" y="85" width="500" height="540" rx="16" fill="#0d1f2d" stroke="#1DA1F2" stroke-width="1.5" opacity="0.9"/>
  <rect x="640" y="85" width="500" height="52" rx="16" fill="url(#blueGrad)"/>
  <rect x="640" y="117" width="500" height="20" rx="0" fill="url(#blueGrad)"/>
  <text x="890" y="118" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">実況型思考（ネイティブ的）</text>

  <!-- Steps Right -->
  <!-- Step 1 -->
  <rect x="680" y="158" width="420" height="64" rx="10" fill="#0d2233" stroke="#1DA1F2" stroke-width="1"/>
  <circle cx="710" cy="190" r="16" fill="#1DA1F2"/>
  <text x="710" y="196" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="900" y="185" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#b3deff" text-anchor="middle">目の前の出来事を認識</text>
  <text x="900" y="207" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">（視覚情報入力）</text>

  <!-- Arrow -->
  <line x1="890" y1="222" x2="890" y2="242" stroke="#1DA1F2" stroke-width="2"/>
  <polygon points="890,248 883,238 897,238" fill="#1DA1F2"/>

  <!-- Step 2 → SKIP -->
  <rect x="680" y="252" width="420" height="64" rx="10" fill="#0d2233" stroke="#1DA1F2" stroke-width="1"/>
  <circle cx="710" cy="284" r="16" fill="#1DA1F2"/>
  <text x="710" y="290" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="900" y="279" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#b3deff" text-anchor="middle">英語イメージが直結する</text>
  <text x="900" y="301" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">「A dog is running!」がそのまま浮かぶ</text>

  <!-- Arrow -->
  <line x1="890" y1="316" x2="890" y2="336" stroke="#1DA1F2" stroke-width="2"/>
  <polygon points="890,342 883,332 897,332" fill="#1DA1F2"/>

  <!-- Step 3 -->
  <rect x="680" y="346" width="420" height="64" rx="10" fill="#0d2233" stroke="#1DA1F2" stroke-width="1"/>
  <circle cx="710" cy="378" r="16" fill="#1DA1F2"/>
  <text x="710" y="384" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="900" y="373" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#b3deff" text-anchor="middle">不完全でも即発話する</text>
  <text x="900" y="395" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">フレーズが出てから補完する</text>

  <!-- Skip Steps 4 (crossed) -->
  <rect x="680" y="440" width="420" height="64" rx="10" fill="#0d1a0d" stroke="#2ecc71" stroke-width="1" opacity="0.5"/>
  <text x="900" y="472" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#5d8a6b" text-anchor="middle">文法チェック・完璧な組み立ては</text>
  <text x="900" y="491" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#5d8a6b" text-anchor="middle">スキップ（または後回し）</text>
  <line x1="683" y1="443" x2="1097" y2="501" stroke="#2ecc71" stroke-width="2" opacity="0.5"/>

  <!-- Result Right -->
  <rect x="680" y="534" width="420" height="60" rx="10" fill="#0d2233" stroke="#1DA1F2" stroke-width="2" filter="url(#glow)"/>
  <text x="890" y="560" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1DA1F2" text-anchor="middle">発話まで 0.5〜1秒</text>
  <text x="890" y="581" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">自然な会話リズムが生まれる</text>

  <!-- VS Badge -->
  <circle cx="600" cy="355" r="34" fill="#14171A" stroke="#1DA1F2" stroke-width="2"/>
  <text x="600" y="363" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="900" fill="#1DA1F2" text-anchor="middle">VS</text>

  <!-- Credit -->
  <text x="1175" y="665" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
