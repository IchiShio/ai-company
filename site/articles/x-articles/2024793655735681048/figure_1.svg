<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">「わかる」と「できる」は別の記憶回路</text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#657786">宣言的記憶 vs 手続き記憶</text>
  <line x1="80" y1="100" x2="1120" y2="100" stroke="#21262d" stroke-width="1.5"/>

  <!-- Left panel: 宣言的記憶 -->
  <rect x="80" y="130" width="480" height="440" rx="18" fill="#1DA1F2" opacity="0.06" stroke="#1DA1F2" stroke-width="2"/>

  <rect x="120" y="150" width="400" height="48" rx="10" fill="#1DA1F2" opacity="0.18"/>
  <text x="320" y="180" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#1DA1F2">宣言的記憶（Declarative）</text>

  <text x="320" y="228" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">担当脳部位</text>
  <text x="320" y="254" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">海馬 ・ 側頭葉</text>

  <line x1="160" y1="275" x2="480" y2="275" stroke="#21262d" stroke-width="1"/>

  <text x="320" y="308" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">得意なこと</text>
  <text x="320" y="335" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#FFFFFF">事実・ルールの記憶</text>
  <text x="320" y="360" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">「三単現のsはつける」</text>
  <text x="320" y="383" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">「過去形はedをつける」</text>

  <line x1="160" y1="405" x2="480" y2="405" stroke="#21262d" stroke-width="1"/>

  <text x="320" y="436" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">学習方法</text>
  <text x="320" y="461" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#FFFFFF">読む・理解する・暗記する</text>

  <!-- 「わかった」badge -->
  <rect x="200" y="500" width="240" height="48" rx="24" fill="#1DA1F2" opacity="0.15" stroke="#1DA1F2" stroke-width="2"/>
  <text x="320" y="530" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#1DA1F2">「わかった！」の状態</text>

  <!-- Right panel: 手続き記憶 -->
  <rect x="640" y="130" width="480" height="440" rx="18" fill="#00C896" opacity="0.06" stroke="#00C896" stroke-width="2"/>

  <rect x="680" y="150" width="400" height="48" rx="10" fill="#00C896" opacity="0.18"/>
  <text x="880" y="180" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="bold" fill="#00C896">手続き記憶（Procedural）</text>

  <text x="880" y="228" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">担当脳部位</text>
  <text x="880" y="254" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">基底核 ・ 小脳</text>

  <line x1="720" y1="275" x2="1040" y2="275" stroke="#21262d" stroke-width="1"/>

  <text x="880" y="308" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">得意なこと</text>
  <text x="880" y="335" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#FFFFFF">自動的な動作・スキル</text>
  <text x="880" y="360" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">考えなくても文が出てくる</text>
  <text x="880" y="383" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786">反射的に正しく話せる</text>

  <line x1="720" y1="405" x2="1040" y2="405" stroke="#21262d" stroke-width="1"/>

  <text x="880" y="436" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#8b949e">学習方法</text>
  <text x="880" y="461" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#FFFFFF">繰り返す・口を動かす・出力する</text>

  <!-- 「できる」badge -->
  <rect x="760" y="500" width="240" height="48" rx="24" fill="#00C896" opacity="0.20" stroke="#00C896" stroke-width="2"/>
  <text x="880" y="530" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="bold" fill="#00C896">「できる！」の状態</text>

  <!-- VS -->
  <circle cx="600" cy="360" r="40" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="368" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" font-weight="bold" fill="#657786">VS</text>

  <!-- Arrow showing transition -->
  <path d="M 560 520 Q 600 490 640 520" stroke="#F39C12" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <polygon points="634,513 646,523 636,530" fill="#F39C12"/>
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#F39C12">反復によってのみ移行できる</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" fill="#AAB8C2" font-size="18">@ichi_eigo</text>
</svg>
