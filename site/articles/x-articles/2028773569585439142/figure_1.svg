<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Header -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    シャドーイング 正しい4ステップフロー
  </text>

  <!-- Flow arrows and step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="115" width="240" height="430" rx="16" fill="white" stroke="#1DA1F2" stroke-width="2.5"/>
  <!-- Step number badge -->
  <circle cx="180" cy="155" r="32" fill="#1DA1F2"/>
  <text x="180" y="163" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">1</text>
  <text x="180" y="210" text-anchor="middle" fill="#14171A" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">意味理解</text>
  <line x1="100" y1="225" x2="260" y2="225" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="180" y="260" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">スクリプトを読む</text>
  <text x="180" y="284" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">全単語の意味確認</text>
  <text x="180" y="308" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">文構造を把握する</text>
  <!-- Time badge -->
  <rect x="90" y="360" width="180" height="36" rx="18" fill="#E8F5FE"/>
  <text x="180" y="383" text-anchor="middle" fill="#1DA1F2" font-size="15" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">⏱ 5〜10分</text>
  <!-- Purpose tag -->
  <rect x="80" y="415" width="200" height="100" rx="10" fill="#F5F8FA"/>
  <text x="180" y="440" text-anchor="middle" fill="#14171A" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">目的:</text>
  <text x="180" y="460" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「音と意味を</text>
  <text x="180" y="478" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">つなぐ土台を作る」</text>
  <text x="180" y="500" text-anchor="middle" fill="#1DA1F2" font-size="22"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">📖</text>

  <!-- Arrow 1→2 -->
  <polygon points="308,310 338,330 308,350" fill="#1DA1F2"/>
  <line x1="300" y1="330" x2="336" y2="330" stroke="#1DA1F2" stroke-width="3"/>

  <!-- Step 2 -->
  <rect x="340" y="115" width="240" height="430" rx="16" fill="white" stroke="#17BF63" stroke-width="2.5"/>
  <circle cx="460" cy="155" r="32" fill="#17BF63"/>
  <text x="460" y="163" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">2</text>
  <text x="460" y="210" text-anchor="middle" fill="#14171A" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">音読</text>
  <line x1="380" y1="225" x2="540" y2="225" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="460" y="260" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">音声なしで自分のペース</text>
  <text x="460" y="284" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">詰まる箇所をなくす</text>
  <text x="460" y="308" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">発音の確認も行う</text>
  <rect x="370" y="360" width="180" height="36" rx="18" fill="#E8F7EF"/>
  <text x="460" y="383" text-anchor="middle" fill="#17BF63" font-size="15" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">⏱ 3〜5分</text>
  <rect x="360" y="415" width="200" height="100" rx="10" fill="#F5F8FA"/>
  <text x="460" y="440" text-anchor="middle" fill="#14171A" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">目的:</text>
  <text x="460" y="460" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「口を英語に</text>
  <text x="460" y="478" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">慣らす」</text>
  <text x="460" y="500" text-anchor="middle" fill="#17BF63" font-size="22"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">🗣</text>

  <!-- Arrow 2→3 -->
  <polygon points="588,310 618,330 588,350" fill="#17BF63"/>
  <line x1="580" y1="330" x2="616" y2="330" stroke="#17BF63" stroke-width="3"/>

  <!-- Step 3 -->
  <rect x="620" y="115" width="240" height="430" rx="16" fill="white" stroke="#FFAD1F" stroke-width="2.5"/>
  <circle cx="740" cy="155" r="32" fill="#FFAD1F"/>
  <text x="740" y="163" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">3</text>
  <text x="740" y="210" text-anchor="middle" fill="#14171A" font-size="19" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">オーバーラッピング</text>
  <line x1="660" y1="225" x2="820" y2="225" stroke="#E1E8ED" stroke-width="1.5"/>
  <text x="740" y="260" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">音声と同時に重ねて読む</text>
  <text x="740" y="284" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">スクリプトを見ながら</text>
  <text x="740" y="308" text-anchor="middle" fill="#657786" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">リズムを体に入れる</text>
  <rect x="650" y="360" width="180" height="36" rx="18" fill="#FFF8E8"/>
  <text x="740" y="383" text-anchor="middle" fill="#FFAD1F" font-size="15" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">⏱ 5分</text>
  <rect x="640" y="415" width="200" height="100" rx="10" fill="#F5F8FA"/>
  <text x="740" y="440" text-anchor="middle" fill="#14171A" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">目的:</text>
  <text x="740" y="460" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「音声のリズム・</text>
  <text x="740" y="478" text-anchor="middle" fill="#14171A" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">抑揚を体感する」</text>
  <text x="740" y="500" text-anchor="middle" fill="#FFAD1F" font-size="22"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">🎵</text>

  <!-- Arrow 3→4 -->
  <polygon points="868,310 898,330 868,350" fill="#E0245E"/>
  <line x1="860" y1="330" x2="896" y2="330" stroke="#E0245E" stroke-width="3"/>

  <!-- Step 4 -->
  <rect x="900" y="115" width="240" height="430" rx="16" fill="#14171A"/>
  <circle cx="1020" cy="155" r="32" fill="#E0245E"/>
  <text x="1020" y="163" text-anchor="middle" fill="white" font-size="28" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">4</text>
  <text x="1020" y="210" text-anchor="middle" fill="white" font-size="20" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">シャドーイング</text>
  <line x1="940" y1="225" x2="1100" y2="225" stroke="#657786" stroke-width="1.5"/>
  <text x="1020" y="260" text-anchor="middle" fill="#AAB8C2" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">スクリプトなしで追う</text>
  <text x="1020" y="284" text-anchor="middle" fill="#AAB8C2" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">0.5〜1秒遅れで発音</text>
  <text x="1020" y="308" text-anchor="middle" fill="#AAB8C2" font-size="14"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">耳と口を同時に鍛える</text>
  <rect x="930" y="360" width="180" height="36" rx="18" fill="#E0245E" opacity="0.8"/>
  <text x="1020" y="383" text-anchor="middle" fill="white" font-size="15" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">⏱ 5〜10分</text>
  <rect x="920" y="415" width="200" height="100" rx="10" fill="#1B2126"/>
  <text x="1020" y="440" text-anchor="middle" fill="white" font-size="13" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">目的:</text>
  <text x="1020" y="460" text-anchor="middle" fill="#AAB8C2" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">「リスニングと発音を</text>
  <text x="1020" y="478" text-anchor="middle" fill="#AAB8C2" font-size="13"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">同時に強化する」</text>
  <text x="1020" y="500" text-anchor="middle" fill="white" font-size="22"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">🎧</text>

  <!-- Bottom total time -->
  <rect x="60" y="568" width="1080" height="48" rx="10" fill="#1DA1F2" opacity="0.12"/>
  <text x="600" y="598" text-anchor="middle" fill="#1DA1F2" font-size="18" font-weight="bold"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
    合計セッション目安: 約25〜30分 — 1分素材を使えば毎日でも無理なく続けられる
  </text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18"
        font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">@ichi_eigo</text>
</svg>
