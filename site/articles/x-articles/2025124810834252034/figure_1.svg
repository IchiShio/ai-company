<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="600" y="50" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">TOEICスコア × 会話能力｜乖離マトリクス</text>
  <line x1="180" y1="62" x2="1020" y2="62" stroke="#1DA1F2" stroke-width="1.5" opacity="0.4"/>

  <!-- Axis labels -->
  <!-- X axis -->
  <line x1="160" y1="580" x2="1100" y2="580" stroke="#657786" stroke-width="1.5"/>
  <polygon points="1100,580 1088,574 1088,586" fill="#657786"/>
  <text x="630" y="614" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786" text-anchor="middle">TOEICスコア（筆記・リスニング）</text>
  <text x="200" y="600" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">低</text>
  <text x="1070" y="600" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">高</text>
  <!-- X tick labels -->
  <text x="290" y="597" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">〜400</text>
  <text x="480" y="597" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">500</text>
  <text x="670" y="597" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">700</text>
  <text x="860" y="597" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">850</text>
  <text x="1040" y="597" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#657786" text-anchor="middle">900+</text>

  <!-- Y axis -->
  <line x1="160" y1="580" x2="160" y2="90" stroke="#657786" stroke-width="1.5"/>
  <polygon points="160,90 154,102 166,102" fill="#657786"/>
  <text x="50" y="340" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#657786" text-anchor="middle" transform="rotate(-90,50,340)">会話実力（実際のコミュニケーション能力）</text>
  <text x="180" y="578" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">低</text>
  <text x="170" y="105" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">高</text>

  <!-- Grid lines (faint) -->
  <line x1="160" y1="390" x2="1090" y2="390" stroke="#657786" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="160" y1="240" x2="1090" y2="240" stroke="#657786" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="480" y1="90" x2="480" y2="580" stroke="#657786" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="670" y1="90" x2="670" y2="580" stroke="#657786" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="860" y1="90" x2="860" y2="580" stroke="#657786" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- 4 Quadrant Labels -->
  <!-- Q1: 高スコア・低会話力 (right-bottom) -->
  <rect x="710" y="420" width="340" height="120" rx="10" fill="#2a1200" stroke="#e67e22" stroke-width="1.5" opacity="0.9"/>
  <text x="880" y="450" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#e67e22" text-anchor="middle">スコア高・会話力低</text>
  <text x="880" y="474" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#d4a0a0" text-anchor="middle">受験テクニック特化型</text>
  <text x="880" y="494" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#d4a0a0" text-anchor="middle">「点数は高いのに話せない」</text>
  <text x="880" y="514" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#d4a0a0" text-anchor="middle">→ 採用現場で多数派</text>
  <text x="880" y="534" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e67e22" text-anchor="middle" font-weight="700">⚠ 最も乖離が大きい層</text>

  <!-- Q2: 低スコア・高会話力 (left-top) -->
  <rect x="170" y="108" width="340" height="120" rx="10" fill="#0a2d1a" stroke="#2ecc71" stroke-width="1.5" opacity="0.9"/>
  <text x="340" y="138" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#2ecc71" text-anchor="middle">スコア低・会話力高</text>
  <text x="340" y="162" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#a0d4b0" text-anchor="middle">実際のコミュニケーション重視</text>
  <text x="340" y="182" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#a0d4b0" text-anchor="middle">「750点だが圧倒的に話せる」</text>
  <text x="340" y="202" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#a0d4b0" text-anchor="middle">→ 記事で紹介された中東出身者</text>
  <text x="340" y="222" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="700">✓ 採用現場での実力派</text>

  <!-- Q3: 高スコア・高会話力 (right-top) -->
  <rect x="710" y="108" width="340" height="100" rx="10" fill="#0d1a2d" stroke="#1DA1F2" stroke-width="1.5" opacity="0.9"/>
  <text x="880" y="138" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1DA1F2" text-anchor="middle">スコア高・会話力高</text>
  <text x="880" y="162" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#b3deff" text-anchor="middle">理想形。総合的な習得者。</text>
  <text x="880" y="182" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#b3deff" text-anchor="middle">→ 少数派だが最も採用評価が高い</text>
  <text x="880" y="202" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2" text-anchor="middle" font-weight="700">★ 目指すべきゴール</text>

  <!-- Q4: 低スコア・低会話力 (left-bottom) -->
  <rect x="170" y="430" width="300" height="100" rx="10" fill="#1a1a1a" stroke="#657786" stroke-width="1" opacity="0.7"/>
  <text x="320" y="460" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#999" text-anchor="middle">スコア低・会話力低</text>
  <text x="320" y="484" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#666" text-anchor="middle">学習開始前・初学者</text>
  <text x="320" y="504" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#666" text-anchor="middle">→ どちらも低い状態</text>
  <text x="320" y="524" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888" text-anchor="middle">出発点として素直</text>

  <!-- Key data point: 中東出身者の例 -->
  <circle cx="540" cy="148" r="18" fill="#2ecc71" opacity="0.9" filter="url(#glow3)"/>
  <text x="540" y="154" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">750</text>
  <line x1="558" y1="148" x2="630" y2="148" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="640" y="144" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2ecc71">実際に記事で</text>
  <text x="640" y="160" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#2ecc71">紹介された例</text>

  <!-- Ideal trend line (dashed diagonal) -->
  <line x1="210" y1="545" x2="1060" y2="120" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.4"/>
  <text x="640" y="340" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2" opacity="0.6" transform="rotate(-26,640,340)">理想的な相関（参考線）</text>

  <!-- Credit -->
  <text x="1175" y="665" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
