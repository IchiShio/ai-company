  <rect x="140" y="229" width="195" height="22" rx="4" fill="#e74c3c" opacity="0.65"/>
  <text x="488" y="245" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#e74c3c">57%</text>

