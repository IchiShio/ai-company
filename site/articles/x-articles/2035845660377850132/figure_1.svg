  <text x="305" y="438" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#e74c3c">処理能力：頭打ち（+15%止まり）</text>
  <text x="305" y="458" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#cc8888">「遅い耳」が完成→ 実会話で通じない</text>
  <text x="305" y="478" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#cc8888">ネイティブ速度（160wpm）に対応できない</text>

  <!-- Right panel: Natural speed -->
  <rect x="650" y="108" width="490" height="390" rx="14" fill="#102030" stroke="#1DA1F2" stroke-width="2.5"/>
  <rect x="650" y="108" width="490" height="52" rx="14" fill="#1DA1F2"/>
  <rect x="650" y="143" width="490" height="17" rx="0" fill="#1DA1F2"/>
  <text x="895" y="140" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">自然速度（0.9倍速以上）</text>
  <text x="895" y="158" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#c8e8f8">Natural Speed Training</text>

