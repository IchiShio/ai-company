<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#14171A"/>
    </radialGradient>
    <linearGradient id="slowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="fastGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1DA1F2"/>
      <stop offset="100%" stop-color="#0d8bd9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">脳の処理適応：遅い音声 vs 自然速度</text>
  <text x="600" y="85" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#657786">継続6週間後のリスニング処理能力の変化（概念モデル）</text>

  <!-- Left panel: Slow speed -->
  <rect x="60" y="108" width="490" height="390" rx="14" fill="#2a1010" stroke="#e74c3c" stroke-width="2"/>
  <rect x="60" y="108" width="490" height="52" rx="14" fill="#e74c3c" opacity="0.85"/>
  <rect x="60" y="143" width="490" height="17" rx="0" fill="#e74c3c" opacity="0.85"/>
  <text x="305" y="140" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">ゆっくり再生（0.7倍速以下）</text>
  <text x="305" y="158" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#ffcccc">Slow Playback Addiction</text>

