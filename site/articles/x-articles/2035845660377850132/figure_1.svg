  <text x="90" y="390" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">Week 6</text>
  <rect x="140" y="377" width="340" height="22" rx="4" fill="#2a2a2a"/>
  <rect x="140" y="377" width="220" height="22" rx="4" fill="#e74c3c" opacity="0.7"/>
