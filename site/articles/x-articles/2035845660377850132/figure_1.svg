  <text x="680" y="316" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">Week 4</text>
  <rect x="730" y="303" width="340" height="22" rx="4" fill="#1a2a3a"/>
  <rect x="730" y="303" width="272" height="22" rx="4" fill="#1DA1F2" opacity="0.8"/>
  <text x="1078" y="319" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">80%</text>

  <text x="680" y="353" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">Week 5</text>
  <rect x="730" y="340" width="340" height="22" rx="4" fill="#1a2a3a"/>
  <rect x="730" y="340" width="306" height="22" rx="4" fill="#1DA1F2" opacity="0.85"/>
  <text x="1078" y="356" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#1DA1F2">90%</text>

  <text x="680" y="390" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">Week 6</text>
  <rect x="730" y="377" width="340" height="22" rx="4" fill="#1a2a3a"/>
  <rect x="730" y="377" width="340" height="22" rx="4" fill="#1DA1F2"/>
  <text x="1078" y="393" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#FFFFFF">100%</text>

  <text x="895" y="438" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1DA1F2">処理能力：急成長（+60%）</text>
  <text x="895" y="458" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#7ec8f0">脳が「速い音」のパターンを学習</text>
  <text x="895" y="478" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#7ec8f0">実会話・ネイティブ音声に対応できる耳が育つ</text>

  <!-- Bottom CTA -->
  <rect x="100" y="525" width="1000" height="70" rx="12" fill="#0a1020" stroke="#1DA1F2" stroke-width="1.5"/>
  <text x="600" y="552" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">ネイティブの平均発話速度：約160語/分（wpm）</text>
  <text x="600" y="574" text-anchor="middle" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786">最初から0.9倍速以上で練習すれば、6週間で耳は劇的に変わる</text>

  <!-- Credit -->
  <text x="1175" y="660" text-anchor="end" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786">@ichi_eigo</text>
