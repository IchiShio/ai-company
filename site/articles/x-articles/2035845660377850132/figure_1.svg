  <text x="680" y="279" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#888888">Week 3</text>
  <rect x="730" y="266" width="340" height="22" rx="4" fill="#1a2a3a"/>
