<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      text { font-family: system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="#14171A"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold">1日の最適学習スケジュール（分散型・4セッション）</text>
  <text x="600" y="70" text-anchor="middle" fill="#657786" font-size="16">25〜30分集中 + 5〜10分休憩 × 4回 = 合計2時間で最大の定着率</text>

  <!-- Timeline bar background -->
  <rect x="60" y="100" width="1080" height="60" rx="10" fill="#1A2333"/>

  <!-- Timeline: morning 7:00 to night 22:00 = 15h = 900min -->
  <!-- Segment width = 1080/900 * minutes -->
  <!-- Session 1: 7:00-7:30 (0-30 min) = 36px wide, starts at x=60 -->
  <rect x="60" y="100" width="36" height="60" rx="0" fill="#1DA1F2" opacity="0.9"/>
  <!-- Break: 7:30-7:40 (30-40) -->
  <rect x="96" y="100" width="12" height="60" fill="#657786" opacity="0.4"/>
  <!-- Session 2: 12:00-12:30 (300-330) = starts at 60+300*1.2=420, width=36 -->
  <rect x="420" y="100" width="36" height="60" rx="0" fill="#1DA1F2" opacity="0.9"/>
  <rect x="456" y="100" width="12" height="60" fill="#657786" opacity="0.4"/>
  <!-- Session 3: 18:00-18:30 (660-690) = starts at 60+660*1.2=852, width=36 -->
  <rect x="852" y="100" width="36" height="60" rx="0" fill="#1DA1F2" opacity="0.9"/>
  <rect x="888" y="100" width="12" height="60" fill="#657786" opacity="0.4"/>
  <!-- Session 4: 21:00-21:30 (840-870) = starts at 60+840*1.2=1068, width=36 -->
  <rect x="1068" y="100" width="36" height="60" rx="0" fill="#1DA1F2" opacity="0.9"/>

  <!-- Time labels on axis -->
  <text x="60" y="176" text-anchor="middle" fill="#657786" font-size="11">7:00</text>
  <text x="204" y="176" text-anchor="middle" fill="#657786" font-size="11">9:00</text>
  <text x="348" y="176" text-anchor="middle" fill="#657786" font-size="11">11:00</text>
  <text x="492" y="176" text-anchor="middle" fill="#657786" font-size="11">13:00</text>
  <text x="636" y="176" text-anchor="middle" fill="#657786" font-size="11">15:00</text>
  <text x="780" y="176" text-anchor="middle" fill="#657786" font-size="11">17:00</text>
  <text x="924" y="176" text-anchor="middle" fill="#657786" font-size="11">19:00</text>
  <text x="1068" y="176" text-anchor="middle" fill="#657786" font-size="11">21:00</text>
  <text x="1140" y="176" text-anchor="middle" fill="#657786" font-size="11">22:00</text>

  <!-- Session detail cards -->
  <!-- Card 1 -->
  <rect x="60" y="196" width="250" height="180" rx="10" fill="#1A2333" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="60" y="196" width="250" height="40" rx="10" fill="#1DA1F2" opacity="0.8"/>
  <text x="185" y="222" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">SESSION 1</text>
  <text x="185" y="258" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold">7:00 – 7:30</text>
  <text x="185" y="285" text-anchor="middle" fill="#657786" font-size="14">朝の頭が冴えた時間帯</text>
  <text x="80" y="312" fill="#FFFFFF" font-size="13">内容例：</text>
  <text x="80" y="332" fill="#657786" font-size="13">リスニング or 新単語インプット</text>
  <text x="80" y="352" fill="#657786" font-size="13">（25分学習 + 5分振り返り）</text>
  <text x="80" y="368" fill="#FFAD1F" font-size="12">休憩: 7:30〜7:40（10分）</text>

  <!-- Card 2 -->
  <rect x="360" y="196" width="250" height="180" rx="10" fill="#1A2333" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="360" y="196" width="250" height="40" rx="10" fill="#1DA1F2" opacity="0.8"/>
  <text x="485" y="222" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">SESSION 2</text>
  <text x="485" y="258" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold">12:00 – 12:30</text>
  <text x="485" y="285" text-anchor="middle" fill="#657786" font-size="14">昼休みの活用</text>
  <text x="380" y="312" fill="#FFFFFF" font-size="13">内容例：</text>
  <text x="380" y="332" fill="#657786" font-size="13">音読 or 例文暗唱</text>
  <text x="380" y="352" fill="#657786" font-size="13">（午前の復習で記憶を定着）</text>
  <text x="380" y="368" fill="#FFAD1F" font-size="12">休憩: 12:30〜12:40（10分）</text>

  <!-- Card 3 -->
  <rect x="660" y="196" width="250" height="180" rx="10" fill="#1A2333" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="660" y="196" width="250" height="40" rx="10" fill="#1DA1F2" opacity="0.8"/>
  <text x="785" y="222" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">SESSION 3</text>
  <text x="785" y="258" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold">18:00 – 18:30</text>
  <text x="785" y="285" text-anchor="middle" fill="#657786" font-size="14">仕事・学校終わりの集中</text>
  <text x="680" y="312" fill="#FFFFFF" font-size="13">内容例：</text>
  <text x="680" y="332" fill="#657786" font-size="13">スピーキング or ライティング</text>
  <text x="680" y="352" fill="#657786" font-size="13">（アウトプット中心）</text>
  <text x="680" y="368" fill="#FFAD1F" font-size="12">休憩: 18:30〜18:40（10分）</text>

  <!-- Card 4 -->
  <rect x="960" y="196" width="210" height="180" rx="10" fill="#1A2333" stroke="#1DA1F2" stroke-width="1.5"/>
  <rect x="960" y="196" width="210" height="40" rx="10" fill="#1DA1F2" opacity="0.8"/>
  <text x="1065" y="222" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">SESSION 4</text>
  <text x="1065" y="258" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold">21:00 – 21:30</text>
  <text x="1065" y="285" text-anchor="middle" fill="#657786" font-size="14">就寝前の復習が最強</text>
  <text x="980" y="312" fill="#FFFFFF" font-size="13">内容例：</text>
  <text x="980" y="332" fill="#657786" font-size="13">単語復習 or 聞き流し</text>
  <text x="980" y="352" fill="#657786" font-size="13">（睡眠中に記憶が固定化）</text>
  <text x="980" y="368" fill="#FFAD1F" font-size="12">就寝: 22:00〜（睡眠で定着↑）</text>

  <!-- Key points -->
  <rect x="60" y="400" width="1080" height="100" rx="10" fill="#1A2A1F" stroke="#17BF63" stroke-width="1.5"/>
  <text x="600" y="424" text-anchor="middle" fill="#17BF63" font-size="16" font-weight="bold">分散学習 3つのポイント</text>
  <text x="130" y="454" fill="#FFFFFF" font-size="14">1.</text>
  <text x="150" y="454" fill="#657786" font-size="14">セッション間隔は最低2〜4時間あける（記憶の再強化が起きるタイミング）</text>
  <text x="130" y="476" fill="#FFFFFF" font-size="14">2.</text>
  <text x="150" y="476" fill="#657786" font-size="14">1セッションは25〜30分が集中力の上限（ポモドーロ法と同じ原理）</text>
  <text x="130" y="498" fill="#FFFFFF" font-size="14">3.</text>
  <text x="150" y="498" fill="#657786" font-size="14">就寝前のセッションは特に効果的（睡眠中に海馬→大脳皮質へ記憶が転送される）</text>

  <!-- Bottom CTA -->
  <text x="600" y="560" text-anchor="middle" fill="#657786" font-size="14">毎日のリスニング練習は native-real.com で無料スタート →</text>
  <text x="600" y="582" text-anchor="middle" fill="#1DA1F2" font-size="14">https://native-real.com</text>

  <!-- Credit -->
  <text x="1175" y="658" text-anchor="end" fill="#657786" font-size="13">@ichi_eigo</text>
</svg>
