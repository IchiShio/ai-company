<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bad_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0245E;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#9B1D3A;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="good_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1DA1F2;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0d7fc4;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg_grad)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="337" x2="1200" y2="337" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="675" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="62" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">暗記学習 vs 体で覚える学習</text>
  <text x="600" y="95" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#657786" text-anchor="middle">なぜ「丸暗記」では英語は伸びないのか</text>

  <!-- Divider -->
  <line x1="100" y1="115" x2="1100" y2="115" stroke="#657786" stroke-opacity="0.4" stroke-width="1"/>

  <!-- LEFT COLUMN: 暗記学習 -->
  <rect x="80" y="135" width="480" height="460" rx="16" fill="url(#bad_grad)" fill-opacity="0.15" stroke="#E0245E" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Bad label -->
  <rect x="80" y="135" width="480" height="58" rx="16" fill="url(#bad_grad)" fill-opacity="0.6"/>
  <rect x="80" y="169" width="480" height="24" rx="0" fill="url(#bad_grad)" fill-opacity="0.6"/>
  <text x="320" y="172" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">❌ 暗記学習</text>

  <!-- Bad items -->
  <text x="120" y="233" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#E0245E" font-weight="700">学習スタイル</text>
  <text x="120" y="258" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">ルールを読んで覚えようとする</text>
  <line x1="110" y1="275" x2="540" y2="275" stroke="#E0245E" stroke-opacity="0.2" stroke-width="1"/>

  <text x="120" y="303" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#E0245E" font-weight="700">記憶の種類</text>
  <text x="120" y="328" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">宣言的記憶（知識）のみに依存</text>
  <line x1="110" y1="345" x2="540" y2="345" stroke="#E0245E" stroke-opacity="0.2" stroke-width="1"/>

  <text x="120" y="373" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#E0245E" font-weight="700">定着率</text>
  <text x="120" y="398" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">24時間後に約74%を忘却</text>
  <line x1="110" y1="415" x2="540" y2="415" stroke="#E0245E" stroke-opacity="0.2" stroke-width="1"/>

  <text x="120" y="443" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#E0245E" font-weight="700">アウトプット</text>
  <text x="120" y="468" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">試験には使えるが会話では詰まる</text>
  <line x1="110" y1="485" x2="540" y2="485" stroke="#E0245E" stroke-opacity="0.2" stroke-width="1"/>

  <text x="120" y="513" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#E0245E" font-weight="700">半年後の状態</text>
  <text x="120" y="538" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">ほぼリセット。また最初から…</text>

  <!-- Result Bad -->
  <rect x="110" y="558" width="420" height="24" rx="6" fill="#E0245E" fill-opacity="0.2"/>
  <text x="320" y="575" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#E0245E" font-weight="700" text-anchor="middle">伸び悩みループから抜け出せない</text>

  <!-- RIGHT COLUMN: 体で覚える学習 -->
  <rect x="640" y="135" width="480" height="460" rx="16" fill="url(#good_grad)" fill-opacity="0.12" stroke="#1DA1F2" stroke-width="1.5" stroke-opacity="0.5"/>

  <rect x="640" y="135" width="480" height="58" rx="16" fill="url(#good_grad)" fill-opacity="0.6"/>
  <rect x="640" y="169" width="480" height="24" rx="0" fill="url(#good_grad)" fill-opacity="0.6"/>
  <text x="880" y="172" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">✅ 体で覚える学習</text>

  <text x="680" y="233" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700">学習スタイル</text>
  <text x="680" y="258" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">問題を解いて間違いを繰り返す</text>
  <line x1="670" y1="275" x2="1100" y2="275" stroke="#1DA1F2" stroke-opacity="0.2" stroke-width="1"/>

  <text x="680" y="303" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700">記憶の種類</text>
  <text x="680" y="328" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">手続き記憶（スキル）として定着</text>
  <line x1="670" y1="345" x2="1100" y2="345" stroke="#1DA1F2" stroke-opacity="0.2" stroke-width="1"/>

  <text x="680" y="373" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700">定着率</text>
  <text x="680" y="398" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">復習ごとに忘却スピードが低下</text>
  <line x1="670" y1="415" x2="1100" y2="415" stroke="#1DA1F2" stroke-opacity="0.2" stroke-width="1"/>

  <text x="680" y="443" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700">アウトプット</text>
  <text x="680" y="468" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">瞬時に正しい英文が浮かぶ</text>
  <line x1="670" y1="485" x2="1100" y2="485" stroke="#1DA1F2" stroke-opacity="0.2" stroke-width="1"/>

  <text x="680" y="513" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700">半年後の状態</text>
  <text x="680" y="538" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="16" fill="#cccccc">積み上げが消えず着実に伸び続ける</text>

  <rect x="670" y="558" width="420" height="24" rx="6" fill="#1DA1F2" fill-opacity="0.2"/>
  <text x="880" y="575" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="15" fill="#1DA1F2" font-weight="700" text-anchor="middle">使える英語力が身につくループ</text>

  <!-- VS badge -->
  <circle cx="600" cy="365" r="36" fill="#14171A" stroke="#657786" stroke-width="2"/>
  <text x="600" y="372" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">VS</text>

  <!-- Credit -->
  <text x="1168" y="655" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="#AAB8C2" text-anchor="end">@ichi_eigo</text>
</svg>
