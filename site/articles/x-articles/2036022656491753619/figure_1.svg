<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14171A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="failZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e54a4a;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#e54a4a;stop-opacity:0.02" />
    </linearGradient>
    <linearGradient id="winZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38c9a0;stop-opacity:0.02" />
      <stop offset="100%" style="stop-color:#38c9a0;stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="56" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">学習量 vs 継続日数：トレードオフ曲線</text>
  <text x="600" y="88" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#657786" text-anchor="middle">量を増やすほど継続日数は指数的に減少する</text>

  <!-- Chart area -->
  <!-- Axes -->
  <line x1="160" y1="120" x2="160" y2="510" stroke="#657786" stroke-width="2"/>
  <line x1="160" y1="510" x2="1100" y2="510" stroke="#657786" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="90" y="320" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle" transform="rotate(-90,90,320)">1日の学習量（分）</text>
  <!-- X axis label -->
  <text x="630" y="548" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="middle">継続できた日数（日）</text>

  <!-- Y axis ticks -->
  <!-- 0=510, 15=455, 30=400, 60=345, 90=288, 120=232 (each 15min = 18.33px) -->
  <line x1="155" y1="510" x2="165" y2="510" stroke="#657786" stroke-width="1"/>
  <text x="148" y="514" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="end">0</text>
  <line x1="155" y1="455" x2="165" y2="455" stroke="#657786" stroke-width="1"/>
  <text x="148" y="459" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="end">15</text>
  <line x1="155" y1="400" x2="165" y2="400" stroke="#657786" stroke-width="1"/>
  <text x="148" y="404" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="end">30</text>
  <line x1="155" y1="345" x2="165" y2="345" stroke="#657786" stroke-width="1"/>
  <text x="148" y="349" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="end">60</text>
  <line x1="155" y1="288" x2="165" y2="288" stroke="#657786" stroke-width="1"/>
  <text x="148" y="292" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="end">90</text>
  <line x1="155" y1="232" x2="165" y2="232" stroke="#657786" stroke-width="1"/>
  <text x="148" y="236" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="end">120</text>

  <!-- X axis ticks: 0=160, 7=236, 14=312, 30=420, 66=586, 90=692, 180=1060 -->
  <!-- Scale: 0=160, 180days=1060 → 1day=5px -->
  <line x1="160" y1="505" x2="160" y2="515" stroke="#657786" stroke-width="1"/>
  <text x="160" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">0</text>
  <line x1="195" y1="505" x2="195" y2="515" stroke="#657786" stroke-width="1"/>
  <text x="195" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">7</text>
  <line x1="230" y1="505" x2="230" y2="515" stroke="#657786" stroke-width="1"/>
  <text x="230" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">14</text>
  <line x1="310" y1="505" x2="310" y2="515" stroke="#657786" stroke-width="1"/>
  <text x="310" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">30</text>
  <line x1="490" y1="505" x2="490" y2="515" stroke="#657786" stroke-width="1"/>
  <text x="490" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#38c9a0" text-anchor="middle">66</text>
  <line x1="610" y1="505" x2="610" y2="515" stroke="#657786" stroke-width="1"/>
  <text x="610" y="528" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#657786" text-anchor="middle">90</text>

  <!-- Fail zone (high load, few days) -->
  <rect x="160" y="120" width="370" height="390" fill="#e54a4a" fill-opacity="0.07"/>
  <text x="280" y="155" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e54a4a" text-anchor="middle">挫折ゾーン</text>
  <text x="280" y="172" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#e54a4a" fill-opacity="0.7" text-anchor="middle">量が多すぎて継続不可</text>

  <!-- Win zone (sustainable, 66+ days) -->
  <rect x="420" y="120" width="680" height="390" fill="#38c9a0" fill-opacity="0.05"/>
  <text x="800" y="155" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#38c9a0" text-anchor="middle">習慣化ゾーン</text>
  <text x="800" y="172" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="11" fill="#38c9a0" fill-opacity="0.7" text-anchor="middle">66日超えで自動化が始まる</text>

  <!-- 66日ライン -->
  <line x1="490" y1="120" x2="490" y2="510" stroke="#38c9a0" stroke-width="2" stroke-dasharray="8,5" opacity="0.8"/>
  <text x="490" y="115" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#38c9a0" text-anchor="middle" filter="url(#glow)">習慣化ライン 66日</text>

  <!-- Curve: hyperbolic curve for load vs days -->
  <!-- Points: (0,120=120min), (3,232=90min), (7,288=60min), (14,345=30min), (30,400=15min), (66+,455=15min stays) -->
  <!-- Map days to x: x = 160 + days*5 -->
  <!-- Map minutes to y: y = 510 - min*3.25 (120min=510-390=120, 15min=510-48.75=461) -->
  <!-- Scale: 0min→510, 120min→120, so 1min=3.25px -->
  <!-- Curve points: day0→120min: x=160,y=120 | day3→90: x=175,y=217 | day7→60: x=195,y=315 | day14→30: x=230,y=413 | day30→15: x=310,y=461 | day66→15: x=490,y=461 | day90→15:x=610,y=461 -->
  <polyline points="160,120 175,217 195,315 230,413 310,461 490,461 610,461 1060,461" fill="none" stroke="#1DA1F2" stroke-width="3" stroke-linejoin="round"/>

  <!-- Area under curve fill -->
  <polygon points="160,510 160,120 175,217 195,315 230,413 310,461 1060,461 1060,510" fill="#1DA1F2" fill-opacity="0.07"/>

  <!-- Data points with labels -->
  <!-- 2時間 → 3日 point -->
  <circle cx="175" cy="217" r="10" fill="#e54a4a" filter="url(#glow)"/>
  <text x="210" y="195" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#e54a4a">毎日2時間 → 約3日で挫折</text>
  <line x1="190" y1="213" x2="208" y2="200" stroke="#e54a4a" stroke-width="1.5" opacity="0.7"/>

  <!-- 1時間 → 7日 point -->
  <circle cx="195" cy="315" r="8" fill="#f5a623" opacity="0.8"/>
  <text x="235" y="310" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#f5a623">60分 → 1週間前後</text>

  <!-- 30分 → 2週間 point -->
  <circle cx="230" cy="413" r="8" fill="#f5a623" opacity="0.6"/>
  <text x="248" y="408" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#f5a623">30分 → 2週間前後</text>

  <!-- 15分 → 66日+ point -->
  <circle cx="310" cy="461" r="10" fill="#38c9a0" filter="url(#glow)"/>
  <text x="320" y="440" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#38c9a0">毎日15分 → 66日継続可能</text>
  <line x1="315" y1="455" x2="320" y2="445" stroke="#38c9a0" stroke-width="1.5" opacity="0.7"/>

  <!-- Total output comparison box -->
  <rect x="550" y="310" width="510" height="130" rx="10" fill="#14171A" fill-opacity="0.9" stroke="#657786" stroke-opacity="0.3" stroke-width="1"/>
  <text x="805" y="335" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">総学習時間の比較</text>
  <text x="590" y="360" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e54a4a">2時間 × 3日</text>
  <text x="780" y="360" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#e54a4a" font-weight="700">= 6時間</text>
  <line x1="570" y1="375" x2="1045" y2="375" stroke="#657786" stroke-opacity="0.3" stroke-width="1"/>
  <text x="590" y="398" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#38c9a0">15分 × 66日</text>
  <text x="780" y="398" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" fill="#38c9a0" font-weight="900" filter="url(#glow)">= 16.5時間</text>
  <text x="805" y="426" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" fill="#a0e8c8" text-anchor="middle">しかも66日後は習慣化 → 無限に継続</text>

  <!-- Credit -->
  <text x="1175" y="660" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="#657786" text-anchor="end">@ichi_eigo</text>
</svg>
