<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F8FA"/>

  <!-- Title bar -->
  <rect width="1200" height="80" fill="#14171A"/>
  <text x="600" y="52" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="bold">最適復習スケジュール — 5段階タイムライン</text>

  <!-- Timeline line -->
  <line x1="100" y1="230" x2="1100" y2="230" stroke="#E1E8ED" stroke-width="3"/>

  <!-- Day 0: 学習初日 -->
  <circle cx="100" cy="230" r="22" fill="#14171A"/>
  <text x="100" y="237" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">0</text>
  <text x="100" y="270" text-anchor="middle" fill="#14171A" font-size="15" font-weight="bold">学習初日</text>
  <text x="100" y="290" text-anchor="middle" fill="#657786" font-size="13">10単語を</text>
  <text x="100" y="308" text-anchor="middle" fill="#657786" font-size="13">最初に学ぶ</text>

  <!-- Arrow marker -->
  <!-- Day 1 復習 -->
  <circle cx="300" cy="230" r="28" fill="#E0245E"/>
  <text x="300" y="237" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">+1日</text>

  <!-- Label above -->
  <rect x="220" y="100" width="160" height="100" rx="8" fill="#FFFFFF" stroke="#E0245E" stroke-width="2"/>
  <text x="300" y="128" text-anchor="middle" fill="#E0245E" font-size="15" font-weight="bold">復習 1回目</text>
  <text x="300" y="152" text-anchor="middle" fill="#14171A" font-size="14">最重要タイミング</text>
  <text x="300" y="172" text-anchor="middle" fill="#657786" font-size="13">急速忘却の前に</text>
  <text x="300" y="190" text-anchor="middle" fill="#657786" font-size="13">インプットを補強</text>
  <line x1="300" y1="200" x2="300" y2="202" stroke="#E0245E" stroke-width="2"/>
  <line x1="300" y1="200" x2="300" y2="202" stroke="#E0245E" stroke-width="2"/>
  <!-- connector line -->
  <line x1="300" y1="200" x2="300" y2="202" stroke="#E0245E" stroke-width="2"/>

  <!-- Dotted connector line above -->
  <line x1="300" y1="200" x2="300" y2="202" stroke="#E0245E" stroke-width="2"/>
  <line x1="300" y1="100" x2="300" y2="202" stroke="#E0245E" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="300" y="270" text-anchor="middle" fill="#E0245E" font-size="14" font-weight="bold">★最重要★</text>
  <text x="300" y="290" text-anchor="middle" fill="#657786" font-size="13">所要2〜3分</text>

  <!-- Day 3 -->
  <circle cx="500" cy="230" r="25" fill="#F5A623"/>
  <text x="500" y="237" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">+3日</text>

  <rect x="425" y="100" width="150" height="95" rx="8" fill="#FFFFFF" stroke="#F5A623" stroke-width="2"/>
  <text x="500" y="128" text-anchor="middle" fill="#F5A623" font-size="15" font-weight="bold">復習 2回目</text>
  <text x="500" y="150" text-anchor="middle" fill="#14171A" font-size="14">短期→中期記憶</text>
  <text x="500" y="172" text-anchor="middle" fill="#657786" font-size="13">移行フェーズ</text>
  <text x="500" y="190" text-anchor="middle" fill="#657786" font-size="13">定着が始まる</text>
  <line x1="500" y1="195" x2="500" y2="205" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="500" y="270" text-anchor="middle" fill="#F5A623" font-size="14" font-weight="bold">短期→長期移行</text>
  <text x="500" y="290" text-anchor="middle" fill="#657786" font-size="13">所要2〜3分</text>

  <!-- Day 7 -->
  <circle cx="700" cy="230" r="25" fill="#17BF63"/>
  <text x="700" y="237" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">+7日</text>

  <rect x="625" y="100" width="150" height="95" rx="8" fill="#FFFFFF" stroke="#17BF63" stroke-width="2"/>
  <text x="700" y="128" text-anchor="middle" fill="#17BF63" font-size="15" font-weight="bold">復習 3回目</text>
  <text x="700" y="150" text-anchor="middle" fill="#14171A" font-size="14">長期記憶へ定着</text>
  <text x="700" y="172" text-anchor="middle" fill="#657786" font-size="13">忘却速度が</text>
  <text x="700" y="190" text-anchor="middle" fill="#657786" font-size="13">大幅に鈍化</text>
  <line x1="700" y1="195" x2="700" y2="205" stroke="#17BF63" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="700" y="270" text-anchor="middle" fill="#17BF63" font-size="14" font-weight="bold">長期記憶へ定着</text>
  <text x="700" y="290" text-anchor="middle" fill="#657786" font-size="13">所要2〜3分</text>

  <!-- Day 14 -->
  <circle cx="880" cy="230" r="25" fill="#1DA1F2"/>
  <text x="880" y="237" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">+14日</text>

  <rect x="805" y="100" width="150" height="95" rx="8" fill="#FFFFFF" stroke="#1DA1F2" stroke-width="2"/>
  <text x="880" y="128" text-anchor="middle" fill="#1DA1F2" font-size="15" font-weight="bold">復習 4回目</text>
  <text x="880" y="150" text-anchor="middle" fill="#14171A" font-size="14">定着強化</text>
  <text x="880" y="172" text-anchor="middle" fill="#657786" font-size="13">文脈でも使える</text>
  <text x="880" y="190" text-anchor="middle" fill="#657786" font-size="13">レベルに</text>
  <line x1="880" y1="195" x2="880" y2="205" stroke="#1DA1F2" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="880" y="270" text-anchor="middle" fill="#1DA1F2" font-size="14" font-weight="bold">完全定着に近づく</text>
  <text x="880" y="290" text-anchor="middle" fill="#657786" font-size="13">所要1〜2分</text>

  <!-- Day 30 -->
  <circle cx="1100" cy="230" r="25" fill="#657786"/>
  <text x="1100" y="237" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">+30日</text>

  <rect x="1000" y="100" width="150" height="95" rx="8" fill="#FFFFFF" stroke="#657786" stroke-width="2"/>
  <text x="1075" y="128" text-anchor="middle" fill="#657786" font-size="15" font-weight="bold">復習 5回目</text>
  <text x="1075" y="150" text-anchor="middle" fill="#14171A" font-size="14">完全定着確認</text>
  <text x="1075" y="172" text-anchor="middle" fill="#657786" font-size="13">半年以上</text>
  <text x="1075" y="190" text-anchor="middle" fill="#657786" font-size="13">忘れない状態に</text>
  <line x1="1075" y1="195" x2="1075" y2="205" stroke="#657786" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="1100" y="270" text-anchor="middle" fill="#657786" font-size="14" font-weight="bold">永続記憶へ</text>
  <text x="1100" y="290" text-anchor="middle" fill="#657786" font-size="13">所要1〜2分</text>

  <!-- Summary section -->
  <rect x="80" y="330" width="500" height="210" rx="12" fill="#FFFFFF" stroke="#E0245E" stroke-width="2"/>
  <rect x="80" y="330" width="500" height="50" rx="12" fill="#E0245E"/>
  <rect x="80" y="362" width="500" height="18" fill="#E0245E"/>
  <text x="330" y="363" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">詰め込み学習（1日50個）</text>
  <text x="330" y="400" text-anchor="middle" fill="#14171A" font-size="16">総学習時間: 30分</text>
  <text x="330" y="430" text-anchor="middle" fill="#14171A" font-size="16">復習回数: 1回（その日のみ）</text>
  <text x="330" y="460" text-anchor="middle" fill="#14171A" font-size="16">1ヶ月後の記憶: 約7〜8単語</text>
  <text x="330" y="490" text-anchor="middle" fill="#E0245E" font-size="18" font-weight="bold">定着率 約15%</text>
  <text x="330" y="522" text-anchor="middle" fill="#657786" font-size="14">翌日から急速に忘却が進む</text>

  <rect x="620" y="330" width="500" height="210" rx="12" fill="#FFFFFF" stroke="#1DA1F2" stroke-width="2"/>
  <rect x="620" y="330" width="500" height="50" rx="12" fill="#1DA1F2"/>
  <rect x="620" y="362" width="500" height="18" fill="#1DA1F2"/>
  <text x="870" y="363" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">間隔反復（10個 × 5日）</text>
  <text x="870" y="400" text-anchor="middle" fill="#14171A" font-size="16">総学習時間: 30分 + 復習計10分</text>
  <text x="870" y="430" text-anchor="middle" fill="#14171A" font-size="16">復習回数: 5回（適切な間隔で）</text>
  <text x="870" y="460" text-anchor="middle" fill="#14171A" font-size="16">1ヶ月後の記憶: 約42〜43単語</text>
  <text x="870" y="490" text-anchor="middle" fill="#1DA1F2" font-size="18" font-weight="bold">定着率 約85%</text>
  <text x="870" y="522" text-anchor="middle" fill="#657786" font-size="14">復習のたびに記憶が強化される</text>

  <!-- Credit -->
  <text x="1170" y="655" text-anchor="end" fill="#AAB8C2" font-size="18">@ichi_eigo</text>
</svg>
