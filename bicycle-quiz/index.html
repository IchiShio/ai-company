.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#4fc3f7);border-radius:10px;transition:width .4s ease}
.progress-text{text-align:center;font-size:.8rem;color:var(--text-light);margin-bottom:12px}

/* Card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;margin-bottom:16px;transition:transform .2s}

.question-text .en{display:block;font-size:.9rem;color:var(--text-light);font-weight:400;margin-top:6px}

.choice-btn.wrong{border-color:var(--wrong);background:#fde8e8}
.choice-btn.wrong .label{background:var(--wrong);color:#fff}
.choice-btn:disabled{cursor:default;opacity:1}

.explanation{margin-top:16px;padding:16px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none}
.explanation.show{display:block;animation:fadeIn .3s ease}
.explanation.correct-bg{background:#e6f9ed;border-left:4px solid var(--correct)}
.explanation.wrong-bg{background:#fde8e8;border-left:4px solid var(--wrong)}
.explanation .en{display:block;color:var(--text-light);margin-top:8px;font-size:.85rem}

.next-btn.show{display:block;animation:fadeIn .3s ease}

.retry-btn:hover{background:var(--primary-dark)}

@media(max-width:480px){
  .container{padding:12px}

  .header h1{font-size:1.3rem}
  .result .btn-row{flex-direction:column;gap:8px}
  .share-btn{margin-left:0}

  },
  {

    choices: [
      { ja: "前科がつく", en: "You get a criminal record" },

    ],

let currentQ = 0, score = 0, lang = 'ja', answered = false;
const app = document.getElementById('app');

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (l === 'ja' ? '日本語' : l === 'en' ? 'English' : 'Both'));
  });
  if (currentQ === 0 && !answered) renderStart();
  else if (currentQ <= QUIZ.length) renderQuestion();
}

function t(ja, en) {
  if (lang === 'ja') return ja;
  if (lang === 'en') return en;
  return ja + '<span class="en">' + en + '</span>';
}

function renderStart() {
  app.innerHTML = `
    <div class="card start-screen">
      <div class="icon">🚲</div>
      <h2>${t('2026年4月の新ルールを学ぼう！', 'Learn the New Rules Starting April 2026!')}</h2>
      <p>${t(
        '青切符制度・反則金・正しい走り方をクイズで確認しましょう。全' + QUIZ.length + '問！',
        'Test your knowledge of the blue ticket system, fines, and proper cycling rules. ' + QUIZ.length + ' questions!'
      )}</p>
      <div class="features">
        <span class="feat">${t('青切符制度', 'Blue Ticket System')}</span>
        <span class="feat">${t('反則金一覧', 'Fine Amounts')}</span>
        <span class="feat">${t('危険行為', 'Dangerous Acts')}</span>
        <span class="feat">${t('バイリンガル', 'Bilingual')}</span>
      </div>
      <button class="start-btn" onclick="startQuiz()">${t('クイズを始める', 'Start Quiz')}</button>
    </div>`;
}

function startQuiz() {
  currentQ = 0; score = 0; answered = false;
  shuffleArray(QUIZ);
  renderQuestion();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderQuestion() {
  const q = QUIZ[currentQ];
  const pct = ((currentQ) / QUIZ.length * 100).toFixed(0);
  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-text">${currentQ + 1} / ${QUIZ.length}</div>
    <div class="card" style="animation:fadeIn .3s ease">
      <div class="question-number">Q${currentQ + 1}</div>
      <div class="question-text">${t(q.q, q.q_en)}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice-btn" onclick="selectAnswer(${i})" id="choice-${i}">
            <span class="label">${String.fromCharCode(65 + i)}</span>
            <span>${t(c.ja, c.en)}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${currentQ < QUIZ.length - 1 ? t('次の問題へ →', 'Next Question →') : t('結果を見る →', 'See Results →')}
      </button>
    </div>`;
  answered = false;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = QUIZ[currentQ];
  const isCorrect = idx === q.answer;
  if (isCorrect) score++;

  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });

  const el = document.getElementById('explanation');
  el.className = 'explanation show ' + (isCorrect ? 'correct-bg' : 'wrong-bg');
  let html = isCorrect
    ? '<strong>' + t('⭕ 正解！', '⭕ Correct!') + '</strong><br>'
    : '<strong>' + t('❌ 不正解…', '❌ Incorrect...') + '</strong><br>';
  html += t(q.explanation, q.explanation_en);
  if (q.fine) html += '<br><span class="fine-tag">' + t('反則金: ' + q.fine, 'Fine: ' + q.fine) + '</span>';
  el.innerHTML = html;

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUIZ.length) renderResult();
  else renderQuestion();
}

function renderResult() {
  const pct = Math.round(score / QUIZ.length * 100);
  let msg, msg_en, emoji;
  if (pct === 100) { msg = '完璧！自転車ルールマスターです！'; msg_en = 'Perfect! You are a bicycle rules master!'; emoji = '🏆'; }
  else if (pct >= 80) { msg = '素晴らしい！ほぼ完璧です！'; msg_en = 'Excellent! Almost perfect!'; emoji = '🎉'; }
  else if (pct >= 60) { msg = 'なかなか良いですね！もう少し学びましょう。'; msg_en = 'Good job! Let\'s learn a bit more.'; emoji = '👍'; }
  else if (pct >= 40) { msg = 'もう少し頑張りましょう！'; msg_en = 'Keep studying!'; emoji = '📚'; }
  else { msg = '新ルールをしっかり覚えましょう！'; msg_en = 'Time to learn the new rules!'; emoji = '🚲'; }

  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    <div class="card result" style="animation:fadeIn .4s ease">
      <div class="score-circle">${score}/${QUIZ.length}</div>
      <h2>${emoji} ${t('クイズ結果', 'Quiz Results')}</h2>
      <p class="message">${t(msg, msg_en)}<br><strong>${pct}%</strong> ${t('正解', 'correct')}</p>
      <div class="btn-row" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="retry-btn" onclick="startQuiz()">${t('もう一度挑戦', 'Try Again')}</button>
        <button class="share-btn" onclick="shareResult()">${t('結果をシェア', 'Share Result')}</button>
      </div>
    </div>
    <div class="card" style="animation:fadeIn .5s ease">
      <h3 style="margin-bottom:12px">${t('📋 反則金まとめ', '📋 Fine Summary')}</h3>
      <table style="width:100%;font-size:.85rem;border-collapse:collapse">
        <tr style="border-bottom:2px solid #e0e0e0">
          <th style="text-align:left;padding:8px 4px">${t('違反', 'Violation')}</th>
          <th style="text-align:right;padding:8px 4px">${t('反則金', 'Fine')}</th>
        </tr>
        <tr><td style="padding:6px 4px">${t('ながらスマホ（保持）', 'Smartphone use')}</td><td style="text-align:right;padding:6px 4px;font-weight:700;color:var(--wrong)">¥12,000</td></tr>
        <tr style="background:#f8f9fa"><td style="padding:6px 4px">${t('遮断踏切立入り', 'Closed crossing entry')}</td><td style="text-align:right;padding:6px 4px;font-weight:700;color:var(--wrong)">¥7,000</td></tr>
        <tr><td style="padding:6px 4px">${t('信号無視', 'Running red light')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥6,000</td></tr>
        <tr style="background:#f8f9fa"><td style="padding:6px 4px">${t('右側通行（逆走）', 'Wrong-way riding')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥6,000</td></tr>
        <tr><td style="padding:6px 4px">${t('歩道通行違反', 'Sidewalk riding')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥6,000</td></tr>
        <tr style="background:#f8f9fa"><td style="padding:6px 4px">${t('一時不停止', 'Failure to stop')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥5,000</td></tr>
        <tr><td style="padding:6px 4px">${t('無灯火', 'No lights')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥5,000</td></tr>
        <tr style="background:#f8f9fa"><td style="padding:6px 4px">${t('傘差し・イヤホン', 'Umbrella/earphones')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥5,000</td></tr>
        <tr><td style="padding:6px 4px">${t('ブレーキ不良', 'Faulty brakes')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥5,000</td></tr>
        <tr style="background:#f8f9fa"><td style="padding:6px 4px">${t('二人乗り', 'Riding double')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥3,000</td></tr>
        <tr><td style="padding:6px 4px">${t('並進走行', 'Side-by-side riding')}</td><td style="text-align:right;padding:6px 4px;font-weight:700">¥3,000</td></tr>
        <tr style="background:#fde8e8"><td style="padding:6px 4px;font-weight:700">${t('飲酒運転', 'Drunk cycling')}</td><td style="text-align:right;padding:6px 4px;font-weight:700;color:var(--wrong)">${t('赤切符（刑事罰）', 'Red ticket (criminal)')}</td></tr>
      </table>
    </div>`;
}

function shareResult() {
  const pct = Math.round(score / QUIZ.length * 100);
  const text = lang === 'en'
    ? `🚲 I scored ${score}/${QUIZ.length} (${pct}%) on the Japan Bicycle Rules Quiz 2026! Can you beat my score?\nhttps://native-real.com/bicycle-quiz/`
    : `🚲 自転車ルールクイズ2026で ${score}/${QUIZ.length}問正解（${pct}%）でした！あなたも挑戦してみよう！\nhttps://native-real.com/bicycle-quiz/`;
  if (navigator.share) {
    navigator.share({ title: '自転車ルールクイズ 2026', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert(lang === 'en' ? 'Copied to clipboard!' : 'クリップボードにコピーしました！');
    });
  }
}

// Init
renderStart();
</script>
