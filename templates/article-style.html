  <style>
    /* ── UNIFIED HEADER ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      background: rgba(248,246,241,0.92); backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid #E8E4DC; padding: 10px 0;
      transition: padding 0.3s ease, box-shadow 0.3s ease;
    }
    .site-header.scrolled { padding: 6px 0; box-shadow: 0 1px 12px rgba(0,0,0,0.08); }
    .site-header-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .site-header-logo { font-size: 15px; font-weight: 800; color: rgba(26,26,26,0.88); text-decoration: none; white-space: nowrap; display: flex; align-items: center; gap: 7px; }
    .site-header-logo svg { width: 18px; height: 18px; color: #F5A623; }
    .site-header-nav { display: flex; align-items: center; gap: 2px; }
    .site-header-nav > a { font-size: 13px; font-weight: 500; color: rgba(26,26,26,0.55); text-decoration: none; padding: 7px 12px; border-radius: 10px; transition: all 0.2s ease; white-space: nowrap; position: relative; }
    .site-header-nav > a:hover { color: rgba(26,26,26,0.88); background: rgba(26,26,26,0.04); }
    .site-header-nav > a.active { color: #F5A623; font-weight: 700; }
    .site-header-nav > a.active::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 16px; height: 2px; border-radius: 1px; background: #F5A623; }
    /* Dropdown */
    .nav-dd { position: relative; }
    .nav-dd-trigger { font-size: 13px; font-weight: 500; color: rgba(26,26,26,0.55); background: none; border: none; cursor: pointer; padding: 7px 12px; border-radius: 10px; transition: all 0.2s ease; white-space: nowrap; display: flex; align-items: center; gap: 3px; font-family: inherit; }
    .nav-dd-trigger:hover { color: rgba(26,26,26,0.88); background: rgba(26,26,26,0.04); }
    .nav-dd-trigger.active { color: #F5A623; font-weight: 700; }
    .dd-chevron { transition: transform 0.2s ease; flex-shrink: 0; }
    .nav-dd:hover .dd-chevron, .nav-dd.open .dd-chevron { transform: rotate(180deg); }
    .nav-dd-menu { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); min-width: 180px; background: #FDFCF9; border-radius: 12px; border: 1px solid #E8E4DC; box-shadow: 0 8px 32px rgba(26,26,26,0.10), 0 2px 8px rgba(26,26,26,0.04); padding: 6px; margin-top: 4px; z-index: 310; }
    .nav-dd:hover .nav-dd-menu, .nav-dd.open .nav-dd-menu { display: block; }
    .nav-dd-menu a { display: block; font-size: 13px; font-weight: 500; color: rgba(26,26,26,0.62); text-decoration: none; padding: 9px 14px; border-radius: 8px; transition: all 0.15s ease; white-space: nowrap; }
    .nav-dd-menu a:hover { color: rgba(26,26,26,0.88); background: rgba(26,26,26,0.04); }
    .nav-dd-menu a.active { color: #F5A623; font-weight: 700; }
    /* Hamburger */
    .site-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; width: 40px; height: 40px; border-radius: 10px; position: relative; z-index: 302; }
    .site-hamburger span { display: block; width: 18px; height: 2px; background: rgba(26,26,26,0.88); margin: 4px auto; border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .site-hamburger.active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .site-hamburger.active span:nth-child(2) { opacity: 0; }
    .site-hamburger.active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    /* Mobile nav */
    .site-mobile-nav { display: flex; visibility: hidden; pointer-events: none; position: fixed; inset: 0; background: rgba(10,10,10,0.96); z-index: 301; backdrop-filter: blur(20px); flex-direction: column; align-items: center; justify-content: center; gap: 4px; opacity: 0; transition: opacity 0.3s, visibility 0.3s; }
    .site-mobile-nav.active { visibility: visible; pointer-events: auto; opacity: 1; }
    .site-mobile-nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 17px; font-weight: 600; padding: 14px 40px; border-radius: 14px; width: 260px; text-align: center; }
    .site-mobile-nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .site-mobile-nav a.active { color: #F5A623; }
    .mobile-nav-label { color: rgba(255,255,255,0.3); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 0 2px; width: 260px; text-align: center; }
    @media (max-width: 768px) { .site-header-nav { display: none; } .site-hamburger { display: block; } }
    .mobile-nav-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; cursor: pointer; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .mobile-nav-close:hover { background: rgba(255,255,255,0.2); }
    /* ── END UNIFIED HEADER ── */

:root{--primary:#F5A623;--primary-light:#F5A623;--primary-dark:#d4891a;--primary-pale:rgba(245,166,35,0.10);--accent:#F5A623;--accent-dark:#d4891a;--accent-pale:rgba(245,166,35,0.08);--text:#111827;--text-muted:#6b7280;--bg:#ffffff;--bg-gray:#f9fafb;--border:#E8E4DC;--shadow:0 1px 3px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);--shadow-md:0 4px 16px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.05);--radius:10px;--radius-lg:14px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:"Inter","Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;letter-spacing:.01em;font-size:16px;line-height:1.9;color:var(--text);background:var(--bg);}
a{color:var(--primary);}a:hover{color:var(--primary-light);}
img{max-width:100%;height:auto;}
.container{max-width:1100px;margin:0 auto;padding:0 20px;}


.site-header .logo span{color:var(--primary);}


.breadcrumb{padding:12px 0;font-size:.82rem;color:var(--text-muted);}
.breadcrumb a{color:var(--text-muted);text-decoration:none;}
.breadcrumb a:hover{color:var(--primary);}
.breadcrumb span{margin:0 6px;color:var(--border);}
.article-layout{display:grid;grid-template-columns:1fr 300px;gap:40px;padding:40px 0;}
.article-content{min-width:0;}
.article-content h1{font-size:1.55rem;line-height:1.45;margin-bottom:20px;font-weight:800;}
.article-content h2{font-size:1.25rem;font-weight:700;margin:40px 0 16px;padding:13px 18px;background:var(--bg-gray);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;color:var(--text);}
.article-content h3{font-size:1.08rem;font-weight:700;margin:28px 0 12px;color:var(--primary);padding-left:12px;border-left:3px solid var(--accent);}
.article-content p{margin-bottom:16px;}
.article-content ul,.article-content ol{margin:16px 0 16px 24px;}
.article-content li{margin-bottom:8px;}
.article-content table{width:100%;border-collapse:collapse;margin:24px 0;font-size:.9rem;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.article-content th{background:var(--primary);color:#fff;padding:11px 16px;text-align:left;font-weight:600;}
.article-content td{padding:11px 16px;border-bottom:1px solid var(--border);}
.article-content tr:nth-child(even) td{background:var(--bg-gray);}
.toc{background:var(--bg-gray);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:20px 24px;margin:24px 0 32px;}
.toc h4{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--accent-dark);}
.toc ol{margin-left:20px;}
.toc li{margin-bottom:6px;font-size:.88rem;}
.toc a{color:var(--text-muted);text-decoration:none;}
.toc a:hover{color:var(--primary);}
.cta-box{background:#FDFCF9;border:1.5px solid #F5A623;color:rgba(26,26,26,.88);border-radius:var(--radius-lg);padding:28px 32px;text-align:center;margin:36px 0;}
.cta-box h3{font-size:1.15rem;margin-bottom:10px;font-weight:700;color:#fff;border-left:none;padding-left:0;}
.cta-box p{opacity:.9;margin-bottom:20px;font-size:.93rem;}
.btn-primary{display:inline-block;background:var(--primary);color:#fff;padding:11px 20px;border-radius:var(--radius);font-weight:700;font-size:.88rem;text-decoration:none;text-align:center;white-space:nowrap;transition:background .2s,transform .15s;}
.btn-primary:hover{background:var(--primary-light);color:#fff;transform:translateY(-1px);}
.disclaimer{background:var(--bg-gray);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;font-size:.78rem;color:var(--text-muted);margin-top:40px;line-height:1.7;}
.sidebar-widget{background:#FDFCF9;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);}
.sidebar-widget h4{font-size:.95rem;font-weight:700;margin-bottom:14px;color:var(--text);padding-bottom:10px;border-bottom:2px solid var(--bg-gray);}
.sidebar-service-item a{font-size:.88rem;text-decoration:none;color:var(--text);}
.sidebar-service-item a:hover{color:var(--primary);}
.sidebar-service-list{display:flex;flex-direction:column;gap:10px;}
.quiz-promo{position:relative;overflow:hidden;background:linear-gradient(135deg,#060C1B,#0f1a35);border:1px solid rgba(251,191,36,.25);border-radius:16px;padding:20px 24px;margin:32px 0;}
.quiz-promo-orb{position:absolute;width:220px;height:220px;background:radial-gradient(circle,rgba(251,191,36,.13),transparent 70%);top:-60px;right:-40px;border-radius:50%;pointer-events:none;}
.quiz-promo-inner{position:relative;z-index:1;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.quiz-promo-icon{font-size:2rem;flex-shrink:0;line-height:1;}
.quiz-promo-body{flex:1;min-width:140px;}
.quiz-promo-title{color:rgba(255,255,255,.92);font-weight:700;font-size:.98rem;margin-bottom:4px;}
.quiz-promo-sub{color:rgba(255,255,255,.45);font-size:.78rem;}
.quiz-promo-btn{display:inline-block;background:linear-gradient(135deg,#F59E0B,#FBBF24);color:#1a1000 !important;font-weight:700;font-size:.86rem;padding:11px 22px;border-radius:10px;text-decoration:none;white-space:nowrap;transition:transform .18s ease,box-shadow .18s ease;flex-shrink:0;}
.quiz-promo-btn:hover{transform:translateY(-2px);color:#1a1000 !important;}
.quiz-promo-widget{position:relative;overflow:hidden;background:linear-gradient(135deg,#060C1B,#0f1a35) !important;border:1px solid rgba(251,191,36,.25) !important;}
.quiz-promo-widget .quiz-promo-orb{width:130px;height:130px;top:-30px;right:-20px;}
.quiz-promo-widget-label{font-size:.7rem;color:rgba(251,191,36,.85);font-weight:700;letter-spacing:.8px;text-transform:uppercase;position:relative;z-index:1;}
.quiz-promo-widget-title{color:rgba(255,255,255,.9);font-weight:700;font-size:.95rem;margin-top:8px;line-height:1.45;position:relative;z-index:1;}
.quiz-promo-widget-sub{color:rgba(255,255,255,.4);font-size:.75rem;margin-top:5px;position:relative;z-index:1;}
.quiz-promo-widget .quiz-promo-btn{width:100%;text-align:center;display:block;margin-top:14px;position:relative;z-index:1;}
.site-footer{background:#2c2520;color:rgba(255,255,255,.65);padding:48px 0 24px;margin-top:72px;font-size:.88rem;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:32px;margin-bottom:32px;}
.site-footer h4{color:rgba(255,255,255,.9);font-size:.95rem;margin-bottom:14px;}
.site-footer ul{list-style:none;}
.site-footer li{margin-bottom:9px;}
.site-footer a{color:rgba(255,255,255,.6);text-decoration:none;transition:color .2s;}
.site-footer a:hover{color:#f0a080;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:20px;text-align:center;font-size:.78rem;color:rgba(255,255,255,.4);}
@media(max-width:768px){.article-layout{grid-template-columns:1fr;}.sidebar{display:none;}.footer-grid{grid-template-columns:1fr;}}</style>
