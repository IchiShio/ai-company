<html lang="ja">
<head>

  <title>今日の学習ダッシュボード | native-real</title>
  <meta name="description" content="今日の英語学習の進捗を一覧確認。リスニング・語彙・文法・語根の学習状況と弱点を可視化。">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://native-real.com/today/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273547;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent2: #10b981;
      --accent3: #f59e0b;
      --accent4: #007AFF;
      --danger: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .logo {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }

    header .logo:hover { color: var(--text); }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      flex: 1;
    }

    header .date-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 0;
    }

    /* ── サマリーバー ── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
    }

    .summary-card .val {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
    }

    .summary-card .val.streak { color: var(--accent3); }
    .summary-card .val.correct { color: var(--accent2); }

    .summary-card .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── セクションタイトル ── */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ── アプリカード ── */
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, background 0.15s;
    }

    .app-card:hover {
      border-color: #4b5563;
      background: var(--surface2);
    }

    .app-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .app-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .app-info { flex: 1; min-width: 0; }

    .app-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .app-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .app-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 100px;
      flex-shrink: 0;
    }

    .badge-done { background: #14532d; color: #86efac; }
    .badge-notyet { background: #1e293b; color: var(--text-muted); border: 1px solid var(--border); }
    .badge-nodata { background: #1c1917; color: #78716c; border: 1px solid #292524; }

    /* ── プログレスバー ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-muted);
      width: 56px;
      flex-shrink: 0;
    }

    .progress-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .progress-val {
      font-size: 12px;
      font-weight: 700;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── 軸弱点ヒートマップ ── */
    .axis-section {
      margin-bottom: 24px;
    }

    .axis-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .axis-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 4px 8px;
      text-align: center;
    }

    .axis-cell .axis-pct {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .axis-cell .axis-name {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.3;
    }

    /* 色: 80%+ 緑 / 60-79% 黄 / <60% 赤 */
    .axis-strong { color: var(--accent2); }
    .axis-mid    { color: var(--accent3); }
    .axis-weak   { color: var(--danger); }

    .axis-cell.no-data .axis-pct { color: var(--text-muted); font-size: 14px; }

    /* ── 今日やること ── */
    .todo-section { margin-bottom: 24px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }

    .todo-item:hover { border-color: #4b5563; }
    .todo-item.done { opacity: 0.45; }

    .todo-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .todo-item.done .todo-check {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
    }

    .todo-text { flex: 1; font-size: 14px; }
    .todo-text .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .todo-arrow { color: var(--text-muted); font-size: 14px; }

    /* ── 全体ストリーク ── */
    .streak-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .streak-dot {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-muted);
    }

    .streak-dot.active {
      background: #b87010;
      border-color: #3b82f6;
      color: #bfdbfe;
    }

    .streak-dot.today {
      background: var(--accent3);
      border-color: #d97706;
      color: #fff;
      font-weight: 700;
    }

    /* ── 空状態 ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .start-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
    }

    /* ── フッターナビ ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }

    footer a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.15s;
    }

    footer a:hover, footer a.active { color: var(--text); }
    footer a .icon { font-size: 20px; }
  </style>

<header>
  <a href="/" class="logo">native-real</a>
  <h1>今日の学習</h1>
  <span class="date-label" id="dateLabel"></span>
</header>

<div class="container" id="app">
  <!-- JS で描画 -->
</div>

<footer>
  <a href="/" class="icon">🎧<span>リスニング</span></a>
  <a href="/words/" class="icon">📖<span>語彙</span></a>
  <a href="/grammar/" class="icon">✏️<span>文法</span></a>
  <a href="/kioku-shinai/" class="icon">🧩<span>語根</span></a>
  <a href="/today/" class="icon active">📊<span>今日</span></a>
</footer>

<script>
(function () {
  'use strict';

  // ── ユーティリティ ──────────────────────────────────────────────
  const todayStr = () => new Date().toISOString().slice(0, 10);

  function safeJson(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }

  function pct(a, c) {
    if (!a || a < 1) return null;
    return Math.round((c / a) * 100);
  }

  // ── データ読み込み ────────────────────────────────────────────────
  const today = todayStr();

  // ListenUp
  const lu = safeJson('listenup_v1') || {};
  const luToday = (lu.todayDate === today) ? { a: lu.todayAnswered || 0, c: lu.todayCorrect || 0 } : { a: 0, c: 0 };
  const luTotal = lu.totalAnswered || 0;
  const luStreak = lu.dailyStreak || 0;
  const luAxis = lu.axisStats || {};
  const luVisits = lu.visitDates || [];
  const luChallengeDone = (() => { try { return localStorage.getItem('listenup_challenge_' + today) === '1'; } catch(_) { return false; } })();

  // WordsUp
  const wu = safeJson('wordsup_v1') || {};
  const wuToday = (wu.todayDate === today) ? { a: wu.todayAnswered || 0, c: wu.todayCorrect || 0 } : { a: 0, c: 0 };
  const wuStreak = wu.dailyStreak || 0;
  const wuTotal = wu.totalAnswered || 0;

  // kioku-shinai
  const ki = safeJson('kioku_v1') || {};
  const kiCompleted = (ki.completedRoots || []).length;

  // ── 集計 ──────────────────────────────────────────────────────────
  const totalTodayAnswered = luToday.a + wuToday.a;
  const totalTodayCorrect  = luToday.c + wuToday.c;
  const totalTodayPct      = pct(totalTodayAnswered, totalTodayCorrect);
  const maxStreak          = Math.max(luStreak, wuStreak);

  // ListenUp 軸統計
  const AXIS_LABELS = {
    speed:      '速い発音',
    reduction:  '音変化',
    vocab:      '語彙',
    context:    '文脈',
    distractor: '紛らわし',
  };

  // ── 日付ラベル ────────────────────────────────────────────────────
  const dateEl = document.getElementById('dateLabel');
  const d = new Date();
  dateEl.textContent = `${d.getMonth()+1}/${d.getDate()}（${'日月火水木金土'[d.getDay()]}）`;

  // ── HTML 生成 ─────────────────────────────────────────────────────
  const app = document.getElementById('app');
  const hasAnyData = luTotal > 0 || wuTotal > 0 || kiCompleted > 0;

  if (!hasAnyData) {
    app.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📚</div>
        <p>まだ学習データがありません。<br>最初の1問を解いてみよう！</p>
        <a href="/" class="start-btn">リスニングを始める →</a>
      </div>`;
    return;
  }

  let html = '';

  // ── サマリーバー ──
  html += `<div class="summary-bar">
    <div class="summary-card">
      <div class="val">${totalTodayAnswered}</div>
      <div class="label">今日の問題数</div>
    </div>
    <div class="summary-card">
      <div class="val correct">${totalTodayPct !== null ? totalTodayPct + '%' : '—'}</div>
      <div class="label">今日の正解率</div>
    </div>
    <div class="summary-card">
      <div class="val streak">${maxStreak}</div>
      <div class="label">最長連続日数</div>
    </div>
  </div>`;

  // ── 今日やること ──
  html += `<div class="todo-section">
    <div class="section-title">今日やること</div>`;

  const todos = [
    {
      href: '/listening/',
      icon: '⚡',
      name: 'デイリーチャレンジ',
      goal: '5問',
      done: luChallengeDone,
      sub: luChallengeDone ? '完了！今日の5問クリア' : 'チャレンジモードで5問に挑戦',
    },
    {
      href: '/',
      icon: '🎧',
      name: 'ListenUp リスニング',
      goal: '10問',
      done: luToday.a >= 10,
      sub: luToday.a > 0 ? `今日 ${luToday.a}問 / 正解率 ${pct(luToday.a, luToday.c) ?? '—'}%` : '未開始',
    },
    {
      href: '/words/',
      icon: '📖',
      name: 'WordsUp 語彙',
      goal: '10問',
      done: wuToday.a >= 10,
      sub: wuToday.a > 0 ? `今日 ${wuToday.a}問 / 正解率 ${pct(wuToday.a, wuToday.c) ?? '—'}%` : '未開始',
    },
    {
      href: '/grammar/',
      icon: '✏️',
      name: 'GrammarUp 文法',
      goal: '5問',
      done: false,
      sub: 'ログイン不要で練習できます',
    },
    {
      href: '/kioku-shinai/',
      icon: '🧩',
      name: 'kioku-shinai 語根',
      goal: '1語根',
      done: kiCompleted > 0,
      sub: kiCompleted > 0 ? `累計 ${kiCompleted} 語根クリア` : '未開始',
    },
  ];

  todos.forEach(t => {
    html += `<a href="${t.href}" class="todo-item${t.done ? ' done' : ''}">
      <div class="todo-check">${t.done ? '✓' : ''}</div>
      <div class="todo-text">
        <div>${t.icon} ${t.name} <span style="font-size:12px;color:var(--text-muted)">目標${t.goal}</span></div>
        <div class="sub">${t.sub}</div>
      </div>
      <div class="todo-arrow">›</div>
    </a>`;
  });

  html += `</div>`;

  // ── 各アプリ詳細 ──
  html += `<div class="section-title" style="margin-bottom:10px">アプリ別の進捗</div>`;

  // ListenUp
  {
    const accPct = pct(lu.totalAnswered, lu.totalCorrect);
    const todayPct2 = pct(luToday.a, luToday.c);
    const badge = luToday.a >= 10 ? '<span class="app-badge badge-done">達成</span>' :
                  luToday.a > 0   ? '<span class="app-badge badge-notyet">練習中</span>' :
                                    '<span class="app-badge badge-nodata">未開始</span>';

    html += `<a href="/" class="app-card">
      <div class="app-card-header">
        <div class="app-icon" style="background:#1e1b4b">🎧</div>
        <div class="app-info">
          <div class="app-name">ListenUp</div>
          <div class="app-sub">累計 ${luTotal.toLocaleString()}問 / ${luStreak}日連続</div>
        </div>
        ${badge}
      </div>`;

    if (luToday.a > 0) {
      html += `<div class="progress-row">
        <span class="progress-label">今日</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.min(100, luToday.a*10)}%;background:#6366f1"></div></div>
        <span class="progress-val" style="color:#6366f1">${luToday.a}問</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">正解率</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${todayPct2 ?? 0}%;background:#F5A623"></div></div>
        <span class="progress-val" style="color:#10b981">${todayPct2 ?? '—'}%</span>
      </div>`;
    } else {
      html += `<div style="font-size:13px;color:var(--text-muted)">今日はまだ未回答です</div>`;
    }

    html += `</a>`;
  }

  // WordsUp
  {
    const badge = wuToday.a >= 10 ? '<span class="app-badge badge-done">達成</span>' :
                  wuToday.a > 0   ? '<span class="app-badge badge-notyet">練習中</span>' :
                                    '<span class="app-badge badge-nodata">未開始</span>';
    const todayP = pct(wuToday.a, wuToday.c);

    html += `<a href="/words/" class="app-card">
      <div class="app-card-header">
        <div class="app-icon" style="background:#1e1b4b">📖</div>
        <div class="app-info">
          <div class="app-name">WordsUp</div>
          <div class="app-sub">累計 ${wuTotal.toLocaleString()}問 / ${wuStreak}日連続</div>
        </div>
        ${badge}
      </div>`;

    if (wuToday.a > 0) {
      html += `<div class="progress-row">
        <span class="progress-label">今日</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.min(100, wuToday.a*10)}%;background:#6366f1"></div></div>
        <span class="progress-val" style="color:#6366f1">${wuToday.a}問</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">正解率</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${todayP ?? 0}%;background:#F5A623"></div></div>
        <span class="progress-val" style="color:#10b981">${todayP ?? '—'}%</span>
      </div>`;
    } else {
      html += `<div style="font-size:13px;color:var(--text-muted)">今日はまだ未回答です</div>`;
    }

    html += `</a>`;
  }

  // GrammarUp（localStorage なし）
  html += `<a href="/grammar/" class="app-card">
    <div class="app-card-header">
      <div class="app-icon" style="background:#052e16">✏️</div>
      <div class="app-info">
        <div class="app-name">GrammarUp</div>
        <div class="app-sub">文法295問・ルールDB61件</div>
      </div>
      <span class="app-badge badge-nodata">確認不可</span>
    </div>
    <div style="font-size:13px;color:var(--text-muted)">進捗はアプリ内で確認できます</div>
  </a>`;

  // kioku-shinai
  {
    const badge = kiCompleted > 0 ? '<span class="app-badge badge-done">進行中</span>' :
                                    '<span class="app-badge badge-nodata">未開始</span>';

    html += `<a href="/kioku-shinai/" class="app-card">
      <div class="app-card-header">
        <div class="app-icon" style="background:#0c1a2e">🧩</div>
        <div class="app-info">
          <div class="app-name">kioku-shinai</div>
          <div class="app-sub">語根 ${kiCompleted} 個クリア済み</div>
        </div>
        ${badge}
      </div>
      <div class="progress-row">
        <span class="progress-label">語根</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.min(100, kiCompleted * 5)}%;background:#007AFF"></div></div>
        <span class="progress-val" style="color:#007AFF">${kiCompleted}</span>
      </div>
    </a>`;
  }

  // ── ListenUp 軸弱点 ──
  const hasAxisData = Object.values(luAxis).some(v => v && (v.a || 0) >= 3);

  html += `<div class="axis-section" style="margin-top:24px">
    <div class="section-title" style="margin-bottom:10px">リスニング弱点分析（5軸）</div>
    <div class="axis-grid">`;

  Object.entries(AXIS_LABELS).forEach(([key, label]) => {
    const stat = luAxis[key] || { a: 0, c: 0 };
    const p = pct(stat.a, stat.c);
    if (p === null || stat.a < 3) {
      html += `<div class="axis-cell no-data">
        <div class="axis-pct">—</div>
        <div class="axis-name">${label}</div>
      </div>`;
    } else {
      const cls = p >= 80 ? 'axis-strong' : p >= 60 ? 'axis-mid' : 'axis-weak';
      html += `<div class="axis-cell">
        <div class="axis-pct ${cls}">${p}%</div>
        <div class="axis-name">${label}</div>
      </div>`;
    }
  });

  html += `</div>`;

  if (!hasAxisData) {
    html += `<p style="font-size:12px;color:var(--text-muted);margin-top:8px">各軸3問以上解くと正解率が表示されます</p>`;
  }

  html += `</div>`;

  // ── 連続学習カレンダー（直近14日） ──
  if (luVisits.length > 0) {
    html += `<div style="margin-bottom:24px">
      <div class="section-title" style="margin-bottom:10px">学習カレンダー（直近14日）</div>
      <div class="streak-bar">`;

    for (let i = 13; i >= 0; i--) {
      const d2 = new Date();
      d2.setDate(d2.getDate() - i);
      const ds = d2.toISOString().slice(0, 10);
      const isToday = ds === today;
      const visited = luVisits.includes(ds);
      const day = d2.getDate();
      html += `<div class="streak-dot${isToday ? ' today' : visited ? ' active' : ''}">${day}</div>`;
    }

    html += `</div></div>`;
  }

  app.innerHTML = html;

  // ── GA4 ──
  try {
    gtag('event', 'dashboard_view', {
      total_today: totalTodayAnswered,
      streak: maxStreak,
    });
  } catch (_) {}

})();
</script>
<script src="/assets/global.js" defer></script>
</body>
</html>
