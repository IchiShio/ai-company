<body>
  <!-- GTM noscript -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PS9R9844" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>ThoughtWeave</h1>
      <select id="scenario-select"></select>
      <a href="/" style="margin-left:auto;color:var(--text-dim);font-size:13px;text-decoration:none;">native-real.com</a>
    </header>

    <!-- Left: Particle palette -->
    <aside class="panel-left">
      <h2>Thought Particles</h2>
      <button class="particle-btn" data-type="idea">
        <span class="dot"></span> Idea
      </button>
      <button class="particle-btn" data-type="connector">
        <span class="dot"></span> Connector
      </button>
      <button class="particle-btn" data-type="nuance">
        <span class="dot"></span> Nuance
      </button>
      <button class="particle-btn" data-type="cultural">
        <span class="dot"></span> Cultural
      </button>
      <div class="hint-text">
        Drag particles onto the text to see how native thought patterns reshape English expressions. Click any word for notes.
      </div>
    </aside>

    <!-- Center: Canvas -->
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="tw-canvas"></canvas>
    </div>

    <!-- Right: Word notes -->
    <aside class="panel-right">
      <h2>Word Notes</h2>
      <div id="note-panel">
        <div class="empty-note">Click a word for notes</div>
      </div>
    </aside>

    <!-- Footer -->
    <footer class="footer">
      <span id="footer-info">Loading...</span>
    </footer>
  </div>
