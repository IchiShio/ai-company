  <script>
'use strict';

/* =========================================================
   Firebase / Auth
   ========================================================= */
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('user-info').textContent = user.displayName || user.email;
    document.getElementById('login-btn').style.display  = 'none';
    document.getElementById('logout-btn').style.display = 'inline-block';
  } else {
    document.getElementById('user-info').textContent    = '';
    document.getElementById('login-btn').style.display  = 'inline-block';
    document.getElementById('logout-btn').style.display = 'none';
  }
});

document.getElementById('login-btn').addEventListener('click', () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
});
document.getElementById('logout-btn').addEventListener('click', () => {
  firebase.auth().signOut();
});

async function saveResult(score, total) {
  if (!currentUser) return;
  try {
    const db = firebase.firestore();
    await db.collection('grammar_results').add({
      uid:       currentUser.uid,
      score:     score,
      total:     total,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) {
    console.error('Firestore save error:', e);
  }
}

async function loadHistory() {
  if (!currentUser) return;
  try {
    const db = firebase.firestore();
    const snap = await db.collection('grammar_results')
      .where('uid', '==', currentUser.uid)
      .orderBy('timestamp', 'desc')
      .limit(10)
      .get();
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      const ts = d.timestamp ? d.timestamp.toDate().toLocaleString('ja-JP') : '—';
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${ts}</td><td>${d.score}</td><td>${d.total}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('history-panel').classList.add('show');
  } catch (e) {
    console.error('Firestore load error:', e);
  }
}

/* =========================================================
   Quiz logic
   ========================================================= */

// Merge base questions with extra questions (if loaded)
const allQuestions = (typeof extraQuestions !== 'undefined')
  ? questions.concat(extraQuestions)
  : questions;

const QUESTIONS_PER_SESSION = 10;
const AXIS_INTERVAL = 5;   // show axis feedback every N questions

let sessionQuestions = [];
let currentQuestion  = 0;
let score            = 0;
let answered         = false;

// Axis counters for the current window
let axisWindow = { formal:0, casual:0, direct:0, indirect:0,
                   logical:0, emotional:0, structured:0, flexible:0 };
let axisWindowCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  sessionQuestions = shuffle(allQuestions).slice(0, QUESTIONS_PER_SESSION);
  currentQuestion  = 0;
  score            = 0;
  answered         = false;
  axisWindow       = { formal:0, casual:0, direct:0, indirect:0,
                       logical:0, emotional:0, structured:0, flexible:0 };
  axisWindowCount  = 0;

  document.getElementById('total-q').textContent = sessionQuestions.length;
  document.getElementById('results').classList.remove('show');
  document.getElementById('quiz-container').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = sessionQuestions[currentQuestion];
  answered = false;

  document.getElementById('current-q').textContent = currentQuestion + 1;
  document.getElementById('score').textContent      = score;
  document.getElementById('question-text').textContent = q.question;
  document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
  document.getElementById('feedback').textContent   = '';
  document.getElementById('explanation').textContent = '';
  document.getElementById('next-btn').classList.remove('show');

  // Category badge
  const badge = document.getElementById('category-badge');
  if (q.category) {
    badge.textContent = q.category;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const shuffledOptions = shuffle(q.options);
  shuffledOptions.forEach(option => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = option;
    btn.addEventListener('click', () => checkAnswer(option, q));
    container.appendChild(btn);
  });
}

function checkAnswer(selected, q) {
  if (answered) return;
  answered = true;

  const isCorrect = selected === q.answer;
  if (isCorrect) score++;

  // Accumulate axis data
  if (q.axes) {
    Object.keys(q.axes).forEach(axis => {
      if (axisWindow.hasOwnProperty(axis)) axisWindow[axis] += q.axes[axis];
    });
  }
  axisWindowCount++;

  // Highlight buttons
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(btn => {
    if (btn.textContent === q.answer) {
      btn.classList.add('correct');
    } else if (btn.textContent === selected && !isCorrect) {
      btn.classList.add('incorrect');
    }
    btn.disabled = true;
  });

  // Feedback message
  const feedback = document.getElementById('feedback');
  feedback.textContent = isCorrect ? '✓ 正解！' : `✗ 不正解。正解は「${q.answer}」です。`;
  feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');

  if (q.explanation) {
    document.getElementById('explanation').textContent = q.explanation;
  }

  document.getElementById('next-btn').classList.add('show');
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentQuestion++;

  // Axis feedback (every 5 questions)
  if (axisWindowCount > 0 && axisWindowCount % AXIS_INTERVAL === 0) {
    showAxisFeedback();
    return;   // axis overlay will call advanceQuestion() on close
  }

  advanceQuestion();
});

function advanceQuestion() {
  if (currentQuestion >= sessionQuestions.length) {
    finishQuiz();
  } else {
    showQuestion();
  }
}

function finishQuiz() {
  document.getElementById('quiz-container').style.display = 'none';
  const results = document.getElementById('results');
  results.classList.add('show');
  const pct = Math.round((score / sessionQuestions.length) * 100);
  document.getElementById('final-score').textContent = `${score} / ${sessionQuestions.length} (${pct}%)`;

  let msg;
  if (pct >= 90)      msg = '素晴らしい！ネイティブレベルの文法力です！';
  else if (pct >= 70) msg = 'よくできました！さらに上を目指しましょう。';
  else if (pct >= 50) msg = 'まずまずです。復習してみましょう。';
  else                msg = 'もう少し練習が必要です。頑張りましょう！';
  document.getElementById('result-message').textContent = msg;

  saveResult(score, sessionQuestions.length);
  loadHistory();
}

function restartQuiz() {
  document.getElementById('history-panel').classList.remove('show');
  startQuiz();
}

/* =========================================================
   Axis feedback overlay
   ========================================================= */
function showAxisFeedback() {
  const overlay = document.getElementById('axis-feedback-overlay');
  const barsDiv = document.getElementById('axis-bars');
  barsDiv.innerHTML = '';

  const axisPairs = [
    ['formal',     'casual',     'フォーマル',   'カジュアル'],
    ['direct',     'indirect',   'ダイレクト',   '間接的'],
    ['logical',    'emotional',  '論理的',       '感情的'],
    ['structured', 'flexible',   '構造的',       '柔軟'],
  ];

  axisPairs.forEach(([a, b, labelA, labelB]) => {
    const total = (axisWindow[a] || 0) + (axisWindow[b] || 0);
    if (total === 0) return;
    const pctA = Math.round((axisWindow[a] / total) * 100);
    const pctB = 100 - pctA;

    barsDiv.innerHTML += `
      <div class="axis-bar-container">
        <div class="axis-bar-label"><span>${labelA} (${pctA}%)</span><span>${labelB} (${pctB}%)</span></div>
        <div class="axis-bar-bg">
          <div class="axis-bar-fill axis-${a}" style="width:${pctA}%"></div>
        </div>
      </div>`;
  });

  overlay.classList.add('show');
}

document.getElementById('axis-feedback-close').addEventListener('click', () => {
  document.getElementById('axis-feedback-overlay').classList.remove('show');
  // Reset window counters for next batch
  axisWindow = { formal:0, casual:0, direct:0, indirect:0,
                 logical:0, emotional:0, structured:0, flexible:0 };
  axisWindowCount = 0;
  advanceQuestion();
});

/* =========================================================
   Boot
   ========================================================= */
startQuiz();
  </script>
