name: "[site] ReadUp 日次チェック"

on:
  schedule:
    - cron: '7 0 * * *'   # JST 9:07（UTC 0:07）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: check_stories.py
        run: python3 reading/series/check_stories.py --errors-only

      - name: add_vocab_notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 reading/series/add_vocab_notes.py
        continue-on-error: true

      - name: Commit vocab_notes if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet reading/series/stories.js || \
            (git add reading/series/stories.js && \
             git commit -m "auto: vocab_notes 自動追加 [skip ci]" && \
             git push)
