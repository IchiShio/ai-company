name: 週次記事自動生成

on:
  schedule:
    - cron: '0 0 * * 3'  # 毎週水曜 09:00 JST
  workflow_dispatch:       # 手動実行も可

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install anthropic python-dotenv

      - name: 記事生成（2件）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate_articles.py --count 2

      - name: 引用リンク付与
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 add_citations.py || true

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ sitemap.xml
          git diff --cached --quiet || git commit -m "auto: 記事自動生成 $(date +'%Y-%m-%d')"
          git push
