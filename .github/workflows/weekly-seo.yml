name: 週次SEO調査・内部リンク最適化

on:
  schedule:
    - cron: '0 1 * * 0'  # 毎週日曜 10:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install anthropic python-dotenv

      - name: 内部リンク最適化
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 add_internal_links.py || true

      - name: SEOキーワード調査レポート生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import anthropic, os, datetime
          from pathlib import Path

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          today = datetime.date.today().strftime("%Y-%m-%d")

          # 既存記事スラッグ一覧
          articles = [p.parent.name for p in Path("articles").glob("*/index.html")]
          articles_list = "\n".join(f"- {s}" for s in sorted(articles))

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=2000,
              messages=[{
                  "role": "user",
                  "content": f"""あなたはnative-real.com（英語学習サービス比較サイト）のSEO担当者です。

既存記事スラッグ一覧:
{articles_list}

以下の観点でSEOレポートを日本語で作成してください（Markdown形式）：

## 今週のSEOチェックポイント

## 強化すべきキーワード候補（5件）
各キーワードに：想定月間検索数、競合難易度（低/中/高）、記事化の優先度

## 既存記事の改善提案（3件）
タイトル最適化・メタディスクリプション改善など具体的に

## 内部リンク強化の提案
どのページからどのページへリンクを追加すべきか

## 来週のアクション
"""
              }]
          )

          report_dir = Path("docs/seo")
          report_dir.mkdir(parents=True, exist_ok=True)
          report_path = report_dir / f"weekly-{today}.md"
          report_path.write_text(
              f"# SEO週次レポート {today}\n\n自動生成: GitHub Actions + Claude Sonnet\n\n---\n\n" + message.content[0].text,
              encoding="utf-8"
          )
          print(f"SEOレポート生成: {report_path}")
          PYEOF

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ docs/seo/
          git diff --cached --quiet || git commit -m "auto: SEO調査・内部リンク最適化 $(date +'%Y-%m-%d')"
          git push
