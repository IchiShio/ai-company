<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 670px; }
.card {
  width: 1280px; height: 670px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 90px; position: relative; overflow: hidden;
}
.card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; background: linear-gradient(90deg, #e94560, #ff6b6b, #e94560);
}
.main-title {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 52px; font-weight: 900; color: #fff;
  line-height: 1.5; letter-spacing: 0.02em; margin-bottom: 36px;
}
.sub-title {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 20px; font-weight: 400; color: rgba(255,255,255,0.65);
  line-height: 1.6; margin-bottom: 40px;
}
.author {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.5);
}
.accent { color: #e94560; }
</style>
</head>
<body>
<div class="card">
  <div class="main-title">公務員から外資ITに転職して<br><span class="accent">年収2倍</span>にした全記録</div>
  <div class="sub-title">7章構成 + 付録4つ ── 職務経歴書テンプレート・面接Q&A・年収交渉</div>
  <div class="author">ひつじ｜元国家公務員 → IT外資</div>
</div>
</body>
</html>
