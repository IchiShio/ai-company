<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>NewsUp - ニュース英語読解トレーニング</title>
  <meta name="description" content="実際のニュース記事を読んで英語読解力を鍛えよう。VOAスタイルの短いニュース記事と理解度クイズで、リーディング力とボキャブラリーを同時に強化。">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f0f4f8;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #1a3a5c;
      font-size: 1.8em;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.95em;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      margin: 16px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    /* --- Article header --- */
    .article-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      font-size: 0.75em;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: bold;
    }
    .badge-category { background: #e3f2fd; color: #1565c0; }
    .badge-level    { background: #e8f5e9; color: #2e7d32; }
    .article-num    { font-size: 0.85em; color: #888; margin-left: auto; }
    .article-title {
      font-size: 1.25em;
      font-weight: bold;
      color: #1a3a5c;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .article-text {
      font-size: 1em;
      line-height: 1.9;
      color: #444;
      border-left: 4px solid #4a90d9;
      padding-left: 16px;
      background: #f8fbff;
      border-radius: 0 6px 6px 0;
    }
    /* --- Progress --- */
    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 4px;
      height: 6px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #4a90d9;
      border-radius: 4px;
      transition: width 0.4s;
    }
    .progress-text {
      text-align: center;
      color: #666;
      font-size: 0.85em;
      margin-bottom: 16px;
    }
    /* --- Quiz section --- */
    #quiz-section { display: none; }
    #quiz-section.show { display: block; }
    .question-header {
      font-size: 0.9em;
      color: #888;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 16px;
      line-height: 1.5;
      color: #1a3a5c;
    }
    .options { display: grid; gap: 10px; }
    .option-btn {
      padding: 12px 18px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 0.95em;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #4a90d9;
      background: #f0f7ff;
    }
    .option-btn.correct  { border-color: #4CAF50; background: #e8f5e9; color: #2e7d32; }
    .option-btn.incorrect{ border-color: #f44336; background: #ffebee; color: #c62828; }
    /* --- Feedback --- */
    .feedback {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95em;
      line-height: 1.5;
    }
    .feedback.show { display: block; }
    .feedback.correct   { background: #e8f5e9; color: #2e7d32; }
    .feedback.incorrect { background: #ffebee; color: #c62828; }
    .feedback .explanation { margin-top: 6px; color: #555; font-size: 0.9em; }
    /* --- Buttons --- */
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      margin-top: 14px;
      transition: background 0.2s;
    }
    .btn-next    { background: #4a90d9; color: white; display: none; }
    .btn-next.show { display: inline-block; }
    .btn-next:hover { background: #357abd; }
    .btn-start   { background: #4a90d9; color: white; width: 100%; font-size: 1.05em; }
    .btn-start:hover { background: #357abd; }
    .btn-restart { background: #2196F3; color: white; }
    .btn-restart:hover { background: #1976D2; }
    /* --- Read button --- */
    .btn-read-done {
      background: #4CAF50;
      color: white;
      width: 100%;
      font-size: 1.05em;
      padding: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
      margin-top: 16px;
    }
    .btn-read-done:hover { background: #43a047; }
    /* --- Vocabulary --- */
    #vocab-section { display: none; }
    #vocab-section.show { display: block; }
    .vocab-title { font-weight: bold; color: #1a3a5c; margin-bottom: 12px; font-size: 1em; }
    .vocab-list { list-style: none; padding: 0; margin: 0; }
    .vocab-list li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.9em;
      line-height: 1.5;
    }
    .vocab-list li:last-child { border-bottom: none; }
    .vocab-word { font-weight: bold; color: #1a3a5c; }
    /* --- Results --- */
    #results { display: none; }
    #results.show { display: block; text-align: center; }
    .result-score {
      font-size: 2.4em;
      color: #4a90d9;
      font-weight: bold;
      margin: 16px 0 8px;
    }
    .result-msg { color: #555; font-size: 1em; margin-bottom: 20px; }
    /* --- Score bar during session --- */
    .session-score {
      text-align: right;
      font-size: 0.9em;
      color: #555;
      margin-bottom: 4px;
    }
    /* --- Intro --- */
    #intro { text-align: center; }
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      text-align: left;
      display: inline-block;
    }
    .feature-list li {
      padding: 6px 0;
      font-size: 0.95em;
      color: #555;
    }
    .feature-list li::before { content: '✓ '; color: #4CAF50; font-weight: bold; }
  </style>
<link rel="stylesheet" href="/assets/global-design.css">
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WJFJHQNF"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <h1>📰 NewsUp</h1>
  <p class="subtitle">ニュース英語で読解力を鍛えよう</p>

  <!-- Intro screen -->
  <div id="intro" class="card">
    <h2 style="color:#1a3a5c;margin-top:0">NewsUpとは？</h2>
    <ul class="feature-list">
      <li>VOAスタイルの短い英語ニュースを読む</li>
      <li>各記事に3問の読解クイズ</li>
      <li>重要語彙を記事ごとに確認</li>
      <li>Science・Environment・Technologyなど多彩なトピック</li>
    </ul>
    <button class="btn btn-start" onclick="startSession()">トレーニングを始める</button>
  </div>

  <!-- Main quiz container -->
  <div id="main-container" style="display:none">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">記事 1 / 5</div>
    <div class="session-score">スコア: <span id="session-score">0</span> / <span id="session-total">0</span></div>

    <!-- Article card -->
    <div class="card" id="article-card">
      <div class="article-meta">
        <span class="badge badge-category" id="article-category"></span>
        <span class="badge badge-level" id="article-level"></span>
        <span class="article-num" id="article-num"></span>
      </div>
      <div class="article-title" id="article-title"></div>
      <div class="article-text" id="article-text"></div>
      <button class="btn-read-done" id="btn-read-done" onclick="startQuestions()">
        読み終わりました → 問題を解く
      </button>
    </div>

    <!-- Quiz card -->
    <div class="card" id="quiz-section">
      <div class="question-header" id="question-header"></div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-container"></div>
      <div class="feedback" id="feedback">
        <div id="feedback-msg"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <button class="btn btn-next" id="btn-next" onclick="nextStep()">次へ →</button>
    </div>

    <!-- Vocabulary card -->
    <div class="card" id="vocab-section">
      <div class="vocab-title">📖 この記事の重要語彙</div>
      <ul class="vocab-list" id="vocab-list"></ul>
      <button class="btn btn-next show" onclick="nextArticle()">次の記事へ →</button>
    </div>
  </div>

  <!-- Results screen -->
  <div id="results" class="card">
    <h2 style="color:#1a3a5c;margin-top:0">セッション完了！</h2>
    <div class="result-score" id="final-score"></div>
    <p class="result-msg" id="result-msg"></p>
    <button class="btn btn-restart" onclick="restartSession()">もう一度チャレンジ</button>
    <div style="margin-top:16px">
      <a href="/grammar/" style="color:#4a90d9;font-size:0.9em">GrammarUpで文法も練習する →</a>
    </div>
  </div>

  <script src="articles.js"></script>
  <script>
'use strict';

const ARTICLES_PER_SESSION = 5;

let sessionArticles = [];
let currentArticleIdx = 0;
let currentQuestionIdx = 0;
let totalScore = 0;
let totalQuestions = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSession() {
  sessionArticles = shuffle(newsArticles).slice(0, ARTICLES_PER_SESSION);
  currentArticleIdx = 0;
  totalScore = 0;
  totalQuestions = 0;

  document.getElementById('intro').style.display = 'none';
  document.getElementById('results').classList.remove('show');
  document.getElementById('main-container').style.display = 'block';

  showArticle();
}

function showArticle() {
  const article = sessionArticles[currentArticleIdx];

  // Reset UI
  document.getElementById('quiz-section').classList.remove('show');
  document.getElementById('vocab-section').classList.remove('show');
  document.getElementById('article-card').style.display = 'block';
  document.getElementById('btn-read-done').style.display = 'block';

  // Update progress
  const pct = (currentArticleIdx / sessionArticles.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent =
    `記事 ${currentArticleIdx + 1} / ${sessionArticles.length}`;

  // Fill article
  document.getElementById('article-category').textContent = article.category;
  document.getElementById('article-level').textContent = 'Level ' + article.level;
  document.getElementById('article-num').textContent = `#${article.id}`;
  document.getElementById('article-title').textContent = article.title;
  document.getElementById('article-text').textContent = article.text;

  updateScoreDisplay();
  window.scrollTo(0, 0);
}

function startQuestions() {
  currentQuestionIdx = 0;
  answered = false;
  document.getElementById('btn-read-done').style.display = 'none';
  document.getElementById('quiz-section').classList.add('show');
  showQuestion();
}

function showQuestion() {
  const article = sessionArticles[currentArticleIdx];
  const q = article.questions[currentQuestionIdx];
  answered = false;

  document.getElementById('question-header').textContent =
    `Q${currentQuestionIdx + 1} / ${article.questions.length}`;
  document.getElementById('question-text').textContent = q.question;

  const feedback = document.getElementById('feedback');
  feedback.classList.remove('show', 'correct', 'incorrect');
  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('explanation').textContent = '';
  document.getElementById('btn-next').classList.remove('show');

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  shuffle(q.options).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(opt, q));
    container.appendChild(btn);
  });

  window.scrollTo(0, document.getElementById('quiz-section').offsetTop - 20);
}

function checkAnswer(selected, q) {
  if (answered) return;
  answered = true;

  const isCorrect = selected === q.answer;
  if (isCorrect) totalScore++;
  totalQuestions++;

  document.querySelectorAll('.option-btn').forEach(btn => {
    if (btn.textContent === q.answer) btn.classList.add('correct');
    else if (btn.textContent === selected && !isCorrect) btn.classList.add('incorrect');
    btn.disabled = true;
  });

  const feedback = document.getElementById('feedback');
  document.getElementById('feedback-msg').textContent =
    isCorrect ? '✓ 正解！' : `✗ 不正解。正解は「${q.answer}」です。`;
  document.getElementById('explanation').textContent = q.explanation || '';
  feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');

  document.getElementById('btn-next').classList.add('show');
  updateScoreDisplay();
}

function nextStep() {
  currentQuestionIdx++;
  const article = sessionArticles[currentArticleIdx];

  if (currentQuestionIdx < article.questions.length) {
    showQuestion();
  } else {
    showVocabulary();
  }
}

function showVocabulary() {
  const article = sessionArticles[currentArticleIdx];
  document.getElementById('quiz-section').classList.remove('show');
  document.getElementById('feedback').classList.remove('show');

  const list = document.getElementById('vocab-list');
  list.innerHTML = '';
  article.vocabulary.forEach(v => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="vocab-word">${v.word}</span>: ${v.meaning}`;
    list.appendChild(li);
  });

  document.getElementById('vocab-section').classList.add('show');
  window.scrollTo(0, document.getElementById('vocab-section').offsetTop - 20);
}

function nextArticle() {
  currentArticleIdx++;

  if (currentArticleIdx >= sessionArticles.length) {
    finishSession();
  } else {
    showArticle();
  }
}

function finishSession() {
  document.getElementById('main-container').style.display = 'none';
  const results = document.getElementById('results');
  results.classList.add('show');

  const pct = Math.round((totalScore / totalQuestions) * 100);
  document.getElementById('final-score').textContent =
    `${totalScore} / ${totalQuestions} (${pct}%)`;

  let msg;
  if (pct >= 90)      msg = '素晴らしい！ネイティブレベルの読解力です！';
  else if (pct >= 70) msg = 'よくできました！さらに上を目指しましょう。';
  else if (pct >= 50) msg = 'まずまずです。記事を読み返して復習しましょう。';
  else                msg = 'もう少し練習が必要です。毎日少しずつ続けましょう！';
  document.getElementById('result-msg').textContent = msg;

  // Update progress bar to 100%
  document.getElementById('progress-bar').style.width = '100%';

  window.scrollTo(0, 0);
}

function restartSession() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('intro').style.display = 'block';
}

function updateScoreDisplay() {
  document.getElementById('session-score').textContent = totalScore;
  document.getElementById('session-total').textContent = totalQuestions;
}
  </script>
</body>
</html>
